<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Присоединиться</title>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.auth-wrap{width:100%;max-width:380px;background:#111;padding:24px;border-radius:16px}
  h1{margin:0 0 16px;text-align:center}
  input,button{width:100%;padding:14px;margin-bottom:12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:15px;box-sizing:border-box}
  input:focus{outline:none;border-color:#ff6b00}
  button{background:#ff6b00;color:#000;font-weight:700;cursor:pointer}
  button[disabled]{opacity:.6;cursor:not-allowed}
.hidden{display:none!important}
#err{font-size:14px;margin-top:12px;text-align:center;white-space:pre-wrap}
</style>
</head>
<body>
<div class="auth-wrap">
  <h1>Присоединиться к HotPit</h1>
  <p style="color:#888;font-size:14px;text-align:center" id="restName">Проверка ссылки...</p>
  <form id="join" class="hidden">
    <input name="fullName" placeholder="Ваше ФИО" required>
    <input name="email" type="email" placeholder="Ваш Email" required>
    <input name="password" type="password" placeholder="Придумай пароль 6+" required minlength="6">
    <button type="submit" id="submitBtn">Принять приглашение</button>
  </form>
  <div id="err"></div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const token=new URLSearchParams(location.search).get('token');
const form=document.getElementById('join');
const err=document.getElementById('err');
const restName=document.getElementById('restName');
const btn=document.getElementById('submitBtn');

// ШАГ 1: Мы больше не можем проверить название ресторана с anon. RLS не даст.
// Поэтому сразу показываем форму если токен есть. Проверку сделает база в функции.
if(!token){ 
  restName.textContent='Ссылка невалидна: нет token в URL'; 
} else {
  restName.textContent='Вас приглашают в ресторан';
  form.classList.remove('hidden');
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  btn.disabled=true;
  err.style.color='#a3a3a3';
  err.textContent='Регистрирую...';
  
  const fd=new FormData(form);
  const fullName=fd.get('fullName').trim();
  const email=fd.get('email').trim();
  const password=fd.get('password');

  try {
    // 1. Создаем юзера в Auth
    const {data:{user}, error:ae}=await supabase.auth.signUp({email, password});
    if(ae) throw ae;
    if(!user) throw new Error('Не удалось создать пользователя');

    // 2. Сразу логинимся, чтобы у функции был auth.uid()
    const {error:le} = await supabase.auth.signInWithPassword({email, password});
    if(le) throw le;

    // 3. ГЛАВНЫЙ ФИКС: 1 вызов. База сама проверит токен, погасит его и создаст профиль.
    const {error:fe}=await supabase.rpc('accept_invite', {p_token:token, p_full_name:fullName});
    if(fe) throw fe;

    err.style.color='#22c55e';
    err.textContent='Готово! Перекидываю в кабинет...';
    setTimeout(()=>location.href='/owner.html',1200);

  } catch(e) {
    console.error(e);
    err.style.color='#f87171';
    err.textContent = 'Ошибка: ' + e.message;
    await supabase.auth.signOut(); // Если что-то упало, выкидываем юзера
    btn.disabled=false;
  }
})
</script></body></html>
