<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Присоединиться</title>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff}
.auth-wrap{width:100%;max-width:380px;background:#111;padding:24px;border-radius:16px}
  input,button{width:100%;padding:14px;margin-bottom:12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:15px}
  button{background:#ff6b00;color:#000;font-weight:700}
  button[disabled]{opacity:.6}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="auth-wrap">
  <h1>Присоединиться</h1>
  <p style="color:#888;font-size:14px" id="restName">Проверка ссылки...</p>
  <form id="join" class="hidden">
    <input name="fullName" placeholder="ФИО" required>
    <input name="email" type="email" placeholder="Ваш Email" required>
    <input name="password" type="password" placeholder="Придумай пароль" required minlength="6">
    <button type="submit" id="submitBtn">Принять приглашение</button>
  </form>
  <div id="err" style="color:#f87171;font-size:14px;margin-top:12px"></div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const token=new URLSearchParams(location.search).get('token');
const form=document.getElementById('join');
const err=document.getElementById('err');
const restName=document.getElementById('restName');

// ШАГ 1: Проверяем токен через RLS политику anon
if(!token){ restName.textContent='Ссылка невалидна'; }
else {
  const {data, error} = await supabase.from('invites').select('restaurant_id').eq('token', token).single();
  if(error||!data){ restName.textContent='Ссылка просрочена или уже использована'; }
  else {
    const {data: rest} = await supabase.from('restaurants').select('name').eq('id', data.restaurant_id).single();
    restName.textContent=`Вас приглашают в: ${rest?.name || 'ресторан'}`;
    form.classList.remove('hidden');
  }
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  document.getElementById('submitBtn').disabled=true;
  err.textContent='Регистрирую...';
  const fd=new FormData(form);
  const fullName=fd.get('fullName').trim();
  const email=fd.get('email').trim();
  const password=fd.get('password');

  const {data:{user}, error:ae}=await supabase.auth.signUp({email, password});
  if(ae){err.textContent=ae.message;return}

  // ШАГ 2: Привязываем к ресторану и гасим токен. Все в 1 запросе через RPC
  const {error:fe}=await supabase.rpc('accept_invite', {p_token:token,p_user_id:user.id,p_full_name:fullName});
  if(fe){err.textContent=fe.message;await supabase.auth.signOut();return}

  err.style.color='#22c55e';
  err.textContent='Готово! Перекидываю...';
  setTimeout(()=>location.href='/owner.html',1200);
})
</script></body></html>
