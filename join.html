<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; text-align: center; }
   .box { max-width: 400px; margin: 0 auto; }
   .btn { background: #ff3b30; color: #fff; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 20px; }
   .btn:disabled { background: #555; cursor: not-allowed; }
   .input { width: 100%; padding: 15px; margin: 15px 0; font-size: 20px; text-align: center; letter-spacing: 4px; border-radius: 8px; border: 1px solid #48484a; background: #2c2c2e; color: #fff; box-sizing: border-box; }
  </style>
</head>
<body>
<div class="box">
  <h1>Приглашение</h1>
  <p id="status">Введи код приглашения от шефа</p>
  <input id="invite_code" type="text" class="input" placeholder="123456" maxlength="6" />
  <button class="btn" id="join_btn" onclick="join()">ПРИСОЕДИНИТЬСЯ</button>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function join() {
  const code = document.getElementById('invite_code').value.trim();
  const btn = document.getElementById('join_btn');
  
  if (!code || code.length !== 6) return alert('Введи 6-значный код');

  btn.disabled = true;
  btn.innerText = 'ПРОВЕРКА...';

  const { data: { user }, error: userErr } = await db.auth.getUser();
  if (userErr || !user) {
    alert('Сначала войди или зарегистрируйся');
    window.location.href = '/index.html';
    return;
  }

  // Вызываем функцию которая проверит код и привяжет пользователя к ресторану
  const { data, error } = await db.rpc('join_restaurant_by_invite', {
    invite_code: code
  });

  if (error) {
    alert('Ошибка: ' + error.message);
    btn.disabled = false;
    btn.innerText = 'ПРИСОЕДИНИТЬСЯ';
    return;
  }

  // Сохраняем и кидаем на экран шефа
  localStorage.setItem('active_restaurant_id', data.restaurant_id);
  localStorage.setItem('active_role', data.role);

  alert('Добро пожаловать в команду!');
  window.location.href = '/chef.html';
}

db.auth.getSession().then(({ data: { session } }) => {
  if (!session) {
    document.getElementById('status').innerText = 'Сначала войди или зарегистрируйся';
    document.getElementById('join_btn').disabled = true;
  }
});
</script>
</body>
</html>
