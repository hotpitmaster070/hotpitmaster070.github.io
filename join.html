<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Присоединиться</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .auth-wrap { width: 100%; max-width: 380px; background: var(--card); padding: 24px; border-radius: 16px; }
  input, button { width: 100%; margin-bottom: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="auth-wrap">
  <h1>Присоединиться к HotPit</h1>
  <p style="color:var(--muted);font-size:14px" id="restName">Проверка ссылки...</p>
  <form id="join" class="hidden">
    <input name="fullName" placeholder="ФИО" required>
    <input name="email" type="email" placeholder="Ваш Email" required>
    <input name="password" type="password" placeholder="Придумай пароль" required minlength="6">
    <button type="submit">Принять приглашение</button>
  </form>
  <div id="err" style="color:#f87171;font-size:14px;margin-top:12px"></div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
import {SUPABASE_URL, SUPABASE_ANON_KEY} from '/js/config.js'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const token=new URLSearchParams(location.search).get('token');
const form = document.getElementById('join');
const err = document.getElementById('err');
const restName = document.getElementById('restName');

if(!token){
  restName.textContent = 'Ссылка невалидна';
} else {
  // 1. Проверяем токен. Берем только restaurant_id, чтобы не падать на RLS
  supabase.from('invites').select('restaurant_id').eq('token', token).eq('used', false).gt('expires_at', new Date().toISOString()).single()
  .then(async ({data, error}) => {
    if(error || !data){
      restName.textContent = 'Ссылка просрочена или уже использована';
      return;
    }
    
    // 2. Отдельно дергаем название ресторана
    const {data: rest} = await supabase.from('restaurants').select('name').eq('id', data.restaurant_id).single();
    restName.textContent = `Вас приглашают в: ${rest?.name || 'ресторан'}`;
    
    // 3. Показываем форму
    form.classList.remove('hidden');
  })
}

form.addEventListener('submit',async e=>{
  e.preventDefault(); 
  err.textContent='Регистрирую...';
  err.style.color='#f87171';
  const fd=new FormData(form);
  const fullName = fd.get('fullName').trim();
  const email = fd.get('email');
  const password = fd.get('password');

  // 1. Регистрируем в Auth
  const {data: {user}, error: ae}=await supabase.auth.signUp({email, password});
  if(ae || !user){err.textContent=ae?.message || 'Ошибка регистрации'; return}

  // 2. Сразу логиним, чтобы сессия была
  const {error: se} = await supabase.auth.signInWithPassword({email, password});
  if(se){err.textContent='Ошибка входа: ' + se.message; return}

  // 3. Вызываем RPC. Передаем user.id напрямую
  const {error:fe}=await supabase.rpc('accept_invite', {
    p_token: token, 
    p_user_id: user.id,
    p_full_name: fullName
  });
  
  if(fe){
    err.textContent = fe.message; 
    await supabase.auth.signOut(); // Чистим за собой если ссылка уже использована
    return
  }

  err.style.color = 'var(--green)';
  err.textContent='Готово! Перекидываю...';
  setTimeout(()=> location.href='/kitchen.html', 1200);
})
</script></body></html>
