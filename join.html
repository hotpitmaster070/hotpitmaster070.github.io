<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Присоединиться</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.auth-wrap { width: 100%; max-width: 380px; background: var(--card); padding: 24px; border-radius: 16px; }
  input, button { width: 100%; margin-bottom: 12px; }
  button[disabled] { opacity:.6; cursor: not-allowed; }
.hidden { display: none!important; }
</style>
</head>
<body>
<div class="auth-wrap">
  <h1>Присоединиться к HotPit</h1>
  <p style="color:var(--muted);font-size:14px" id="restName">Проверка ссылки...</p>
  <form id="join" class="hidden">
    <input name="fullName" placeholder="ФИО" required>
    <input name="email" type="email" placeholder="Ваш Email" required>
    <input name="password" type="password" placeholder="Придумай пароль" required minlength="6">
    <button type="submit" id="submitBtn">Принять приглашение</button>
  </form>
  <div id="err" style="color:#f87171;font-size:14px;margin-top:12px"></div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
import {SUPABASE_URL, SUPABASE_ANON_KEY} from '/js/config.js'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const token=new URLSearchParams(location.search).get('token');
const form = document.getElementById('join');
const btn = document.getElementById('submitBtn');
const err = document.getElementById('err');
const restName = document.getElementById('restName');

if(!token){
  restName.textContent = 'Ссылка невалидна: нет token в URL';
} else {
  supabase.from('invites').select('restaurant_id').eq('token', token).eq('used', false).gt('expires_at', new Date().toISOString()).single()
.then(async ({data, error}) => {
    if(error){ restName.textContent = 'Ошибка БД: ' + error.message; return; }
    if(!data){ restName.textContent = 'Ссылка просрочена или уже использована'; return; }

    const {data: rest} = await supabase.from('restaurants').select('name').eq('id', data.restaurant_id).single();
    restName.textContent = `Вас приглашают в: ${rest?.name || 'ресторан'}`;
    form.classList.remove('hidden');
  })
.catch(e => {
    restName.textContent = 'Критическая ошибка: ' + e.message;
  })
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  btn.disabled = true;
  err.textContent='Регистрирую...';
  err.style.color='#f87171';
  const fd=new FormData(form);
  const fullName = fd.get('fullName').trim();
  const email = fd.get('email').trim();
  const password = fd.get('password');

  let user = null;

  const {data: {user: existing}} = await supabase.auth.getUser();
  if(existing?.email === email){
    user = existing;
  } else {
    const {data: {user: logged}} = await supabase.auth.signInWithPassword({email, password});
    if(logged){
      user = logged;
    } else {
      const {data: {user: newUser}, error: ae} = await supabase.auth.signUp({email, password});
      if(ae ||!newUser){
        err.textContent = ae?.message.includes('already registered')
        ? 'Этот email уже занят. Нажми "Войти"'
          : ae?.message || 'Ошибка регистрации';
        btn.disabled = false;
        return
      }
      user = newUser;
      await supabase.auth.signInWithPassword({email, password});
    }
  }

  const {error:fe}=await supabase.rpc('accept_invite', {
    p_token: token,
    p_user_id: user.id,
    p_full_name: fullName
  });

  if(fe){
    err.textContent = fe.message.includes('Invalid or used token')
    ? 'Ссылка уже использована'
      : fe.message;
    await supabase.auth.signOut();
    btn.disabled = false;
    return
  }

  err.style.color = 'var(--green)';
  err.textContent='Готово! Перекидываю...';
  setTimeout(()=> location.href='/kitchen.html', 1200);
})
</script></body></html>
