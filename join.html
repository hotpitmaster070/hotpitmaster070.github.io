<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение HotPit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="box">
  <div class="logo"><h1>HotPit</h1><p id="subtitle">Вас пригласили в ресторан</p></div>
  <div id="msg" class="msg"></div>
  <div id="formBox">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Придумай пароль 6+">
    <button class="btn-primary" id="acceptBtn">Принять приглашение</button>
    <button class="btn-secondary" id="loginBtn">Уже есть аккаунт? Войти</button>
  </div>
</div>
<script type="module">
import { supabase } from './js/supabase.js'
import { acceptInvite } from './js/api.js'

const token = new URLSearchParams(location.search).get('t')
if(!token){document.getElementById('msg').innerText='Неверная ссылка';document.getElementById('msg').className='msg error';document.getElementById('msg').style.display='block'}

document.getElementById('acceptBtn').onclick = async ()=>{
  const email=document.getElementById('email').value.trim()
  const password=document.getElementById('password').value
  if(!email||password.length<6){showMsg('Email + пароль 6+','error');return}
  const {data,error}=await supabase.auth.signUp({email,password})
  if(error){showMsg(error.message,'error');return}
  const user = data.user
  await acceptInvite(token,user.id)
  location='index.html' // index сам кинет в kitchen
}

document.getElementById('loginBtn').onclick = async ()=>{
  const email=document.getElementById('email').value.trim()
  const password=document.getElementById('password').value
  const {data:{user},error}=await supabase.auth.signInWithPassword({email,password})
  if(error){showMsg(error.message,'error');return}
  await acceptInvite(token,user.id)
  location='index.html'
}

function showMsg(msg,type){const el=document.getElementById('msg');el.innerText=msg;el.className='msg '+type;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}
</script>
</body>
</html>
