<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экран Шефа</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 30px; }
    .btn { width: 90%; max-width: 400px; padding: 18px; margin: 10px auto; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; display: block; cursor: pointer; }
    .btn-red { background: #ff3333; }
    .btn-gray { background: #555; }
  </style>
</head>
<body>
  <h1 id="rest_name">Экран Шефа 🧱</h1>

  <button class="btn btn-red" onclick="alert('Делаем next')">1. [+ ПРИХОД ТОВАРА]</button>
  <button class="btn btn-red" onclick="alert('Делаем next')">2. [СОЗДАТЬ ЗАДАНИЕ]</button>
  <button class="btn btn-red" onclick="alert('Делаем next')">4. [МОЙ СКЛАД]</button>
  <button class="btn btn-gray" onclick="logout()">ВЫЙТИ</button>

  <script>
    const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function logout() {
      await db.auth.signOut();
      window.location.href = '/index.html';
    }

    db.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) return window.location.href = '/index.html';
      
      const { data } = await db.from('memberships')
        .select('restaurant_id, restaurants(name)')
        .eq('user_id', session.user.id)
        .single();
      
      if (data) {
        document.getElementById('rest_name').innerText = data.restaurants.name + ' 🧱';
      }
    });
  </script>
</body>
</html>
