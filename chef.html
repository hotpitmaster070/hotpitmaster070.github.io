<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Управление - HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root { --accent: #f97316; --accent-dark: #ea580c; }
  body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); }
 .glass { backdrop-filter: blur(12px); background: rgba(39, 39, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); }
 .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; transition: all 0.2s; }
 .btn-primary:hover { transform: scale(0.98); box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4); }
 .btn-primary:active { transform: scale(0.95); }
 .tab-active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; }
 .tab-inactive { background: rgba(39, 39, 42, 0.8); color: #a1a1aa; }
 .card-animate { animation: slideUp 0.4s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
 .logo-link{ color:#f97316; font-weight:800; text-decoration:none; font-size:24px; }
 .divider{color:#71717a;}
 .nav-link{ color:#d4d4d8; font-size:18px; }
</style>
</head>
<body class="text-zinc-100 p-4 md:p-6">
<div class="max-w-5xl mx-auto space-y-6">

  <header class="flex items-center gap-3 mb-6">
    <a href="/" class="logo-link">HotPit</a>
    <span class="divider">|</span>
    <span class="nav-link">Управление кухней</span>
  </header>

  <div class="flex gap-2 mb-6 overflow-x-auto">
    <button id="tabBtnStaff" onclick="setTab('staff')" class="tab-active px-5 py-3 rounded-xl font-semibold">Повара</button>
    <button id="tabBtnProd" onclick="setTab('prod')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">График</button>
    <button id="tabBtnStock" onclick="setTab('stock')" class="tab-inactive px-5 py-3 rounded-xl font-semibold relative">
      Склад <span id="stockBadge" class="hidden absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>
    <button id="tabBtnReports" onclick="setTab('reports')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">Отчёты</button>
  </div>

  <div id="tab-staff" class="glass rounded-2xl p-6">
    <div class="flex items-center gap-2 mb-4">
      <i data-lucide="users" class="text-orange-500"></i>
      <h2 class="text-2xl font-bold">Повара</h2>
    </div>
    <div class="flex gap-3 mb-6">
      <input id="newStaffName" placeholder="Имя повара" class="flex-1 glass rounded-xl p-3 outline-none focus:border-orange-500">
      <button onclick="addStaff()" class="btn-primary px-8 rounded-xl font-bold text-lg">+ Добавить</button>
    </div>
    <div id="staffList" class="space-y-4"></div>
  </div>

  <div id="tab-prod" class="hidden glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold">График</h2>
      <div class="flex gap-2">
        <button onclick="setView('day')" id="btnDay" class="btn-primary px-4 py-2 rounded-lg text-sm">День</button>
        <button onclick="setView('week')" id="btnWeek" class="px-4 py-2 rounded-lg bg-zinc-700 text-sm">Неделя</button>
        <button onclick="setView('month')" id="btnMonth" class="px-4 py-2 rounded-lg bg-zinc-700 text-sm">Месяц</button>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
      <select id="staffSelect" class="glass rounded-xl p-3 outline-none"></select>
      <input type="date" id="dateInput" class="glass rounded-xl p-3 outline-none">
      <input type="time" id="timeIn" value="09:00" class="glass rounded-xl p-3 outline-none">
      <input type="time" id="timeOut" value="18:00" class="glass rounded-xl p-3 outline-none">
    </div>
    <button onclick="addShift()" class="w-full bg-green-600 hover:bg-green-700 rounded-xl p-4 font-bold text-lg mb-3">+ Добавить в график</button>
    <button onclick="showTodayReport()" class="w-full btn-primary rounded-xl p-4 font-bold text-lg">Табель на сегодня</button>
    <div id="todayShifts" class="mt-6 space-y-3"></div>
  </div>

  <div id="tab-stock" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Склад</h2>
    <div class="glass rounded-xl p-4 mb-4">
      <h3 class="font-bold mb-3">Остатки на сегодня</h3>
      <div id="balanceList" class="space-y-2 text-sm"></div>
    </div>
    <div id="stockAlerts" class="hidden bg-red-950/50 border-red-500 rounded-xl p-4 mb-4">
      <span class="font-bold text-red-400">🔔 Товары ниже минимума: <span id="alertCount">0</span></span>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <button onclick="openIncome()" class="bg-green-600 hover:bg-green-700 rounded-xl p-4 font-bold">+ Приход</button>
      <button onclick="showInventory()" class="btn-primary rounded-xl p-4 font-bold">Мой склад</button>
      <button onclick="openInventory()" class="bg-blue-600 hover:bg-blue-700 rounded-xl p-4 font-bold">Инвентаризация</button>
      <button onclick="alert('Остаток = quantity - списание - заготовки')" class="bg-orange-600 hover:bg-orange-700 rounded-xl p-4 font-bold">Остаток</button>
      <button onclick="openWriteoff()" class="bg-red-600 hover:bg-red-700 rounded-xl p-4 font-bold">Списание</button>
      <button onclick="alert('Отчет списание')" class="bg-zinc-600 hover:bg-zinc-700 rounded-xl p-4 font-bold">Отчет списание</button>
      <button onclick="alert('Отчет месяц')" class="bg-zinc-600 hover:bg-zinc-700 rounded-xl p-4 font-bold">Отчет месяц</button>
      <button class="bg-zinc-800 text-zinc-500 rounded-xl p-4 font-bold cursor-not-allowed">Заготовки</button>
    </div>
  </div>

  <div id="tab-reports" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Отчёты</h2>
    <p class="text-zinc-500">Отчёты в разработке</p>
  </div>
</div>

<div id="incomeModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onclick="closeIncome()">
  <div class="glass rounded-2xl p-6 max-w-md w-full" onclick="event.stopPropagation()">
    <h3 class="text-2xl font-bold mb-4">+ Приход товара</h3>
    <div class="space-y-3">
      <select id="incomeProduct" class="w-full glass rounded-xl p-3 outline-none"></select>
      <input type="number" id="incomeQty" placeholder="Количество" step="0.01" class="w-full glass rounded-xl p-3 outline-none">
      <input type="number" id="incomePrice" placeholder="Цена за ед. ₽" step="0.01" class="w-full glass rounded-xl p-3 outline-none">
      <input type="text" id="incomeSupplier" placeholder="Поставщик" class="w-full glass rounded-xl p-3 outline-none">
      <input type="date" id="incomeDate" class="w-full glass rounded-xl p-3 outline-none">
    </div>
    <div class="flex gap-2 mt-6">
      <button onclick="saveIncome()" class="btn-primary flex-1 rounded-xl p-3 font-bold">Сохранить</button>
      <button onclick="closeIncome()" class="bg-zinc-700 hover:bg-zinc-600 flex-1 rounded-xl p-3 font-semibold">Отмена</button>
    </div>
  </div>
</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
const restaurantId = urlParams.get('rest');

if (!restaurantId) {
  document.body.innerHTML = '<div class="text-center py-20 text-red-400">Ошибка: открой ссылку из onboarding.html</div>';
}

document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

let currentTab = 'staff';
let currentView = 'day';

function setTab(tab) {
  currentTab = tab;
  ['staff','prod','stock','reports'].forEach(t => {
    document.getElementById('tab-'+t).classList.add('hidden');
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'tab-inactive px-5 py-3 rounded-xl font-semibold';
  });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1)).className = 'tab-active px-5 py-3 rounded-xl font-semibold';
  if(tab === 'stock') refreshBalance();
}

function setView(view) {
  currentView = view;
  ['day','week','month'].forEach(v => {
    document.getElementById('btn'+v.charAt(0).toUpperCase()+v.slice(1)).className = v === view? 'btn-primary px-4 py-2 rounded-lg text-sm' : 'px-4 py-2 rounded-lg bg-zinc-700 text-sm';
  });
  loadShifts();
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return alert('Введи имя повара');
  const { error } = await _supabase.from('staff').insert({ restaurant_id: restaurantId, name, role: 'staff', pay_type: 'hourly', hourly_rate: 300, daily_rate: 0 });
  if(error) return alert('Ошибка: ' + error.message);
  document.getElementById('newStaffName').value = '';
  loadStaff();
}

async function loadStaff() {
  const { data } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);

  document.getElementById('staffList').innerHTML = data?.map((s, i) => {
    const isHourly = s.pay_type === 'hourly';
    const qrUrl = `${window.location.origin}/clock.html?rest=${restaurantId}&staff=${s.id}`;

    return `
      <div class="glass rounded-2xl p-5 card-animate" style="animation-delay: ${i * 0.1}s">
        <div class="flex justify-between items-center mb-3">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full flex items-center justify-center font-bold text-black text-xl shadow-lg">${s.name[0]}</div>
            <div>
              <div class="font-bold text-xl">${s.name}</div>
              <div class="text-zinc-400 text-sm">Повар</div>
            </div>
          </div>
          <button onclick="deleteStaff('${s.id}')" class="text-zinc-500 hover:text-red-400 p-2 hover:scale-110 transition">
            <i data-lucide="trash-2" class="w-6 h-6"></i>
          </button>
        </div>

        <div class="flex gap-2 mb-3">
          <button onclick="setPayType('${s.id}', 'hourly')" class="${isHourly? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Почасовой</button>
          <button onclick="setPayType('${s.id}', 'daily')" class="${!isHourly? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Фикс за день</button>
        </div>

        <div>
          <label class="text-zinc-400 text-sm">₽/${isHourly? 'час' : 'день'}</label>
          <div class="flex gap-2 mt-1">
            <input type="number" id="rate-${s.id}" value="${isHourly? s.hourly_rate : s.daily_rate}" oninput="showSaveBtn('${s.id}')" class="flex-1 glass rounded-xl p-3 outline-none focus:border-orange-500 text-lg font-semibold">
            <button id="save-${s.id}" onclick="saveRate('${s.id}', '${s.pay_type}')" class="hidden btn-primary px-5 rounded-xl">
              <i data-lucide="check" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('') || '<p class="text-zinc-500 text-center py-8">Поваров нет. Добавь первого</p>';

  document.getElementById('staffSelect').innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  lucide.createIcons();
}

async function setPayType(id, type) {
  await _supabase.from('staff').update({ pay_type: type }).eq('id', id);
  loadStaff();
}

async function deleteStaff(id) {
  if(!confirm('Удалить?')) return;
  await _supabase.from('staff').delete().eq('id', id);
  loadStaff();
}

function showSaveBtn(id) {
  document.getElementById('save-'+id).classList.remove('hidden');
}

async function saveRate(id, type) {
  const input = document.getElementById('rate-'+id);
  const btn = document.getElementById('save-'+id);
  const field = type === 'hourly'? 'hourly_rate' : 'daily_rate';
  const value = parseFloat(input.value) || 0;

  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader" class="w-6 h-6 animate-spin"></i>';
  lucide.createIcons();

  await _supabase.from('staff').update({ [field]: value }).eq('id', id);

  input.classList.add('border-green-500');
  btn.classList.add('hidden');
  btn.disabled = false;
  btn.innerHTML = '<i data-lucide="check" class="w-6 h-6"></i>';
  setTimeout(() => input.classList.remove('border-green-500'), 800);
  lucide.createIcons();
}

// ГРАФИК
async function addShift() {
  const staffId = document.getElementById('staffSelect').value;
  const date = document.getElementById('dateInput').value;
  const start = document.getElementById('timeIn').value;
  const end = document.getElementById('timeOut').value;
  if(!staffId) return alert('Выбери повара');
  await _supabase.from('work_schedules').insert({ restaurant_id: restaurantId, staff_id: staffId, date, start_time: start, end_time: end, status: 'active' });
  loadShifts();
}

async function loadShifts() {
  const date = document.getElementById('dateInput').value;
  const { data: shifts } = await _supabase
  .from('work_schedules')
  .select('*, staff(name, pay_type, hourly_rate, daily_rate)')
  .eq('date', date)
  .order('start_time');

  const { data: staff } = await _supabase.from('staff').select('id,name,pay_type,hourly_rate,daily_rate');

  document.getElementById('todayShifts').innerHTML = shifts.map((s, i) => {
    const st = staff.find(x => x.id === s.staff_id);
    if(!st) return '';

    const [h1, m1] = s.start_time.split(':').map(Number);
    const [h2, m2] = s.end_time.split(':').map(Number);
    const hours = ((h2 + m2/60) - (h1 + m1/60)).toFixed(1);

    let pay = 0;
    let payLabel = '';
    if(st.pay_type === 'hourly') {
      pay = hours * (st.hourly_rate || 0);
      payLabel = `${hours}ч × ${st.hourly_rate}₽`;
    } else {
      pay = st.daily_rate || 0;
      payLabel = `Фикс за день`;
    }

    return `
    <div class="glass rounded-2xl p-5 card-animate" style="animation-delay: ${i * 0.1}s">
      <div class="flex justify-between items-start mb-3">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full flex items-center justify-center font-bold text-black text-lg">${st.name[0]}</div>
          <div>
            <div class="font-bold text-xl">${st.name}</div>
            <div class="text-zinc-400 text-sm">${s.date}</div>
          </div>
        </div>
        <button onclick="deleteShift('${s.id}')" class="text-zinc-500 hover:text-red-400 p-2 hover:scale-110 transition">
          <i data-lucide="trash-2" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="flex items-center justify-between mt-4 pt-4 border-t border-zinc-700/50">
        <div class="flex items-center gap-3 text-zinc-300">
          <div class="glass rounded-lg p-2">
            <i data-lucide="clock" class="w-4 h-4"></i>
          </div>
          <div>
            <div class="font-bold text-lg">${s.start_time.slice(0,5)} - ${s.end_time.slice(0,5)}</div>
            <div class="text-zinc-500 text-sm">${payLabel}</div>
          </div>
        </div>
        <div class="text-right">
          <div class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">+${pay.toFixed(0)}₽</div>
          <div class="text-zinc-500 text-xs">к выплате</div>
        </div>
      </div>
    </div>
    `;
  }).join('') || '<p class="text-zinc-500 text-center py-8">Смен нет на эту дату</p>';

  lucide.createIcons();
}

async function deleteShift(id) {
  if(!confirm('Удалить смену?')) return;
  await _supabase.from('work_schedules').delete().eq('id', id);
  loadShifts();
}

async function showTodayReport() {
  alert('Табель - считаем ЗП по сменам');
}

// СКЛАД
async function refreshBalance() {
  const { data } = await _supabase.from('inventory').select('*').eq('restaurant_id', restaurantId);
  document.getElementById('balanceList').innerHTML = data?.map(i => {
    const isLow = i.quantity <= i.min_quantity && i.min_quantity > 0;
    return `<div class="flex justify-between ${isLow?'text-red-400':''}"><span>${i.name}</span><span>${i.quantity} ${i.unit}</span></div>`;
  }).join('') || 'Товаров нет';

  const low = data?.filter(i => i.quantity <= i.min_quantity && i.min_quantity > 0).length || 0;
  if(low > 0) {
    document.getElementById('stockAlerts').classList.remove('hidden');
    document.getElementById('alertCount').innerText = low;
    document.getElementById('stockBadge').classList.remove('hidden');
  }
}

async function openIncome() {
  document.getElementById('incomeModal').classList.remove('hidden');
  document.getElementById('incomeDate').value = new Date().toISOString().split('T')[0];
  const { data } = await _supabase.from('inventory').select('id, name, unit').eq('restaurant_id', restaurantId);
  document.getElementById('incomeProduct').innerHTML = '<option value="">Выбери товар...</option>' + data.map(p => `<option value="${p.id}">${p.name} - ${p.unit}</option>`).join('');
}

function closeIncome() {
  document.getElementById('incomeModal').classList.add('hidden');
}

async function saveIncome() {
  const productId = document.getElementById('incomeProduct').value;
  const qty = parseFloat(document.getElementById('incomeQty').value);
  if (!productId ||!qty || qty <= 0) return alert('Выбери товар и количество');

  const { data: current } = await _supabase.from('inventory').select('quantity').eq('id', productId).single();
  const newQty = (current.quantity || 0) + qty;

  await _supabase.from('inventory').update({ quantity: newQty }).eq('id', productId);
  await _supabase.from('stock_movements').insert({ restaurant_id: restaurantId, product_id: productId, type: 'income', quantity: qty, date: document.getElementById('incomeDate').value });

  alert(`Приход сохранён! Новый остаток: ${newQty}`);
  closeIncome();
  refreshBalance();
}

function openWriteoff() { alert('Модалка [-Списание] - следующий шаг') }
function openInventory() { alert('Инвентаризация - следующий шаг') }
function showInventory() { alert('Таблица всех товаров') }

loadStaff();
loadShifts();
refreshBalance();
</script>
</body>
  </html>
