<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Управление - HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root { --accent: #f97316; --accent-dark: #ea580c; }
  body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); }
.glass { backdrop-filter: blur(12px); background: rgba(39, 39, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; transition: all 0.2s; }
.btn-primary:active { transform: scale(0.95); }
.tab-active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; }
.tab-inactive { background: rgba(39, 39, 42, 0.8); color: #a1a1aa; }
.timeline { position: relative; height: 60px; background: rgba(63,63,70,0.3); border-radius: 12px; }
.timeline-bar { position: absolute; height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 8px; cursor: grab; }
.timeline-bar:active { cursor: grabbing; }
.timeline-hour { position: absolute; bottom: -24px; font-size: 10px; color: #71717a; }
.logo-link{ color:#f97316; font-weight:800; text-decoration:none; font-size:24px; }
.divider{color:#71717a;}
.nav-link{ color:#d4d4d8; font-size:18px; }
</style>
</head>
<body class="text-zinc-100 p-4 md:p-6">
<div class="max-w-5xl mx-auto space-y-6">

  <header class="flex items-center gap-3 mb-6">
    <a href="/" class="logo-link">HotPit</a>
    <span class="divider">|</span>
    <span class="nav-link">Управление кухней</span>
  </header>

  <div class="flex gap-2 mb-6 overflow-x-auto">
    <button id="tabBtnKitchen" onclick="setTab('kitchen')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">Экран Шефа</button>
    <button id="tabBtnStaff" onclick="setTab('staff')" class="tab-active px-5 py-3 rounded-xl font-semibold">Повара</button>
    <button id="tabBtnProd" onclick="setTab('prod')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">График</button>
    <button id="tabBtnStock" onclick="setTab('stock')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">Склад</button>
    <button id="tabBtnReports" onclick="setTab('reports')" class="tab-inactive px-5 py-3 rounded-xl font-semibold">Отчёты</button>
  </div>

  <!-- ЭКРАН ШЕФА -->
  <div id="tab-kitchen" class="hidden glass rounded-2xl p-6">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold mb-2">Экран Шефа 🧱</h2>
      <p id="restNameKitchen" class="text-xl font-semibold text-orange-500 mb-1">Загрузка...</p>
      <p class="text-zinc-400 text-sm">HotPit Kitchen OS</p>
    </div>

    <div class="grid gap-3 max-w-md mx-auto">
      <button class="glass rounded-2xl p-5 flex items-center gap-4 text-left bg-gradient-to-r from-orange-600 to-orange-700 text-white">
        <i data-lucide="package-plus" class="w-8 h-8"></i>
        <div>
          <p class="font-bold text-lg">1. Приход товара</p>
          <p class="text-xs opacity-80">Накладные, поставки</p>
        </div>
      </button>

      <button class="glass rounded-2xl p-5 flex items-center gap-4 text-left bg-gradient-to-r from-orange-600 to-orange-700 text-white">
        <i data-lucide="clipboard-list" class="w-8 h-8"></i>
        <div>
          <p class="font-bold text-lg">2. Создать задание</p>
          <p class="text-xs opacity-80">Для поваров</p>
        </div>
      </button>

      <button onclick="setTab('prod')" class="glass rounded-2xl p-5 flex items-center gap-4 text-left bg-gradient-to-r from-orange-600 to-orange-700 text-white">
        <i data-lucide="calendar" class="w-8 h-8"></i>
        <div>
          <p class="font-bold text-lg">4. График смен</p>
          <p class="text-xs opacity-80">Таймлайн поваров</p>
        </div>
      </button>

      <button onclick="setTab('stock')" class="glass rounded-2xl p-5 flex items-center gap-4 text-left bg-gradient-to-r from-orange-600 to-orange-700 text-white">
        <i data-lucide="warehouse" class="w-8 h-8"></i>
        <div>
          <p class="font-bold text-lg">Мой склад</p>
          <p class="text-xs opacity-80">Остатки на сегодня</p>
        </div>
      </button>
    </div>
  </div>

  <!-- ПОВАРА -->
  <div id="tab-staff" class="glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Повара</h2>
    <div class="flex gap-3 mb-6">
      <input id="newStaffName" placeholder="Имя повара" class="flex-1 glass rounded-xl p-3 outline-none">
      <button onclick="addStaff()" class="btn-primary px-8 rounded-xl font-bold">+ Добавить</button>
    </div>
    <div id="staffList" class="space-y-4"></div>
  </div>

  <!-- ГРАФИК КОСМОС -->
  <div id="tab-prod" class="hidden glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold" id="dateTitle">30 Мая, Пятница</h2>
      <input type="date" id="dateInput" class="glass rounded-xl px-4 py-2 outline-none" onchange="loadShifts()">
    </div>

    <div id="timelineContainer" class="space-y-6">
      <!-- Сюда вставятся таймлайны поваров -->
    </div>

    <div class="glass rounded-xl p-4 mt-8">
      <div class="flex justify-between items-center">
        <span class="text-zinc-400 text-lg">ИТОГО ФОТ ЗА ДЕНЬ:</span>
        <span id="totalPay" class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">0₽</span>
      </div>
    </div>
  </div>

  <!-- СКЛАД -->
  <div id="tab-stock" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Склад</h2>
    <div id="balanceList" class="space-y-2"></div>
  </div>

  <!-- ОТЧЁТЫ -->
  <div id="tab-reports" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Отчёты</h2>
    <p class="text-zinc-500">В разработке</p>
  </div>
</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
const restaurantId = urlParams.get('rest');
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
updateDateTitle();

let currentTab = 'staff';
let staffList = [];

function setTab(tab) {
  currentTab = tab;
  ['kitchen','staff','prod','stock','reports'].forEach(t => {
    document.getElementById('tab-'+t).classList.add('hidden');
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'tab-inactive px-5 py-3 rounded-xl font-semibold';
  });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1)).className = 'tab-active px-5 py-3 rounded-xl font-semibold';
  if(tab === 'prod') loadShifts();
  if(tab === 'kitchen') loadRestaurantNameKitchen();
}

function updateDateTitle() {
  const date = new Date(document.getElementById('dateInput').value);
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'];
  document.getElementById('dateTitle').innerText = `${date.getDate()} ${months[date.getMonth()]}, ${days[date.getDay()]}`;
}

async function loadRestaurantNameKitchen() {
  const nameEl = document.getElementById('restNameKitchen');
  if (!restaurantId) {
    nameEl.textContent = 'Ошибка: нет ID ресторана';
    return;
  }

  const { data, error } = await _supabase
   .from('restaurants')
   .select('name')
   .eq('id', restaurantId)
   .single();

  if (error) {
    nameEl.textContent = 'Ошибка загрузки';
    console.error(error);
    return;
  }

  nameEl.textContent = data?.name || 'Ресторан';
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return;
  await _supabase.from('staff').insert({ restaurant_id: restaurantId, name, role: 'staff', pay_type: 'hourly', hourly_rate: 300, daily_rate: 0 });
  document.getElementById('newStaffName').value = '';
  loadStaff();
}

async function loadStaff() {
  const { data } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);
  staffList = data || [];
  document.getElementById('staffList').innerHTML = staffList.map(s => `
    <div class="glass rounded-2xl p-5">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full flex items-center justify-center font-bold text-black text-xl">${s.name[0]}</div>
          <div class="font-bold text-xl">${s.name}</div>
        </div>
        <button onclick="deleteStaff('${s.id}')" class="text-zinc-500 hover:text-red-400 p-2">
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </button>
      </div>
      <div class="flex gap-2">
        <button onclick="setPayType('${s.id}', 'hourly')" class="${s.pay_type==='hourly'? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Почасовой</button>
        <button onclick="setPayType('${s.id}', 'daily')" class="${s.pay_type==='daily'? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Фикс</button>
      </div>
      <input type="number" value="${s.pay_type==='hourly'? s.hourly_rate : s.daily_rate}" onchange="saveRate('${s.id}', '${s.pay_type}', this.value)" class="w-full glass rounded-xl p-3 mt-3 outline-none text-lg font-semibold">
    </div>
  `).join('');
  lucide.createIcons();
}

async function setPayType(id, type) {
  await _supabase.from('staff').update({ pay_type: type }).eq('id', id);
  loadStaff();
}

async function deleteStaff(id) {
  if(!confirm('Удалить?')) return;
  await _supabase.from('staff').delete().eq('id', id);
  loadStaff();
}

async function saveRate(id, type, val) {
  const field = type === 'hourly'? 'hourly_rate' : 'daily_rate';
  await _supabase.from('staff').update({ [field]: parseFloat(val) }).eq('id', id);
}

// ТАЙМЛАЙН КОСМОС
async function loadShifts() {
  updateDateTitle();
  const date = document.getElementById('dateInput').value;
  const { data: shifts } = await _supabase
  .from('work_schedules')
  .select('*, staff(id,name,pay_type,hourly_rate,daily_rate)')
  .eq('date', date);

  const container = document.getElementById('timelineContainer');
  let totalPay = 0;

  container.innerHTML = staffList.map(st => {
    const shift = shifts?.find(s => s.staff_id === st.id);
    let start = shift? parseInt(shift.start_time.split(':')[0]) : 9;
    let end = shift? parseInt(shift.end_time.split(':')[0]) : 18;
    let hours = end - start;

    let pay = 0;
    if(st.pay_type === 'hourly') {
      pay = hours * (st.hourly_rate || 0);
    } else {
      pay = st.daily_rate || 0;
      hours = 'фикс';
    }
    totalPay += pay;

    // Рисуем шкалу 6:00 до 24:00
    const hoursHtml = Array.from({length: 18}, (_, i) =>
      `<div class="timeline-hour" style="left: ${i*5.55}%">${i+6}:00</div>`
    ).join('');

    const barLeft = (start - 6) * 5.55;
    const barWidth = hours * 5.55;

    return `
      <div>
        <div class="flex justify-between mb-2">
          <span class="font-bold text-lg">${st.name}</span>
          <span class="text-2xl font-bold text-green-400">+${pay}₽</span>
        </div>
        <div class="timeline" id="timeline-${st.id}" onclick="createShift(event, '${st.id}')">
          ${hoursHtml}
          ${shift? `<div class="timeline-bar" style="left: ${barLeft}%; width: ${barWidth}%" onmousedown="startDrag(event, '${st.id}')"></div>` : ''}
        </div>
        <div class="text-zinc-500 text-sm mt-1">${shift? `${shift.start_time.slice(0,5)} - ${shift.end_time.slice(0,5)} = ${hours}ч` : 'Нажми на шкалу чтобы добавить смену'}</div>
      </div>
    `;
  }).join('');

  document.getElementById('totalPay').innerText = totalPay + '₽';
}

async function createShift(e, staffId) {
  const timeline = e.currentTarget;
  const rect = timeline.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const hour = Math.round(6 + (x / rect.width) * 18);

  const date = document.getElementById('dateInput').value;
  await _supabase.from('work_schedules').insert({
    restaurant_id: restaurantId,
    staff_id: staffId,
    date: date,
    start_time: `${hour}:00`,
    end_time: `${hour+8}:00`,
    status: 'active'
  });
  loadShifts();
}

function startDrag(e, staffId) {
  e.stopPropagation();
  // Упрощённо: пока клик создаёт смену. Драг сделаем в версии 2.0
  alert('Версия 2.0: тащи полосу пальцем. Пока жми на шкалу для создания смены');
}

loadStaff();
</script>
</body>
</html>
