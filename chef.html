<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit Шеф</title>
<style>
:root{--bg:#0a0a0a;--card:#171717;--card-2:#262626;--text:#f5f5f5;--muted:#a3a3a3;--accent:#f97316;--radius:20px;--ok:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -20%,rgba(249,115,22,0.12),transparent),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--card);border-right:1px solid #262626;padding:20px;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:95;transition:transform.3s}
.sidebar.open{transform:translateX(0)}
.sidebar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.sidebar h2{color:var(--accent);font-size:24px}
.sidebar.sub{color:var(--muted);font-size:12px}
.menu{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.menu button{background:transparent;border:none;color:var(--text);text-align:left;padding:12px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:500}
.menu button.active,.menu button:hover{background:var(--card-2)}
.content{flex:1;padding:24px;margin-left:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
.topbar h1{font-size:28px}
.burger,.close-btn{background:var(--card-2);border:1px solid #333;color:var(--text);padding:10px 16px;border-radius:12px;cursor:pointer;font-size:20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;z-index:90}
.overlay.show{display:block}
.card{background:var(--card);padding:24px;border-radius:20px;margin-bottom:16px;border:1px solid #262626}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.btn{padding:12px 20px;border:none;border-radius:12px;background:var(--accent);color:#000;font-weight:700;font-size:15px;cursor:pointer}
.btn-danger{background:#ef4444;color:#fff}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
input,textarea{width:100%;padding:12px;background:var(--card-2);border:1px solid #333;border-radius:12px;color:var(--text);margin-top:8px;font-size:15px;font-family:inherit}
.muted{color:var(--muted);font-size:14px}
.err{color:#f87171} .ok{color:var(--ok)}

/* КРАСИВЫЕ КАРТОЧКИ ПОВАРОВ */
.povar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.povar-card{background:var(--card-2);padding:20px;border-radius:16px;border:1px solid #333;display:flex;flex-direction:column;gap:12px;transition:.2s}
.povar-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.povar-head{display:flex;align-items:center;gap:12px}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:18px}
.povar-name{font-weight:700;font-size:16px}
.povar-role{color:var(--muted);font-size:13px}
.povar-info{display:flex;justify-content:space-between;font-size:14px}
.status{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(34,197,94,0.1);color:var(--ok)}

/* МОДАЛКА */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-card{background:var(--card);padding:24px;border-radius:20px;width:100%;max-width:420px;border:1px solid #333}
@media(min-width:901px){.sidebar{position:static;transform:translateX(0)}.content{margin-left:260px}.burger,.close-btn{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>HotPit</h2>
      <button class="close-btn" id="closeBtn">×</button>
    </div>
    <div class="sub" id="restName">Загрузка...</div>
    <nav class="menu">
      <button class="tab-btn active" data-tab="personal">👥 Моя Команда</button>
      <button class="tab-btn" data-tab="grafik">📅 График</button>
      <button class="tab-btn" data-tab="sklad">📦 Склад</button>
      <button id="logoutBtn">Выйти</button>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:16px">
        <button class="burger" id="burgerBtn">☰</button>
        <h1 id="pageTitle">Моя Команда</h1>
      </div>
      <button class="btn" id="addPovarBtn">+ Добавить повара</button>
    </div>
    
    <div id="tab-content">
      <div class="card" data-tab-content="personal">
        <div class="card-header">
          <h3>Повара</h3>
          <div class="muted" id="povarCount">0 человек</div>
        </div>
        <div id="povaraList" class="povar-grid">Загрузка...</div>
      </div>
      <div class="card" data-tab-content="grafik" style="display:none"><h3>График</h3><div>Тут Шеф ставит поваров на смену.</div></div>
      <div class="card" data-tab-content="sklad" style="display:none"><h3>Склад</h3><div>Тут Шеф делает списания.</div></div>
    </div>
  </main>
</div>

<!-- МОДАЛКА ДОБАВЛЕНИЯ ПОВАРА -->
<div class="modal" id="addPovarModal">
  <div class="modal-card">
    <h3 style="margin-bottom:16px">Новый повар</h3>
    <input id="newPovarName" placeholder="ФИО повара">
    <input id="newPovarEmail" type="email" placeholder="Email повара">
    <input id="newPovarPass" type="password" placeholder="Пароль 6+ символов">
    <input id="newPovarSalary" type="number" placeholder="Зарплата в месяц">
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-outline" id="cancelPovarBtn" style="flex:1">Отмена</button>
      <button class="btn" id="savePovarBtn" style="flex:1">Создать</button>
    </div>
    <div id="povarMsg" style="margin-top:12px"></div>
  </div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// UI
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('burgerBtn').onclick = ()=>{sidebar.classList.add('open');overlay.classList.add('show');}
document.getElementById('closeBtn').onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show');}
overlay.onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show');}
const tabBtns = document.querySelectorAll('.tab-btn');
const pageTitle = document.getElementById('pageTitle');
const tabContents = document.querySelectorAll('[data-tab-content]');
tabBtns.forEach(btn=>{btn.onclick = ()=>{tabBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');const tab = btn.dataset.tab;pageTitle.textContent = btn.textContent.replace(/[^a-zA-Zа-яА-Я ]/g, '').trim();tabContents.forEach(c=>c.style.display = c.dataset.tabContent === tab? 'block' : 'none');sidebar.classList.remove('open'); overlay.classList.remove('show');}});
document.getElementById('logoutBtn').onclick = ()=>supabase.auth.signOut().then(()=>location.href='/index.html');

// МОДАЛКА
const modal = document.getElementById('addPovarModal');
document.getElementById('addPovarBtn').onclick = ()=>modal.classList.add('show');
document.getElementById('cancelPovarBtn').onclick = ()=>modal.classList.remove('show');
modal.onclick = (e)=>{if(e.target===modal) modal.classList.remove('show');}

let myRestaurantId = null;
let myUserId = null;

window.requestDismiss = async(povarId, povarName)=>{
  const reason = prompt(`Причина увольнения для: ${povarName}`);
  if(!reason) return;
  const hasDebt = confirm('У повара есть задолженность/штрафы?');
  let cookComment = null;
  if(hasDebt) cookComment = prompt('Напиши сумму долга или комментарий:');
  
  const {error} = await supabase.from('dismiss_requests').insert({user_id: povarId,restaurant_id: myRestaurantId,requested_by: myUserId,reason: reason,has_debt: hasDebt,cook_comment: cookComment,status: 'chef_requested'});
  if(error) return alert('Ошибка: '+error.message);
  alert('Запрос отправлен Овнеру');
  init();
}

// БЕТОН: СОЗДАНИЕ ПОВАРА ШЕФОМ
document.getElementById('savePovarBtn').onclick = async ()=>{
  const name = document.getElementById('newPovarName').value.trim();
  const email = document.getElementById('newPovarEmail').value.trim();
  const pass = document.getElementById('newPovarPass').value;
  const salary = document.getElementById('newPovarSalary').value;
  const msg = document.getElementById('povarMsg');
  msg.innerHTML = '';

  if(!name || !email || pass.length < 6) return msg.innerHTML = `<div class="err">Заполни все поля. Пароль 6+</div>`;
  
  document.getElementById('savePovarBtn').disabled = true;
  msg.innerHTML = `<div class="muted">Создаем...</div>`;

  const {data: signUpData, error: signUpErr} = await supabase.auth.signUp({email, password: pass, options: { emailRedirectTo: undefined }});
  if(signUpErr) {document.getElementById('savePovarBtn').disabled = false; return msg.innerHTML = `<div class="err">${signUpErr.message}</div>`;}
  if(!signUpData.session) {document.getElementById('savePovarBtn').disabled = false; return msg.innerHTML = `<div class="err">Выключи "Confirm email" в Supabase</div>`;}

  const {error: profErr} = await supabase.from('profiles').insert({id: signUpData.user.id, full_name: name, role: 'cook', restaurant_id: myRestaurantId, salary: salary, is_active: true});
  if(profErr) {document.getElementById('savePovarBtn').disabled = false; return msg.innerHTML = `<div class="err">${profErr.message}</div>`;}

  msg.innerHTML = `<div class="ok">Повар создан!</div>`;
  setTimeout(()=>{modal.classList.remove('show'); init();}, 1000);
}

async function init() {
  const {data:{user}} = await supabase.auth.getUser();
  if(!user) return location.href='/index.html';
  myUserId=user.id;
  
  const {data: prof, error} = await supabase.from('profiles').select('restaurant_id, role, restaurants(name)').eq('id',user.id).single();
  if(error ||!prof || prof.role!=='chef') return location.href='/index.html';
  
  myRestaurantId = prof.restaurant_id;
  document.getElementById('restName').textContent = prof.restaurants.name;
  
  const {data:povara} = await supabase.from('profiles').select('id, full_name, role, salary').eq('restaurant_id', myRestaurantId).eq('is_active', true).eq('role', 'cook').order('full_name');
  
  document.getElementById('povarCount').textContent = `${povara.length} человек`;
  document.getElementById('povaraList').innerHTML = povara.length? povara.map(p=>`
    <div class="povar-card">
      <div class="povar-head">
        <div class="avatar">${p.full_name[0]}</div>
        <div>
          <div class="povar-name">${p.full_name}</div>
          <div class="povar-role">${p.role}</div>
        </div>
      </div>
      <div class="povar-info">
        <span>Зарплата</span>
        <span><b>${p.salary||0}р/мес</b></span>
      </div>
      <div class="povar-info">
        <span>Статус</span>
        <span class="status">Работает</span>
      </div>
      <button class="btn-danger" onclick="requestDismiss('${p.id}','${p.full_name}')">Запросить увольнение</button>
    </div>
  `).join('') : '<div class="muted" style="grid-column:1/-1;text-align:center;padding:40px">Нажми "+ Добавить повара" чтобы начать</div>';
}
init();
</script></body></html>
