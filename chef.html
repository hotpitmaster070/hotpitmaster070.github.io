<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit Кухня</title>
<style>
:root{--bg:#0a0a0a;--card:#171717;--card-2:#262626;--text:#f5f5f5;--muted:#a3a3a3;--accent:#f97316;--ok:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -20%,rgba(249,115,22,0.12),transparent),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--card);border-right:1px solid #262626;padding:20px;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:95;transition:transform.3s}
.sidebar.open{transform:translateX(0)}
.sidebar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.sidebar h2{color:var(--accent);font-size:24px}
.sidebar.sub{color:var(--muted);font-size:12px}
.menu{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.menu button{background:transparent;border:none;color:var(--text);text-align:left;padding:12px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:500}
.menu button.active,.menu button:hover{background:var(--card-2)}
.content{flex:1;padding:24px;margin-left:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
.topbar h1{font-size:28px}
.top-controls{display:flex;gap:10px;margin-bottom:20px}
.btn-nav{padding:12px 18px;border:none;border-radius:12px;background:var(--card-2);color:var(--text);font-weight:700;cursor:pointer}
.btn-month{padding:12px;border:none;border-radius:12px;background:var(--card-2);color:var(--text);font-weight:600;cursor:pointer;flex:1}
.burger,.close-btn{background:var(--card-2);border:1px solid #333;color:var(--text);padding:10px 16px;border-radius:12px;cursor:pointer;font-size:20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;z-index:90}
.overlay.show{display:block}
.btn{padding:12px 20px;border:none;border-radius:12px;background:var(--accent);color:#000;font-weight:700;font-size:15px;cursor:pointer;width:100%}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
input,select{width:100%;padding:12px;background:var(--card-2);border:1px solid #333;border-radius:12px;color:var(--text);margin-top:8px;font-size:15px}
.muted{color:var(--muted);font-size:14px}.err{color:#f87171}.ok{color:var(--ok)}
.povar-list{display:flex;flex-direction:column;gap:16px}
.povar-card{background:var(--card);padding:20px;border-radius:20px;border:1px solid #262626}
.povar-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:18px}
.povar-name{font-weight:700;font-size:18px}
.povar-role{color:var(--muted);font-size:14px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:12px}
.day{aspect-ratio:1;border-radius:12px;background:var(--card-2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;font-weight:500}
.day.active{background:var(--ok);color:#000;font-weight:700}
.total{margin-top:16px;padding-top:16px;border-top:1px solid #333;display:flex;justify-content:space-between;font-weight:700;font-size:16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-card{background:var(--card);padding:24px;border-radius:20px;width:100%;max-width:420px;border:1px solid #333}
@media(min-width:901px){.sidebar{position:static;transform:translateX(0)}.content{margin-left:260px}.burger,.close-btn{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head"><h2>HotPit</h2><button class="close-btn" id="closeBtn">×</button></div>
    <div class="sub" id="restName">Загрузка...</div>
    <nav class="menu">
      <button class="tab-btn active" data-tab="personal">👥 Моя Команда</button>
      <button class="tab-btn" data-tab="grafik">📅 График</button>
      <button class="tab-btn" data-tab="sklad">📦 Склад</button>
      <button id="logoutBtn">Выйти</button>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:16px">
        <button class="burger" id="burgerBtn">☰</button>
        <h1 id="pageTitle">Кухня</h1>
      </div>
      <button class="btn" id="addPovarBtn">+ Добавить сотрудника</button>
    </div>
    
    <div id="tab-content">
      <div data-tab-content="personal">
        <div class="top-controls">
          <button class="btn-nav" id="prevMonth"><</button>
          <button class="btn-month" id="monthYear">Загрузка...</button>
          <button class="btn-nav" id="nextMonth">></button>
        </div>
        <div id="povaraList" class="povar-list">Загрузка...</div>
      </div>
      <div class="card" data-tab-content="grafik" style="display:none"><h3>График</h3><div>Тут общий график на месяц</div></div>
      <div class="card" data-tab-content="sklad" style="display:none"><h3>Склад</h3><div>Тут списания</div></div>
    </div>
  </main>
</div>

<!-- МОДАЛКА -->
<div class="modal" id="addPovarModal">
  <div class="modal-card">
    <h3 style="margin-bottom:16px">Новый сотрудник</h3>
    <input id="newPovarName" placeholder="ФИО">
    <input id="newPovarEmail" type="email" placeholder="Email">
    <input id="newPovarPass" type="password" placeholder="Пароль 6+">
    <select id="newPovarRole"><option>Повар</option><option>Мойщик</option><option>Су-шеф</option></select>
    <select id="salaryType">
      <option value="hourly">Оплата за час</option>
      <option value="daily">Оплата за смену</option>
      <option value="fixed">Оклад в месяц</option>
    </select>
    <input id="newPovarSalary" type="number" placeholder="Ставка: 5 или 1000">
    <div id="povarMsg" style="margin-top:12px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-outline" id="cancelPovarBtn" style="flex:1">Отмена</button>
      <button class="btn" id="savePovarBtn" style="flex:1">Создать</button>
    </div>
  </div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// UI
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('burgerBtn').onclick = ()=>{sidebar.classList.add('open');overlay.classList.add('show');}
document.getElementById('closeBtn').onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show');}
overlay.onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show');}
document.querySelectorAll('.tab-btn').forEach(btn=>{btn.onclick = ()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('[data-tab-content]').forEach(c=>c.style.display = c.dataset.tabContent === btn.dataset.tab? 'block' : 'none');sidebar.classList.remove('open'); overlay.classList.remove('show');}});
document.getElementById('logoutBtn').onclick = ()=>supabase.auth.signOut().then(()=>location.href='/index.html');

// МОДАЛКА
const modal = document.getElementById('addPovarModal');
document.getElementById('addPovarBtn').onclick = ()=>modal.classList.add('show');
document.getElementById('cancelPovarBtn').onclick = ()=>modal.classList.remove('show');

let myRestaurantId = null;
let currentDate = new Date(2026, 6, 1); // Июль 2026
let attendanceCache = {};

function updateMonth() {
  document.getElementById('monthYear').textContent = currentDate.toLocaleString('ru', {month: 'long', year: 'numeric'});
  init();
}
document.getElementById('prevMonth').onclick = ()=>{currentDate.setMonth(currentDate.getMonth()-1); updateMonth();}
document.getElementById('nextMonth').onclick = ()=>{currentDate.setMonth(currentDate.getMonth()+1); updateMonth();}

document.getElementById('savePovarBtn').onclick = async ()=>{
  const name = document.getElementById('newPovarName').value.trim();
  const email = document.getElementById('newPovarEmail').value.trim();
  const pass = document.getElementById('newPovarPass').value;
  const role = document.getElementById('newPovarRole').value;
  const salaryType = document.getElementById('salaryType').value;
  const salary = document.getElementById('newPovarSalary').value;
  const msg = document.getElementById('povarMsg');
  
  document.getElementById('savePovarBtn').disabled = true;
  msg.innerHTML = `<div class="muted">Создаем...</div>`;

  const {data: signUpData, error: signUpErr} = await supabase.auth.signUp({email, password: pass});
  
  if(signUpErr) {msg.innerHTML = `<div class="err">${signUpErr.message}</div>`; document.getElementById('savePovarBtn').disabled = false; return;}
  if(!signUpData.user) {msg.innerHTML = `<div class="err">Выключи "Confirm email" в Supabase</div>`; document.getElementById('savePovarBtn').disabled = false; return;}

  const {error: profErr} = await supabase.from('profiles').insert({
    id: signUpData.user.id, full_name: name, role: 'cook', job_title: role, 
    restaurant_id: myRestaurantId, salary: Number(salary), salary_type: salaryType, is_active: true
  });
  
  if(profErr) {msg.innerHTML = `<div class="err">${profErr.message}</div>`; document.getElementById('savePovarBtn').disabled = false; return;}

  msg.innerHTML = `<div class="ok">Готово!</div>`;
  setTimeout(()=>{modal.classList.remove('show'); init();}, 800);
}

async function toggleDay(cookId, dateStr, el) {
  el.classList.toggle('active');
  const isActive = el.classList.contains('active');
  if(isActive){ await supabase.from('attendance').insert({cook_id: cookId, restaurant_id: myRestaurantId, work_date: dateStr}); } 
  else { await supabase.from('attendance').delete().eq('cook_id', cookId).eq('work_date', dateStr); }
  renderTotal(cookId);
}

function renderTotal(cookId) {
  const data = attendanceCache[cookId]; if(!data) return;
  const {cook, days} = data; const daysCount = days.length; let total = 0; let text = '';
  if(cook.salary_type === 'daily') {total = daysCount * cook.salary; text = `${daysCount} смен х ${cook.salary}₽ = ${total.toLocaleString()}₽`}
  if(cook.salary_type === 'hourly') {total = daysCount * 8 * cook.salary; text = `${daysCount} смен х 8ч х ${cook.salary}₽ = ${total.toLocaleString()}₽`}
  if(cook.salary_type === 'fixed') {total = cook.salary; text = `Оклад: ${total.toLocaleString()}₽`}
  document.getElementById(`total-${cookId}`).textContent = text;
}

async function init() {
  try{
    const {data:{user}} = await supabase.auth.getUser();
    if(!user) return location.href='/index.html';
    
    const {data: prof, error} = await supabase.from('profiles').select('restaurant_id, restaurants(name)').eq('id',user.id).single();
    if(error) throw error;
    if(!prof ||!prof.restaurant_id) throw new Error('У тебя нет ресторана. Зайди через Овнера и привяжи себя');
    
    myRestaurantId = prof.restaurant_id;
    document.getElementById('restName').textContent = prof.restaurants.name;
    
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const monthEnd = `${year}-${String(month+1).padStart(2,'0')}-${daysInMonth}`;
    document.getElementById('monthYear').textContent = currentDate.toLocaleString('ru', {month: 'long', year: 'numeric'});

    const {data:povara} = await supabase.from('profiles').select('*').eq('restaurant_id', myRestaurantId).eq('is_active', true).eq('role', 'cook').order('full_name');
    const {data:attendance} = await supabase.from('attendance').select('*').eq('restaurant_id', myRestaurantId).gte('work_date', monthStart).lte('work_date', monthEnd);
    
    attendanceCache = {};
    povara.forEach(p=>{attendanceCache[p.id] = {cook: p, days: attendance.filter(a=>a.cook_id===p.id).map(a=>a.work_date)}});
    
    if(povara.length === 0){
      document.getElementById('povaraList').innerHTML = `<div class="muted" style="text-align:center;padding:40px">Команда пуста. Добавь первого сотрудника 👨‍🍳</div>`;
      return;
    }

    document.getElementById('povaraList').innerHTML = povara.map(p=>{
      let salaryText = '';
      if(p.salary_type==='hourly') salaryText = `${p.salary}₽/ч`;
      if(p.salary_type==='daily') salaryText = `${p.salary}₽/смена`;
      if(p.salary_type==='fixed') salaryText = `${Number(p.salary).toLocaleString()}₽/мес`;
      
      const daysHtml = Array.from({length: daysInMonth}, (_, i)=>{
        const day = i+1;
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isActive = attendanceCache[p.id].days.includes(dateStr);
        return `<div class="day ${isActive?'active':''}" onclick="toggleDay('${p.id}','${dateStr}',this)">${day}</div>`
      }).join('');
      
      return `
      <div class="povar-card">
        <div class="povar-head">
          <div class="avatar">${p.full_name[0]}</div>
          <div>
            <div class="povar-name">${p.full_name}</div>
            <div class="povar-role">${p.job_title||'Повар'} • ${salaryText}</div>
          </div>
        </div>
        <div class="calendar-grid">${daysHtml}</div>
        <div class="total" id="total-${p.id}">Считаем...</div>
      </div>
      `
    }).join('');
    
    povara.forEach(p=>renderTotal(p.id));
  } catch(e){
    document.getElementById('povaraList').innerHTML = `<div class="err">Ошибка: ${e.message}</div>`;
    console.error(e);
  }
}
init();
window.toggleDay = toggleDay;
</script></body></html>
