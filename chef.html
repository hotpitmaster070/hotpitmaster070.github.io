<div class="max-w-4xl mx-auto">

  <!-- ТАБ ПРОИЗВОДСТВО -->

    <div class="bg-zinc-800 rounded-xl p-4 mb-4">

      <input id="dateInput" type="date" class="bg-zinc-700 rounded-lg px-3 py-2 mb-3 w-full">

        <select id="staffSelect" class="flex-1 bg-zinc-700 rounded-lg px-3 py-2"></select>

  <!-- ТАБ ОТЧЁТЫ -->

</div>

<script>

// ===== ТАБЫ =====
function setTab(tab) {
  currentTab = tab;
  ['staff','stock','prod','reports'].forEach(t => {
    document.getElementById('tab-'+t).classList.add('hidden');
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'tab-inactive px-4 py-2 rounded-lg font-semibold';
  });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1)).className = 'tab-active px-4 py-2 rounded-lg font-semibold';
  if(tab === 'stock') refreshBalance();
}

// ===== РЕАЛЬНЫЙ ОСТАТОК =====
async function refreshBalance() {
  const { data: inventory } = await _supabase.from('inventory').select('*').eq('restaurant_id', restaurantId);
  document.getElementById('balanceList').innerHTML = inventory.map(item => {
    const realQty = item.quantity;
    const isLow = realQty <= item.min_quantity && item.min_quantity > 0;
    return `
      <div class="flex justify-between items-center p-2 rounded ${isLow? 'bg-red-950/40' : 'bg-zinc-800'}">
        <span class="${isLow? 'text-red-400 font-semibold' : ''}">${item.name}</span>
        <span class="${isLow? 'text-red-400 font-bold' : 'text-zinc-300'}">${realQty} ${item.unit}</span>
      </div>
    `;
  }).join('') || '<p class="text-zinc-500">Товаров нет</p>';
  checkAlerts(inventory);
}

async function showInventory() {
  document.getElementById('inventoryTable').classList.remove('hidden');
  const { data } = await _supabase.from('inventory').select('*').eq('restaurant_id', restaurantId);
  document.getElementById('inventoryBody').innerHTML = data.map(item => `
    <tr class="border-b border-zinc-800 ${item.quantity <= item.min_quantity? 'bg-red-950/30' : ''}">
      <td class="p-3">${item.name}</td>
      <td class="p-3 text-right font-semibold ${item.quantity <= item.min_quantity? 'text-red-400' : ''}">${item.quantity}</td>
      <td class="p-3 text-right text-zinc-400">${item.unit}</td>
      <td class="p-3 text-right">
        <input type="number" value="${item.min_quantity || 0}"
          onchange="updateMinStock('${item.id}', this.value)"
          class="w-20 bg-zinc-800 rounded px-2 py-1 text-right border-zinc-700 focus:border-orange-500 outline-none">
      </td>
      <td class="p-3 text-center">
        ${item.quantity <= item.min_quantity?
          `<button onclick="addToOrder('${item.id}')" class="text-orange-400 text-xs">+ В заказ</button>` : ''}
      </td>
    </tr>
  `).join('');
  lucide.createIcons();
}

async function updateMinStock(id, value) {
  await _supabase.from('inventory').update({ min_quantity: parseFloat(value) || 0 }).eq('id', id);
  showInventory();
  refreshBalance();
}

async function checkAlerts(items) {
  const lowStock = items.filter(i => i.quantity <= i.min_quantity && i.min_quantity > 0);
  if (lowStock.length > 0) {
    document.getElementById('stockAlerts').classList.remove('hidden');
    document.getElementById('alertBadge').classList.remove('hidden');
    document.getElementById('alertBadge').innerText = lowStock.length;
    document.getElementById('alertsList').innerHTML = lowStock.map(i =>
      `<div class="text-red-400">🔴 ${i.name}: ${i.quantity}${i.unit} / лимит ${i.min_quantity}${i.unit}</div>`
    ).join('');
  } else {
    document.getElementById('stockAlerts').classList.add('hidden');
    document.getElementById('alertBadge').classList.add('hidden');
  }
}

function openIncome() { alert('Модалка Прихода - следующий шаг'); }
function openWriteoff() { alert('Модалка Списания - следующий шаг'); }
function openInventory() { alert('Инвентаризация - следующий шаг'); }
function showAlerts() { refreshBalance(); }
async function addToOrder(productId) { alert('Товар добавлен в черновик заказа'); }

// ===== ПЕРСОНАЛ =====
async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return;
  await _supabase.from('staff').insert({
    restaurant_id: restaurantId,
    name: name,
    role: 'staff',
    pay_type: 'hourly',
    hourly_rate: 0,
    daily_rate: 0
  });
  document.getElementById('newStaffName').value = '';
  loadStaff();
}

async function deleteStaff(id) {
  if (!confirm('Удалить повара?')) return;
  await _supabase.from('staff').delete().eq('id', id);
  loadStaff();
}

async function updateStaff(id, field, value) {
  await _supabase.from('staff').update({ [field]: parseFloat(value) || value }).eq('id', id);
  loadStaff();
}

async function loadStaff() {
  const { data } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);
  document.getElementById('staffList').innerHTML = data.map(s => `
    <div class="bg-zinc-800 rounded-lg p-4 border-zinc-700">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-2">
          <i data-lucide="user" class="w-4 h-4 text-zinc-400"></i>
          <span class="font-semibold">${s.name}</span>
          <span class="text-zinc-500 text-sm">${s.role === 'owner'? 'Шеф' : 'Повар'}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="showQR('${s.id}', '${s.name}')" class="text-purple-400 hover:text-purple-300">
            <i data-lucide="qr-code" class="w-4 h-4"></i>
          </button>
          ${s.role!== 'owner'? `<button onclick="deleteStaff('${s.id}')" class="text-red-400 hover:text-red-300">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>` : ''}
        </div>
      </div>
      ${s.role!== 'owner'? `
      <div class="flex gap-2 mb-3">
        <button onclick="updateStaff('${s.id}', 'pay_type', 'hourly')"
          class="flex-1 py-2 rounded-lg text-sm ${s.pay_type === 'hourly'? 'bg-orange-600' : 'bg-zinc-700'}">
          Почасовой
        </button>
        <button onclick="updateStaff('${s.id}', 'pay_type', 'daily')"
          class="flex-1 py-2 rounded-lg text-sm ${s.pay_type === 'daily'? 'bg-orange-600' : 'bg-zinc-700'}">
          Фикс за день
        </button>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div class="${s.pay_type === 'hourly'? '' : 'hidden'}">
          <label class="text-xs text-zinc-400">₽/час</label>
          <input type="number" value="${s.hourly_rate || 0}"
            onchange="updateStaff('${s.id}', 'hourly_rate', this.value)"
            class="w-full bg-zinc-700 rounded px-2 py-1 text-sm">
        </div>
        <div class="${s.pay_type === 'daily'? '' : 'hidden'}">
          <label class="text-xs text-zinc-400">₽/день</label>
          <input type="number" value="${s.daily_rate || 0}"
            onchange="updateStaff('${s.id}', 'daily_rate', this.value)"
            class="w-full bg-zinc-700 rounded px-2 py-1 text-sm">
        </div>
      </div>
      ` : ''}
    </div>
  `).join('') || '<p class="text-zinc-500 text-sm">Поваров пока нет</p>';

  document.getElementById('staffSelect').innerHTML = data
.filter(s => s.role!== 'owner')
.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  lucide.createIcons();
}

function showQR(staffId, name) {
  const checkinURL = `${window.location.origin}/staff.html?staff=${staffId}&rest=${restaurantId}&type=checkin`;
  const checkoutURL = `${window.location.origin}/staff.html?staff=${staffId}&rest=${restaurantId}&type=checkout`;
  const html = `
  <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onclick="this.remove()">
    <div class="bg-zinc-900 rounded-xl p-6 max-w-sm w-full text-center" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-4">QR для ${name}</h3>
      <div class="space-y-4">
        <div><p class="text-sm text-zinc-400 mb-2">Приход</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkinURL)}" class="mx-auto rounded-lg">
        </div>
        <div><p class="text-sm text-zinc-400 mb-2">Уход</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkoutURL)}" class="mx-auto rounded-lg">
        </div>
        <button onclick="this.closest('.fixed').remove()" class="w-full mt-4 bg-zinc-700 hover:bg-zinc-600 rounded-lg p-2">Закрыть</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function setView(view) {
  currentView = view;
  document.getElementById('btnDay').className = view === 'day'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  document.getElementById('btnWeek').className = view === 'week'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  document.getElementById('btnMonth').className = view === 'month'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  loadShifts();
}

async function addShift() {
  const staffId = document.getElementById('staffSelect').value;
  const date = document.getElementById('dateInput').value;
  const timeIn = document.getElementById('timeIn').value;
  const timeOut = document.getElementById('timeOut').value;
  if (!staffId) { alert('Выбери повара'); return; }

  const shiftRange = timeIn + '-' + timeOut;

  await _supabase.from('shifts').insert({
    restaurant_id: restaurantId,
    staff_id: staffId,
    date: date,
    shift_type: shiftRange,
    status: 'active'
  });
  loadShifts();
}

async function deleteShift(id) {
  if (!confirm('Удалить смену?')) return;
  await _supabase.from('shifts').delete().eq('id', id);
  loadShifts();
}

function calcHours(shiftRange) {
  if (!shiftRange ||!shiftRange.includes('-')) return 0;
  const [start, end] = shiftRange.split('-');
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let hours = (eh + em/60) - (sh + sm/60);
  return hours > 0? hours : 0;
}

async function loadShifts() {
  const selectedDate = document.getElementById('dateInput').value;
  let startDate, endDate, title;
  if (currentView === 'day') {
    startDate = selectedDate;
    endDate = selectedDate;
    title = `График на ${selectedDate.split('-').reverse().join('.')}`;
  } else if (currentView === 'week') {
    const date = new Date(selectedDate);
    const day = date.getDay();
    const diff = day === 0? 6 : day - 1;
    date.setDate(date.getDate() - diff);
    startDate = date.toISOString().split('T')[0];
    date.setDate(date.getDate() + 6);
    endDate = date.toISOString().split('T')[0];
    title = `Неделя ${startDate.split('-').reverse().join('.')} - ${endDate.split('-').reverse().join('.')}`;
  } else {
    startDate = selectedDate.slice(0,7) + '-01';
    const d = new Date(selectedDate.slice(0,7) + '-01');
    d.setMonth(d.getMonth() + 1);
    d.setDate(0);
    endDate = d.toISOString().split('T')[0];
    title = `Месяц ${startDate.slice(5,7)}.${startDate.slice(0,4)}`;
  }
  document.getElementById('scheduleTitle').innerText = title;

  const { data } = await _supabase.from('shifts')
.select('*, staff(id, name, hourly_rate, daily_rate, pay_type)')
.gte('date', startDate).lte('date', endDate)
.eq('restaurant_id', restaurantId).order('date');

  document.getElementById('todayShifts').innerHTML = data.map(s => {
    const hours = calcHours(s.shift_type);
    return `
    <div class="bg-zinc-800 rounded-lg p-3 border-zinc-700">
      <div class="flex justify-between items-center">
        <div>
          <div class="font-semibold">${s.staff.name}</div>
          <div class="text-xs text-zinc-400">${s.date.split('-').reverse().join('.')} • ${s.shift_type} • ${hours.toFixed(1)}ч</div>
        </div>
        <button onclick="deleteShift('${s.id}')" class="text-red-400 hover:text-red-300">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  `}).join('') || '<p class="text-zinc-500 text-sm text-center py-4">Смен нет</p>';
  lucide.createIcons();
}

async function showTodayReport() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await _supabase.from('shifts')
.select('*, staff(name, hourly_rate, daily_rate, pay_type)')
.eq('date', today)
.eq('restaurant_id', restaurantId)
.eq('status', 'active');

  let html = `<div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onclick="this.remove()">
    <div class="bg-zinc-900 rounded-xl p-6 max-w-md w-full" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-4">Табель на ${today.split('-').reverse().join('.')}</h3>
      <div class="space-y-2">`;

  if (!data || data.length === 0) {
    html += '<p class="text-zinc-500">Сегодня никто не работает</p>';
  } else {
    let totalPay = 0;
    html += data.map(s => {
      const hours = calcHours(s.shift_type);
      const pay = s.staff.pay_type === 'daily'? s.staff.daily_rate : hours * s.staff.hourly_rate;
      totalPay += pay;
      return `
      <div class="bg-zinc-800 rounded-lg p-3">
        <div class="font-semibold">${s.staff.name}</div>
        <div class="text-sm text-zinc-400">${s.shift_type} • ${hours.toFixed(1)}ч</div>
        <div class="text-sm text-green-400">Заработал: ${pay.toFixed(0)}₽</div>
      </div>`;
    }).join('');
    html += `<div class="border-t border-zinc-700 pt-3 mt-3 text-lg font-bold">Итого: ${totalPay.toFixed(0)}₽</div>`;
  }
  html += `</div><button onclick="this.closest('.fixed').remove()"
    class="w-full mt-4 bg-zinc-700 hover:bg-zinc-600 rounded-lg p-2">Закрыть</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function loadOrders() {
  const { data } = await _supabase.from('orders').select('*, suppliers(name)').eq('restaurant_id', restaurantId).order('created_at', {ascending: false});
  document.getElementById('ordersList').innerHTML = data.map(o => `
    <div class="bg-zinc-800 rounded-lg p-4">
      <div class="flex justify-between">
        <span>Заказ от ${o.order_date}</span>
        <span class="text-zinc-400">${o.status}</span>
      </div>
    </div>
  `).join('') || '<p class="text-zinc-500">Заказов пока нет</p>';
}
</script>
