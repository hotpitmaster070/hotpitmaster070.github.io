<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экран Шефа</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 30px; text-align: center; }
    .btn { width: 90%; max-width: 400px; padding: 18px; margin: 10px auto; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; display: block; cursor: pointer; }
    .btn-red { background: #ff3333; }
    .btn-gray { background: #555; }
    .card { background: #2c2c2e; padding: 20px; border-radius: 12px; margin: 15px auto; max-width: 400px; }
    .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #444; }
    .item small { color: #aaa; }
    input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1 id="rest_name">Экран Шефа 🧱</h1>

  <div class="card">
    <h3>Склад</h3>
    <div id="inventory_list">Загрузка...</div>
    <input id="prod_name" placeholder="Название продукта" />
    <input id="prod_qty" type="number" placeholder="Количество" />
    <input id="prod_unit" placeholder="Ед. изм: кг, шт" />
    <button class="btn btn-red" onclick="addInventory()">+ ДОБАВИТЬ НА СКЛАД</button>
  </div>

  <div class="card">
    <h3>Акт разделки</h3>
    <input id="prod_name_out" placeholder="Что готовим: Шашлык" />
    <input id="prod_qty_out" type="number" placeholder="Сколько получилось" />
    <input id="ingredients_json" placeholder='{"Говядина": 2, "Лук": 0.5}' />
    <small>Формат: {"Продукт": количество, "Продукт2": количество}</small>
    <button class="btn btn-red" onclick="createProduction()">СОЗДАТЬ АКТ</button>
  </div>

  <button class="btn btn-gray" onclick="logout()">ВЫЙТИ</button>

  <script>
    const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let user, restaurantId, role;

    async function init() {
      const { data: { session } = await db.auth.getSession();
      if (!session) return window.location.href = '/index.html';
      user = session.user;

      restaurantId = localStorage.getItem('active_restaurant_id');
      role = localStorage.getItem('active_role');
      if (!restaurantId) return window.location.href = '/onboarding.html';

      const { data: rest } = await db.from('restaurants').select('name').eq('id', restaurantId).single();
      document.getElementById('rest_name').innerText = rest.name + ' 🧱';

      loadInventory();
    }

    async function loadInventory() {
      const { data, error } = await db.from('inventory')
        .select('*')
        .eq('restaurant_id', restaurantId)
        .order('name');

      if (error) return alert(error.message);

      let html = '';
      data.forEach(i => {
        html += `<div class="item">
          <div><strong>${i.name}</strong> <small>${i.quantity} ${i.unit}</small></div>
        </div>`;
      });
      document.getElementById('inventory_list').innerHTML = html || 'Склад пуст';
    }

    async function addInventory() {
      const name = document.getElementById('prod_name').value.trim();
      const qty = parseFloat(document.getElementById('prod_qty').value);
      const unit = document.getElementById('prod_unit').value.trim();

      if (!name || !qty || !unit) return alert('Заполни все поля');

      const { error } = await db.from('inventory').insert({
        restaurant_id: restaurantId,
        name: name,
        quantity: qty,
        unit: unit
      });

      if (error) alert(error.message);
      else {
        alert('Добавлено');
        loadInventory();
      }
    }

    async function createProduction() {
      const product_name = document.getElementById('prod_name_out').value.trim();
      const output_qty = parseFloat(document.getElementById('prod_qty_out').value);
      const ingredients_used = document.getElementById('ingredients_json').value.trim();

      if (!product_name || !output_qty || !ingredients_used) return alert('Заполни все поля');

      let ingredients;
      try {
        ingredients = JSON.parse(ingredients_used);
      } catch {
        return alert('Неправильный JSON. Пример: {"Говядина": 2}');
      }

      const { error } = await db.from('production_logs').insert({
        restaurant_id: restaurantId,
        product_name: product_name,
        output_quantity: output_qty,
        ingredients_used: ingredients,
        created_by: user.id
      });

      if (error) alert(error.message);
      else {
        alert('Акт создан');
        loadInventory();
      }
    }

    async function logout() {
      await db.auth.signOut();
      localStorage.clear();
      window.location.href = '/index.html';
    }

    init();
  </script>
</body>
  </html>
