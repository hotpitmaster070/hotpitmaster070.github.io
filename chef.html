<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Штаб Уста - Шеф</title>
<style>
body{margin:0;background:#1a1a1a;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:#2a2a2a;padding:30px;border-radius:12px;width:90%;max-width:500px}
h2{margin:0 0 20px;text-align:center}
.code-box{background:#1a1a1a;padding:15px;border-radius:8px;text-align:center;font-size:32px;letter-spacing:4px;margin:15px 0;border:1px solid #4caf50}
button{width:100%;padding:14px;border:none;border-radius:8px;background:#4caf50;color:#fff;font-size:16px;cursor:pointer;margin-top:10px}
button.secondary{background:#333}
button.whatsapp{background:#25D366}
.info{font-size:14px;color:#aaa;text-align:center;margin-top:10px}
.chef-list{margin-top:20px;border-top:1px solid #444;padding-top:15px}
.chef-item{background:#1a1a1a;padding:12px;border-radius:8px;margin-bottom:8px}
.chef-name{font-size:16px;font-weight:600}
.chef-email{font-size:13px;color:#aaa;margin-top:4px}
.error{color:#ff3b30;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="box" id="app">
  <h2>Загрузка...</h2>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const supabase = window.supabase.createClient(
    'https://xljogkyropyocvuuodfl.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
  );

  async function load() {
    try {
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError || !user) {
        window.location.href = 'index.html';
        return;
      }

      const { data: membership, error: membError } = await supabase
        .from('memberships')
        .select('org_id, role')
        .eq('user_id', user.id)
        .eq('role', 'owner')
        .single();

      if (membError || !membership) {
        document.getElementById('app').innerHTML = '<h2>Доступ только для шефа</h2><button onclick="logout()">Выйти</button>';
        return;
      }

      const { data: org } = await supabase
        .from('organizations')
        .select('name, invite_code')
        .eq('id', membership.org_id)
        .single();

      const { data: chefs } = await supabase
        .from('memberships')
        .select('user_id, role')
        .eq('org_id', membership.org_id)
        .eq('role', 'povar');

      let chefsHtml = '<div class="info">Пока нет поваров</div>';
      
      if (chefs && chefs.length) {
        const userIds = chefs.map(c => c.user_id);
        const { data: profiles } = await supabase
          .from('profiles')
          .select('id, name, email')
          .in('id', userIds);

        chefsHtml = chefs.map(c => {
          const profile = profiles?.find(p => p.id === c.user_id);
          return `
            <div class="chef-item">
              <div class="chef-name">${profile?.name || 'Без имени'}</div>
              <div class="chef-email">${profile?.email || c.user_id.slice(0,8) + '...'}</div>
            </div>
          `;
        }).join('');
      }

      document.getElementById('app').innerHTML = `
        <h2>${org.name}</h2>
        <div class="info">Код приглашения для поваров:</div>
        <div class="code-box">${org.invite_code}</div>
        <div class="info">Дай этот код повару для регистрации</div>
        <button class="whatsapp" onclick="inviteWhatsApp('${org.name}', '${org.invite_code}')">Пригласить в WhatsApp</button>
        <button class="secondary" onclick="copyCode('${org.invite_code}')">Скопировать код</button>
        
        <div class="chef-list">
          <div class="info" style="margin-bottom:10px;">Повара в организации: ${chefs ? chefs.length : 0}</div>
          ${chefsHtml}
        </div>

        <button class="secondary" onclick="logout()">Выйти</button>
      `;
    } catch (e) {
      document.getElementById('app').innerHTML = `<h2>Ошибка</h2><div class="error">${e.message}</div>`;
    }
  }

  window.inviteWhatsApp = function(restaurantName, code) {
    const text = encodeURIComponent(
      `Привет! Заходи работать в ${restaurantName}.\n` +
      `1. Открой ссылку: https://hotpitmaster070.github.io/usta-sklad/signup.html\n` +
      `2. Выбери роль "Повар"\n` +
      `3. Введи код: ${code}`
    );
    window.open(`https://wa.me/?text=${text}`, '_blank');
  }

  window.copyCode = function(code) {
    navigator.clipboard.writeText(code);
    alert('Код скопирован!');
  }

  window.logout = async function() {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  }

  load();
});
</script>
</body>
  </html>
