<div id="kitchenPanel" style="position:fixed; top:0; right:-400px; width:400px; max-width:100vw; height:100vh; background:#0a0a0a; border-left:1px solid #27272a; transition:right 0.3s ease; z-index:9999; overflow-y:auto;">
  <div style="padding:18px; background:linear-gradient(135deg,#f97316,#ea580c); color:white; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10">
    <div>
      <b style="font-size:18px; display:block">Экран Шефа 🧱</b>
      <p id="restNamePanel" style="font-size:13px; opacity:0.9; margin:4px 0 0 0">Загрузка...</p>
    </div>
    <button onclick="closeKitchenPanel()" style="background:none; border:none; color:white; font-size:32px; cursor:pointer; line-height:1; padding:0 8px">×</button>
  </div>
  <div style="padding:16px">
    <div style="display:grid; gap:12px">
      <button onclick="openModal('task')" style="background:#f97316; color:white; padding:16px; border-radius:12px; border:none; font-weight:600; width:100%; cursor:pointer; box-shadow:0 4px 12px rgba(249,115,22,0.3)">2. [СОЗДАТЬ ЗАДАНИЕ]</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>1. [+ ПРИХОД ТОВАРА] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>4. [МОЙ СКЛАД] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>5. [МОИ ЗАГОТОВКИ] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>6. [СПИСАНИЕ] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>7. [ОТЧЁТ ПО СПИСАНИЮ] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>8. [ОТЧЁТ ЗА МЕСЯЦ] - скоро</button>
      
      <button style="background:#27272a; color:#a1a1aa; padding:16px; border-radius:12px; border:1px solid #3f3f46; font-weight:600; width:100%; cursor:not-allowed" disabled>9. [ИНВЕНТАРИЗАЦИЯ] - скоро</button>
      
      <button onclick="closeKitchenPanel()" style="background:#18181b; color:white; padding:16px; border-radius:12px; border:1px solid #27272a; font-weight:600; width:100%; margin-top:20px; cursor:pointer">ВЫЙТИ</button>
    </div>
  </div>
</div>

<div id="kitchenOverlay" onclick="closeKitchenPanel()" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); display:none; z-index:9998; backdrop-filter:blur(4px)"></div>
