<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШТАБ УСТА</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
   .box { width: 100%; max-width: 400px; }
   .btn { background: #ff3b30; color: #fff; border: none; padding: 18px; margin: 8px 0; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
    input { width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; border-radius: 8px; border: 1px solid #48484a; background: #2c2c2e; color: #fff; box-sizing: border-box; }
    h1 { text-align: center; margin-bottom: 30px; }
   .link { text-align: center; margin-top: 15px; color: #aaa; cursor: pointer; }
  </style>
</head>
<body>
<div class="box">
  <h1 id="title">ШТАБ УСТА 🧱</h1>
  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Пароль" />
  <button class="btn" id="btn" onclick="auth()">ВОЙТИ</button>
  <div class="link" onclick="toggle()">Нет аккаунта? Зарегистрироваться</div>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLogin = true;

function toggle() {
  isLogin =!isLogin;
  document.getElementById('title').innerText = isLogin? 'ШТАБ УСТА 🧱' : 'РЕГИСТРАЦИЯ';
  document.getElementById('btn').innerText = isLogin? 'ВОЙТИ' : 'СОЗДАТЬ';
  document.querySelector('.link').innerText = isLogin? 'Нет аккаунта? Зарегистрироваться' : 'Есть аккаунт? Войти';
}

async function auth() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email ||!password) return alert('Заполни поля');

  let res;
  if (isLogin) {
    res = await db.auth.signInWithPassword({ email, password });
  } else {
    res = await db.auth.signUp({ email, password });
    if (!res.error) alert('Проверь почту для подтверждения. Потом войди.');
  }

  if (res.error) return alert('Ошибка: ' + res.error.message);

  await routeUser(res.data.user);
}

async function routeUser(user) {
  // Тянем все членства пользователя
  const { data: memberships, error } = await db.from('memberships')
   .select('role, restaurant_id, restaurants(name)')
   .eq('user_id', user.id);

  if (error) return alert('Ошибка: ' + error.message);

  if (!memberships || memberships.length === 0) {
    // Нет ресторана - на создание
    window.location.href = '/onboarding.html';
    return;
  }

  if (memberships.length === 1) {
    // 1 ресторан - сохраняем и кидаем по роли
    localStorage.setItem('active_restaurant_id', memberships[0].restaurant_id);
    localStorage.setItem('active_role', memberships[0].role);

    if (memberships[0].role === 'owner') {
      window.location.href = '/owner.html';
    } else {
      window.location.href = '/chef.html';
    }
  } else {
    // Если ресторанов несколько - кидаем на выбор
    window.location.href = '/select-restaurant.html';
  }
}

// Если уже залогинен - сразу проверяем и кидаем
db.auth.getSession().then(({ data: { session } }) => {
  if (session) routeUser(session.user);
});
</script>
</body>
</html>
