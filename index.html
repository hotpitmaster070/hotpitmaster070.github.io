<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p>Управление кухней</p>
  <input id="name" placeholder="ФИО хозяина">
  <input id="rest" placeholder="Название ресторана">
  <input id="email" type="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">
  <button class="btn-primary" onclick="reg()">Начать</button>
</div>
<script type="module">
import { supabase } from './js/supabase.js'
window.reg = async ()=>{
  const {error} = await supabase.auth.signUp({
    email:email.value,password:pass.value,
    options:{data:{role:'owner',rest_name:rest.value,full_name:name.value}}
  })
  if(error) return alert(error.message)
  location.href='/owner.html'
}
</script></body></html>
