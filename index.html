<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <div id="diag" style="font-size:12px;color:#888;margin-bottom:8px">Проверка...</div>
  <input id="full_name" placeholder="Ваше ФИО" required>
  <input id="rest_name" placeholder="Название ресторана" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="password" type="password" placeholder="Пароль 6+" minlength="6" required>
  <button id="btn">Начать</button>
  <div id="msg" style="margin-top:12px;color:#f87171;font-size:13px;white-space:pre-wrap"></div>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m0wNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'

const diag = document.getElementById('diag')
const msg = document.getElementById('msg')
const btn = document.getElementById('btn')

if(typeof window.supabase === 'undefined'){
  diag.textContent = 'Ошибка: не смог загрузить supabase.js'
  diag.style.color = 'red'
} else {
  diag.textContent = 'Supabase OK'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  
  btn.onclick = async ()=>{
    btn.disabled = true
    msg.style.color = '#a3a3a3'
    msg.textContent = 'Проверяю...'
    
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const full_name = document.getElementById('full_name').value
    const rest_name = document.getElementById('rest_name').value

    try{
      let user = null
      
      // 1. Пробуем signUp
      let {data, error} = await sb.auth.signUp({email, password})
      
      if(error){
        // Если юзер уже есть - логинимся
        if(error.message.toLowerCase().includes('already registered')){
          msg.textContent = 'Юзер есть, логинюсь...'
          const {error:loginErr} = await sb.auth.signInWithPassword({email, password})
          if(loginErr) throw loginErr
          user = (await sb.auth.getUser()).data.user
        } else {
          throw error
        }
      } else {
        user = data.user
        // после signUp сразу логинимся чтобы была сессия для RLS
        await sb.auth.signInWithPassword({email, password})
        user = (await sb.auth.getUser()).data.user
      }
      
      if(!user) throw new Error('Не удалось получить user')

      // 2. Проверяем есть ли ресторан у юзера
      msg.textContent = 'Проверяю ресторан...'
      let {data:rest, error:restSelectErr} = await sb.from('restaurants')
        .select()
        .eq('owner_id', user.id)
        .maybeSingle()
      
      if(restSelectErr && restSelectErr.code !== 'PGRST116') throw restSelectErr
      
      if(!rest){
        msg.textContent = 'Создаю ресторан...'
        const {data:newRest, error:restErr} = await sb.from('restaurants')
          .insert({owner_id:user.id, name:rest_name})
          .select().single()
        if(restErr) throw restErr
        rest = newRest
      }

      // 3. Проверяем есть ли профиль
      msg.textContent = 'Проверяю профиль...'
      let {data:prof, error:profSelectErr} = await sb.from('profiles')
        .select()
        .eq('id', user.id)
        .maybeSingle()
      
      if(profSelectErr && profSelectErr.code !== 'PGRST116') throw profSelectErr
      
      if(!prof){
        const {error:profErr} = await sb.from('profiles').insert({
          id:user.id, 
          full_name:full_name, 
          restaurant_id:rest.id, 
          role:'owner'
        })
        if(profErr) throw profErr
      }

      msg.style.color = '#22c55e'
      msg.textContent = 'Готово! Перехожу в кабинет...'
      setTimeout(()=>location.href='/owner.html', 800)
      
    }catch(e){
      msg.style.color = '#f87171'
      msg.textContent = 'Ошибка: ' + e.message
      btn.disabled = false
    }
  }
}
</script>
</body>
</html>
