<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <div id="diag" style="font-size:12px;color:#22c55e;margin-bottom:8px">Загрузка...</div>
  <form id="reg">
    <input id="full_name" placeholder="Ваше ФИО" required>
    <input id="rest_name" placeholder="Название ресторана" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Пароль 6+" minlength="6" required>
    <button id="btn" type="button">Начать</button>
  </form>
  <div id="msg" style="margin-top:12px;color:#f87171;font-size:13px;white-space:pre-wrap"></div>
</div>

<script>
const SUPABASE_URL = 'https://ВСТАВЬ-СВОЙ.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'

const diag = document.getElementById('diag')
const msg = document.getElementById('msg')
const btn = document.getElementById('btn')

// 1. Проверка что библиотека загрузилась
if(typeof window.supabase === 'undefined'){
  diag.textContent = 'Ошибка: supabase.js не загрузился'
  diag.style.color = '#f87171'
} else {
  diag.textContent = 'supabase.js OK'
}

// 2. Проверка связи с твоим проектом
fetch(SUPABASE_URL + '/auth/v1/health', {headers:{apikey:SUPABASE_ANON_KEY}})
.then(r=>{
  if(r.ok) diag.textContent += ' | Сервер Supabase: OK'
  else diag.textContent += ' | Сервер: HTTP '+r.status+' - проект спит или URL не тот'
})
.catch(e=>{diag.textContent += ' | Сервер: НЕТ СВЯЗИ'; diag.style.color='#f87171'})

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// 3. Кнопка не submit, чтобы форма не очищалась сама
btn.onclick = async ()=>{
  msg.style.color = '#a3a3a3'
  msg.textContent = '1. Жму на Supabase...'
  btn.disabled = true

  try{
    msg.textContent = '2. Отправляю signUp...'
    const {data, error} = await sb.auth.signUp({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    })
    if(error) throw error
    msg.textContent = '3. user создан, делаю ресторан...'

    const {data:rest, error:restErr} = await sb.from('restaurants')
      .insert({owner_id:data.user.id, name:document.getElementById('rest_name').value})
      .select().single()
    if(restErr) throw restErr

    await sb.from('profiles').insert({
      id:data.user.id, 
      full_name:document.getElementById('full_name').value, 
      restaurant_id:rest.id, 
      role:'owner'
    })

    msg.style.color = '#4ade80'
    msg.textContent = 'Готово! Перехожу...'
    setTimeout(()=>location.href='/owner.html', 800)

  }catch(err){
    msg.style.color = '#f87171'
    msg.textContent = 'Сломалось на шаге: ' + msg.textContent + '\n' + err.name + ' + err.status + '\n' + (err.message || String(err))
    btn.disabled = false
  }
}
</script>
</body></html>
