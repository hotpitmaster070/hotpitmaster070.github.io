<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p class="sub">Управление кухней</p>
  
  <form id="regForm">
    <input id="name" placeholder="ФИО" required>
    <input id="rest" placeholder="Название ресторана" required>
    <input id="email" type="email" placeholder="email" required>
    <input id="pass" type="password" placeholder="пароль" required>
    <button type="submit" class="btn-primary">Начать</button>
    <p class="switch">Уже есть аккаунт? <a href="#" id="toLogin">Войти</a></p>
  </form>

  <form id="loginForm" style="display:none">
    <input id="lemail" type="email" placeholder="email" required>
    <input id="lpass" type="password" placeholder="пароль" required>
    <button type="submit" class="btn-primary">Войти</button>
    <p class="switch">Нет аккаунта? <a href="#" id="toReg">Регистрация</a></p>
  </form>

  <div id="logoutBox" style="display:none">
    <p>Вы вошли как <b id="who"></b></p>
    <button id="logoutBtn">Выйти</button>
  </div>
  <pre id="debug" style="color:#ff6b6b;margin-top:12px;white-space:pre-wrap"></pre>
</div>

<script type="module">
import { supabase } from '/js/supabase.js'

const regForm = document.getElementById('regForm')
const loginForm = document.getElementById('loginForm')
const logoutBox = document.getElementById('logoutBox')
const who = document.getElementById('who')
const debug = document.getElementById('debug')

const showReg = () => { regForm.style.display='block'; loginForm.style.display='none'; logoutBox.style.display='none' }
const showLogin = () => { regForm.style.display='none'; loginForm.style.display='block'; logoutBox.style.display='none' }
const showLogout = (email) => { regForm.style.display='none'; loginForm.style.display='none'; logoutBox.style.display='block'; who.textContent=email }

async function init(){
  const {data:{user}} = await supabase.auth.getUser()
  if(user) showLogout(user.email)
  else showReg()
}
init()

document.getElementById('toLogin').onclick = (e)=>{e.preventDefault(); showLogin()}
document.getElementById('toReg').onclick = (e)=>{e.preventDefault(); showReg()}

regForm.addEventListener('submit', async (e)=>{
  e.preventDefault()
  debug.textContent = ''
  const fullName = regForm.name.value.trim()
  const restName = regForm.rest.value.trim()
  const email = regForm.email.value.trim()
  const password = regForm.pass.value
  
  const {error} = await supabase.auth.signUp({
    email, password,
    options:{data:{role:'owner', rest_name:restName, full_name:fullName}}
  })
  
  if(error) {
    console.error(error)
    debug.textContent = 'Ошибка Supabase:\n' + (error.message || JSON.stringify(error))
    return
  }
  
  debug.textContent = 'Регистрация ок. Проверь почту. Теперь войди.'
  regForm.reset()
  showLogin()
})

loginForm.addEventListener('submit', async (e)=>{
  e.preventDefault()
  debug.textContent = ''
  const email = loginForm.lemail.value.trim()
  const password = loginForm.lpass.value
  
  const {error, data} = await supabase.auth.signInWithPassword({email, password})
  if(error) {
    debug.textContent = 'Ошибка входа:\n' + error.message
    return
  }
  
  const {data:profile} = await supabase.from('profiles').select('role').eq('id',data.user.id).single()
  if(profile?.role==='owner') location.href='/owner.html'
  else if(profile?.role==='chef') location.href='/chef.html'
  else debug.textContent = 'Роль не назначена в таблице profiles'
})

document.getElementById('logoutBtn').onclick = async ()=>{
  await supabase.auth.signOut()
  location.reload()
}
</script></body></html>
