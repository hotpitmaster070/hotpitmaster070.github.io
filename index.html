<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p class="sub">Управление кухней</p>
  
  <form id="regForm">
    <input name="fullName" placeholder="ФИО" required autocomplete="name">
    <input name="restName" placeholder="Название ресторана" required>
    <input name="email" type="email" placeholder="email" required autocomplete="email">
    <input name="password" type="password" placeholder="пароль" minlength="6" required>
    <button type="submit" class="btn-primary">Начать</button>
    <p class="switch">Уже есть аккаунт? <a href="#" id="toLogin">Войти</a></p>
    <p id="regError" class="error"></p>
  </form>

  <form id="loginForm" style="display:none">
    <input name="email" type="email" placeholder="email" required autocomplete="email">
    <input name="password" type="password" placeholder="пароль" required>
    <button type="submit" class="btn-primary">Войти</button>
    <p class="switch">Нет аккаунта? <a href="#" id="toReg">Регистрация</a></p>
    <p id="loginError" class="error"></p>
  </form>

  <div id="logoutBox" style="display:none">
    <p>Вы вошли как <b id="who"></b></p>
    <button id="logoutBtn" class="btn-primary">Выйти</button>
  </div>
</div>

<script type="module">
import { supabase } from './js/api.js'

const regForm = document.getElementById('regForm')
const loginForm = document.getElementById('loginForm')
const logoutBox = document.getElementById('logoutBox')
const who = document.getElementById('who')
const regError = document.getElementById('regError')
const loginError = document.getElementById('loginError')

const show = (view) => {
  regForm.style.display = view==='reg' ? 'block' : 'none'
  loginForm.style.display = view==='login' ? 'block' : 'none'
  logoutBox.style.display = view==='logout' ? 'block' : 'none'
}

async function init(){
  const {data:{user}} = await supabase.auth.getUser()
  if(user){ who.textContent = user.email; show('logout') } else { show('reg') }
}
init()

document.getElementById('toLogin').onclick = e => {e.preventDefault(); regError.textContent=''; show('login')}
document.getElementById('toReg').onclick = e => {e.preventDefault(); loginError.textContent=''; show('reg')}

regForm.addEventListener('submit', async e => {
  e.preventDefault()
  regError.textContent = 'Создаю ресторан...'
  const fd = new FormData(regForm)
  const email = fd.get('email')
  const password = fd.get('password')
  const fullName = fd.get('fullName')
  const restName = fd.get('restName')
  
  try {
    // Всё делаем через Edge Function одним запросом
    const {data, error:fnError} = await supabase.functions.invoke('hyper-task',{
      body:{
        restaurant_name: restName,
        owner_name: fullName,
        owner_email: email,
        owner_password: password
      }
    })
    if(fnError) throw fnError
    
    regError.textContent = 'Готово! Owner создан. Логин шефа: ' + data.chef_email + ' Пароль: ' + data.chef_password
    regForm.reset()
    show('login')
    
  } catch(e) {
    regError.textContent = 'Ошибка: ' + e.message
  }
})

loginForm.addEventListener('submit', async e => {
  e.preventDefault()
  loginError.textContent = ''
  const fd = new FormData(loginForm)
  
  const {error, data} = await supabase.auth.signInWithPassword({email:fd.get('email'), password:fd.get('password')})
  if(error){
    loginError.textContent = error.message
    return
  }
  
  const {data:profile, error:profError} = await supabase.from('profiles').select('role').eq('id',data.user.id).single()

  if(profError){
    loginError.textContent = 'Ошибка профиля: ' + profError.message
    return
  }

  if(profile?.role==='owner') location.href = '/owner.html'
  else if(profile?.role==='chef') location.href = '/kitchen.html'
  else loginError.textContent = 'Роль не назначена'
})

document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut()
  location.reload()
}
</script>
<style>
.error{color:#ff6b6b;font-size:14px;margin-top:8px;min-height:20px}
.switch{margin-top:12px;font-size:14px;color:var(--muted)}
</style>
</body></html>
