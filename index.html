<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
  body{margin:0;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .wrap{background:#111;border-radius:24px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  h1{color:#ff6b00;text-align:center;margin:0 0 6px;font-size:32px;font-weight:800}
  .sub{color:#888;text-align:center;font-size:14px;margin-bottom:28px}
  input{width:100%;padding:14px 16px;margin-bottom:12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:15px;box-sizing:border-box}
  input:focus{outline:none;border-color:#ff6b00}
  input::placeholder{color:#666}
  button{width:100%;padding:14px;border:none;border-radius:12px;background:#ff6b00;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px}
  button:disabled{opacity:.5;cursor:not-allowed}
  .switch{color:#888;text-align:center;font-size:14px;margin-top:18px}
  .switch a{color:#3b82f6;text-decoration:none;cursor:pointer}
  #msg{margin-top:12px;font-size:13px;white-space:pre-wrap}
  .hidden{display:none}
  #diag{font-size:12px;color:#666;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>HotPit</h1>
  <div class="sub" id="subtitle">Управление кухней</div>
  <div id="diag">Проверка...</div>

  <!-- ФОРМА РЕГИСТРАЦИИ -->
  <div id="regForm">
    <input id="full_name" placeholder="Ваше ФИО" required>
    <input id="rest_name" placeholder="Название ресторана" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Пароль 6+" minlength="6" required>
    <button id="btnReg">Начать</button>
    <div class="switch">Уже есть аккаунт? <a id="toLogin">Войти</a></div>
  </div>

  <!-- ФОРМА ЛОГИНА -->
  <div id="loginForm" class="hidden">
    <input id="emailLogin" type="email" placeholder="Email" required>
    <input id="passwordLogin" type="password" placeholder="Пароль" required>
    <button id="btnLogin">Войти</button>
    <div class="switch">Нет аккаунта? <a id="toReg">Регистрация</a></div>
    <div id="roleInfo" style="color:#888;font-size:13px;text-align:center;margin-top:10px"></div>
  </div>

  <div id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
const diag = document.getElementById('diag')
const msg = document.getElementById('msg')
const regForm = document.getElementById('regForm')
const loginForm = document.getElementById('loginForm')
const subtitle = document.getElementById('subtitle')
const roleInfo = document.getElementById('roleInfo')

// переключение форм
document.getElementById('toLogin').onclick = ()=>{regForm.classList.add('hidden');loginForm.classList.remove('hidden');subtitle.textContent='Вход';msg.textContent='';roleInfo.textContent=''}
document.getElementById('toReg').onclick = ()=>{loginForm.classList.add('hidden');regForm.classList.remove('hidden');subtitle.textContent='Управление кухней';msg.textContent='';roleInfo.textContent=''}

if(typeof window.supabase === 'undefined'){
  diag.textContent = 'Ошибка: не смог загрузить supabase.js'
  diag.style.color = 'red'
} else {
  diag.textContent = 'Supabase OK'
}

// УМНАЯ РЕГИСТРАЦИЯ
document.getElementById('btnReg').onclick = async ()=>{
  const btn = document.getElementById('btnReg')
  btn.disabled = true
  msg.style.color = '#a3a3a3'
  msg.textContent = 'Проверяю...'
  
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const full_name = document.getElementById('full_name').value
  const rest_name = document.getElementById('rest_name').value

  try{
    let user = null
    let {data, error} = await sb.auth.signUp({email, password})
    
    if(error){
      if(error.message.toLowerCase().includes('already registered')){
        msg.textContent = 'Юзер есть, логинюсь...'
        const {error:loginErr} = await sb.auth.signInWithPassword({email, password})
        if(loginErr) throw loginErr
        user = (await sb.auth.getUser()).data.user
      } else throw error
    } else {
      user = data.user
      await sb.auth.signInWithPassword({email, password})
      user = (await sb.auth.getUser()).data.user
    }
    
    if(!user) throw new Error('Не удалось получить user')

    // доделываем ресторан если нет
    let {data:rest} = await sb.from('restaurants').select().eq('owner_id', user.id).maybeSingle()
    if(!rest){
      const {data:newRest, error:restErr} = await sb.from('restaurants').insert({owner_id:user.id, name:rest_name}).select().single()
      if(restErr) throw restErr
      rest = newRest
    }

    // доделываем профиль если нет
    let {data:prof} = await sb.from('profiles').select().eq('id', user.id).maybeSingle()
    if(!prof){
      const {error:profErr} = await sb.from('profiles').insert({id:user.id, full_name:full_name, restaurant_id:rest.id, role:'owner'})
      if(profErr) throw profErr
    }

    msg.style.color = '#22c55e'
    msg.textContent = 'Готово! Перехожу...'
    setTimeout(()=>location.href='/owner.html', 600)
    
  }catch(e){
    msg.style.color = '#f87171'
    msg.textContent = 'Ошибка: ' + e.message
    btn.disabled = false
  }
}

// ЛОГИН
document.getElementById('btnLogin').onclick = async ()=>{
  const btn = document.getElementById('btnLogin')
  btn.disabled = true
  msg.style.color = '#a3a3a3'
  msg.textContent = 'Входим...'
  roleInfo.textContent = ''

  const email = document.getElementById('emailLogin').value.trim()
  const password = document.getElementById('passwordLogin').value

  try{
    const {error} = await sb.auth.signInWithPassword({email, password})
    if(error) throw error
    
    const user = (await sb.auth.getUser()).data.user
    const {data:prof} = await sb.from('profiles').select('role').eq('id', user.id).single()
    
    if(!prof || !prof.role){
      roleInfo.textContent = 'Роль не назначена'
      msg.textContent = 'Профиль не найден. Зарегистрируйтесь заново.'
      btn.disabled = false
      return
    }
    
    msg.style.color = '#22c55e'
    msg.textContent = 'Вход успешен. Перехожу...'
    setTimeout(()=>location.href='/owner.html', 500)
    
  }catch(e){
    msg.style.color = '#f87171'
    msg.textContent = 'Ошибка: ' + e.message
    btn.disabled = false
  }
}
</script>
</body>
</html>
