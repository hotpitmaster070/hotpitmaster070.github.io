<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в HotPit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:#0a0a0a;color:#fff;
}
.box{
  background:#171717;padding:40px;border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);width:100%;max-width:380px;
}
.logo{
  text-align:center;margin-bottom:32px;
}
.logo h1{
  font-size:32px;font-weight:800;color:#f97316;margin-bottom:8px;
}
.logo p{color:#71717a;font-size:14px;}
input{
  width:100%;padding:14px;margin:8px 0;
  background:#262626;border:1px solid #333;
  border-radius:10px;color:#fff;font-size:15px;
  outline:none;transition:0.2s;
}
input:focus{border-color:#f97316;background:#2a2a2a;}
button{
  width:100%;padding:14px;margin:8px 0;
  border-radius:10px;border:none;font-weight:600;
  font-size:15px;cursor:pointer;transition:0.2s;
}
.btn-primary{background:#f97316;color:white;}
.btn-primary:hover{background:#ea580c;}
.btn-secondary{background:#262626;color:#fff;}
.btn-secondary:hover{background:#333;}
.msg{
  padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;
  display:none;
}
.error{background:#7f1d1d;color:#fca5a5;}
.success{background:#14532d;color:#86efac;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>HotPit</h1>
    <p>Управление кухней</p>
  </div>
  
  <div id="msg" class="msg"></div>
  
  <input id="email" type="email" placeholder="Email" autocomplete="email">
  <input id="password" type="password" placeholder="Пароль" autocomplete="current-password">
  
  <button type="button" class="btn-primary" id="loginBtn">Войти</button>
  <button type="button" class="btn-secondary" id="signupBtn">Создать аккаунт</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://xljogkyropyocvuuodfl.supabase.co', 
  ''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs''
);

function showMsg(msg, type){
  const el = document.getElementById('msg');
  el.innerText = msg;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function hideMsg(){
  document.getElementById('msg').style.display = 'none';
}

async function redirectAfterLogin(){
  const { data: { user } = await supabaseClient.auth.getUser();
  if(!user) return;
  
  const { data: restaurant } = await supabaseClient
    .from('restaurants')
    .select('id')
    .eq('owner_id', user.id)
    .limit(1)
    .single();
  
  if(restaurant){
    window.location.href = `/index.html?rest=${restaurant.id}`;
    return;
  }
  
  const { data: staff } = await supabaseClient
    .from('staff')
    .select('id, restaurant_id')
    .eq('user_id', user.id)
    .limit(1)
    .single();
  
  if(staff){
    window.location.href = `/staff.html?staff=${staff.id}&rest=${staff.restaurant_id}`;
    return;
  }
  
  window.location.href = '/onboarding.html';
}

async function login(){
  hideMsg();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if(!email || !password){
    showMsg('Заполни email и пароль', 'error');
    return;
  }
  
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  
  if(error){
    showMsg('Неверный email или пароль', 'error');
    return;
  }
  
  await redirectAfterLogin();
}

async function signup(){
  hideMsg();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if(!email || !password){
    showMsg('Заполни email и пароль', 'error');
    return;
  }
  
  if(password.length < 6){
    showMsg('Пароль должен быть минимум 6 символов', 'error');
    return;
  }
  
  const { error } = await supabaseClient.auth.signUp({ email, password });
  
  if(error){
    showMsg(error.message, 'error');
    return;
  }
  
  showMsg('Готово! Ты красавчик 🔥 Проверь почту, подтверди регистрацию и жми "Войти". Добро пожаловать в HotPit!', 'success');
  document.getElementById('password').value = '';
}

// Навешиваем события после загрузки DOM
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('signupBtn').addEventListener('click', signup);
  
  document.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') login();
  });
});

// Если уже залогинен - сразу перекидываем
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if(session){
    redirectAfterLogin();
  }
});
</script>
</body>
  </html>
