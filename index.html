<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="./css/style.css">
<!-- вот эта строка подгрузит supabase.js сама, без файлов у тебя -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <div id="diag" style="font-size:12px;color:#888;margin-bottom:8px">Проверка...</div>
  <input id="full_name" placeholder="Ваше ФИО" required>
  <input id="rest_name" placeholder="Название ресторана" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="password" type="password" placeholder="Пароль 6+" minlength="6" required>
  <button id="btn">Начать</button>
  <div id="msg" style="margin-top:12px;color:#f87171;font-size:13px;white-space:pre-wrap"></div>
</div>

<script>
// 1. ВСТАВЬ СВОИ ДАННЫЕ ИЗ SUPABASE -> Settings -> API
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'

// 2. Проверка что библиотека подгрузилась
const diag = document.getElementById('diag')
const msg = document.getElementById('msg')
const btn = document.getElementById('btn')

if(typeof window.supabase === 'undefined'){
  diag.textContent = 'Ошибка: не смог загрузить supabase.js'
  diag.style.color = 'red'
} else {
  diag.textContent = 'Supabase OK'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  
  btn.onclick = async ()=>{
    btn.disabled = true
    msg.style.color = '#a3a3a3'
    msg.textContent = 'Создаю аккаунт...'
    
    try{
      const {data, error} = await sb.auth.signUp({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
      if(error) throw error
      if(!data.user) throw new Error('user=null. Выключи "Confirm email" в Supabase->Auth->Settings')
      
      const {data:rest, error:restErr} = await sb.from('restaurants')
        .insert({owner_id:data.user.id, name:document.getElementById('rest_name').value})
        .select().single()
      if(restErr) throw restErr

      await sb.from('profiles').insert({
        id:data.user.id, 
        full_name:document.getElementById('full_name').value, 
        restaurant_id:rest.id, 
        role:'owner'
      })

      msg.style.color = '#22c55e'
      msg.textContent = 'Готово! Перехожу в кабинет...'
      setTimeout(()=>location.href='/owner.html', 800)
      
    }catch(e){
      msg.style.color = '#f87171'
      msg.textContent = 'Ошибка: ' + e.message
      btn.disabled = false
    }
  }
}
</script>
</body>
</html>
