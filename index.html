<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HotPit</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p>Управление кухней</p>
  <input id="name" placeholder="ФИО хозяина">
  <input id="rest" placeholder="Название ресторана">
  <input id="email" type="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">
  <button class="btn-primary" onclick="reg()">Начать</button>
</div>
<script type="module">
import { supabase } from './js/supabase.js'
window.reg = async ()=>{
  const name = document.getElementById('name').value
  const rest = document.getElementById('rest').value
  const email = document.getElementById('email').value
  const pass = document.getElementById('pass').value
  
  if(!name || !rest || !email || !pass) {
    alert('Заполни все поля'); return
  }
  
  const {data, error} = await supabase.auth.signUp({
    email:email,password:pass,
    options:{data:{role:'owner',rest_name:rest,full_name:name}}
  })
  if(error) {
    console.log(error) // смотри в консоль
    return alert('Ошибка: ' + error.message) // покажет реальную причину
  }
  location.href='/owner.html'
}
</script></body></html>
