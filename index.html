<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШТАБ УСТА</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .btn { background: #ff3b30; color: #fff; border: none; padding: 18px; margin: 8px 0; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; }
    .btn-green { background: #34c759; }
    .btn-grey { background: #48484a; }
    .btn-secondary { background: #5e5e60; }
    input, select, textarea { width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; border-radius: 8px; border: 1px solid #48484a; background: #2c2c2e; color: #fff; box-sizing: border-box; }
    h1, h2, h3 { text-align: center; }
    label { display: block; margin-top: 12px; color: #8e8e93; }
    table { width: 100%; margin-top: 15px; border-collapse: collapse; }
    td, th { padding: 12px; border-bottom: 1px solid #48484a; text-align: left; }
    th { color: #8e8e93; }
    .kg { text-align: right; font-weight: bold; }
    .card { background: #2c2c2e; padding: 15px; border-radius: 12px; margin: 10px 0; }
    .table-wrap { overflow-x: auto; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row > div { flex: 1; }
    .error { color: #ff3b30; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<div id="login" class="screen active">
  <h1>ШТАБ УСТА 🧱</h1>
  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Пароль" />
  <button class="btn" type="button" onclick="login()">ВОЙТИ</button>
  <button class="btn btn-grey" type="button" onclick="go('signup.html')">РЕГИСТРАЦИЯ</button>
  <div class="error" id="msg"></div>
</div>

<!-- УДАЛИ все остальные div: shef, povar, yield_form и т.д. -->
<!-- Они должны быть только в chef.html и povar.html -->

<script src="app.js"></script>
<script>
checkAuth();
</script>
</body>
</html>
