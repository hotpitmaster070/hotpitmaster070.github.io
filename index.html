<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход в HotPit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:#0a0a0a;color:#fff;
}
.box{
  background:#171717;padding:40px;border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);width:100%;max-width:380px;
}
.logo{
  text-align:center;margin-bottom:32px;
}
.logo h1{
  font-size:32px;font-weight:800;color:#f97316;margin-bottom:8px;
}
.logo p{color:#71717a;font-size:14px;}
input{
  width:100%;padding:14px;margin:8px 0;
  background:#262626;border:1px solid #333;
  border-radius:10px;color:#fff;font-size:15px;
  outline:none;transition:0.2s;
}
input:focus{border-color:#f97316;background:#2a2a2a;}
button{
  width:100%;padding:14px;margin:8px 0;
  border-radius:10px;border:none;font-weight:600;
  font-size:15px;cursor:pointer;transition:0.2s;
}
.btn-primary{background:#f97316;color:white;}
.btn-primary:hover{background:#ea580c;}
.btn-secondary{background:#262626;color:#fff;}
.btn-secondary:hover{background:#333;}
.error{
  background:#7f1d1d;color:#fca5a5;padding:12px;
  border-radius:8px;margin-bottom:16px;font-size:14px;
  display:none;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>HotPit</h1>
    <p>Управление кухней</p>
  </div>
  
  <div id="error" class="error"></div>
  
  <input id="email" type="email" placeholder="Email" autocomplete="email">
  <input id="password" type="password" placeholder="Пароль" autocomplete="current-password">
  
  <button class="btn-primary" onclick="login()">Войти</button>
  <button class="btn-secondary" onclick="signup()">Создать аккаунт</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://xljogkyropyocvuuodfl.supabase.co', 
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
);

function showError(msg){
  const err = document.getElementById('error');
  err.innerText = msg;
  err.style.display = 'block';
}

function hideError(){
  document.getElementById('error').style.display = 'none';
}

async function redirectAfterLogin(){
  const { data: { user } = await supabaseClient.auth.getUser();
  if(!user) return;
  
  // 1. Проверяем шеф ли это
  const { data: restaurant } = await supabaseClient
    .from('restaurants')
    .select('id')
    .eq('owner_id', user.id)
    .limit(1)
    .single();
  
  if(restaurant){
    window.location.href = `/index.html?rest=${restaurant.id}`;
    return;
  }
  
  // 2. Если не шеф, проверяем повар ли это
  const { data: staff } = await supabaseClient
    .from('staff')
    .select('id, restaurant_id')
    .eq('user_id', user.id)
    .limit(1)
    .single();
  
  if(staff){
    window.location.href = `/staff.html?staff=${staff.id}&rest=${staff.restaurant_id}`;
    return;
  }
  
  // 3. Если ни то ни се - на onboarding
  window.location.href = '/onboarding.html';
}

async function login(){
  hideError();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if(!email || !password){
    showError('Заполни email и пароль');
    return;
  }
  
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  
  if(error){
    showError('Неверный email или пароль');
    return;
  }
  
  await redirectAfterLogin();
}

async function signup(){
  hideError();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if(!email || !password){
    showError('Заполни email и пароль');
    return;
  }
  
  if(password.length < 6){
    showError('Пароль должен быть минимум 6 символов');
    return;
  }
  
  const { error } = await supabaseClient.auth.signUp({ email, password });
  
  if(error){
    showError(error.message);
    return;
  }
  
  alert('Готово! Проверь почту и подтверди регистрацию, затем войди в систему.');
}

// Если уже залогинен - сразу перекидываем
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if(session){
    redirectAfterLogin();
  }
});

// Enter для входа
document.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') login();
});
</script>
</body>
</html>
