<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Создать ресторан</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p>Создайте ресторан и добавьте шефа по QR</p>
  <form id="reg">
    <input name="fullName" placeholder="Ваше ФИО" required>
    <input name="restName" placeholder="Название ресторана" required>
    <input name="email" type="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Пароль 6+ символов" required minlength="6">
    <button type="submit">Начать</button>
  </form>
  <div id="err" style="color:#f87171;font-size:14px;margin-top:12px;white-space:pre-wrap"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ВСТАВЬ СВОИ КЛЮЧИ ЗДЕСЬ 1 РАЗ:
const SUPABASE_URL = 'https://твой-проект.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
const err = document.getElementById('err')
const reg = document.getElementById('reg')

reg.addEventListener('submit', async e=>{
  e.preventDefault(); 
  err.textContent='Создаю...';
  const fd=new FormData(reg);
  
  try{
    const {data:auth,error:ae}=await supabase.auth.signUp({
      email:fd.get('email'),
      password:fd.get('password')
    });
    if(ae){
      // выводим всю ошибку целиком, не только message
      err.textContent='Auth ошибка: ' + JSON.stringify(ae, null, 2); 
      return
    }
    if(!auth.user){
      err.textContent='Проверь почту. Supabase требует подтверждение email.\nВыключи его в Supabase → Auth → Settings';
      return
    }
    
    const {data:rest,error:re}=await supabase.from('restaurants')
      .insert({name:fd.get('restName'),owner_id:auth.user.id})
      .select().single();
    if(re){err.textContent='Ошибка ресторана: ' + JSON.stringify(re); return}
    
    const {error:pe}=await supabase.from('profiles')
      .insert({id:auth.user.id,role:'owner',full_name:fd.get('fullName')});
    if(pe){err.textContent='Ошибка профиля: ' + JSON.stringify(pe); return}
    
    location.href='/owner.html'
  }catch(e2){
    err.textContent='Критическая ошибка: ' + e2.message
  }
})
</script></body></html>
