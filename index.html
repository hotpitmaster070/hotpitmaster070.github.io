<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotPit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff;}
.box{background:#171717;padding:40px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.5);width:100%;max-width:380px;}
.logo h1{font-size:32px;font-weight:800;color:#f97316;margin-bottom:8px;text-align:center;}
.logo p{color:#71717a;font-size:14px;text-align:center;margin-bottom:16px;}
input{width:100%;padding:14px;margin:8px 0;background:#262626;border:1px solid #333;border-radius:10px;color:#fff;font-size:15px;outline:none;}
input:focus{border-color:#f97316;background:#2a2a2a;}
button{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:none;font-weight:600;font-size:15px;cursor:pointer;}
.btn-primary{background:#f97316;color:white;}
.btn-secondary{background:#262626;color:#fff;}
.msg{padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;display:none;}
.error{background:#7f1d1d;color:#fca5a5;}
.success{background:#14532d;color:#86efac;}
.hidden{display:none;}
.step-subtitle{font-size:12px;color:#f97316;text-align:center;margin-bottom:8px;font-weight:600;letter-spacing:1px;}
</style>
</head>
<body>
<div class="box" id="authBox">
  <div class="logo">
    <h1>HotPit</h1>
    <p id="stepSubtitle">Управление кухней</p>
  </div>
  <div id="msg" class="msg"></div>
  <div id="step1">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Пароль">
    <button type="button" class="btn-primary" id="signupBtn">Начать</button>
    <button type="button" class="btn-secondary" id="loginBtn">Уже есть аккаунт? Войти</button>
  </div>
  <div id="step2" class="hidden">
    <div class="step-subtitle">ШАГ 2 ИЗ 2</div>
    <h2 style="margin-bottom:8px;text-align:center">Как назовём ресторан?</h2>
    <input id="restName" type="text" placeholder="Например: Мангал №1">
    <button type="button" class="btn-primary" id="createRestBtn">Запустить кухню</button>
    <button type="button" class="btn-secondary" id="backBtn">Назад</button>
  </div>
</div>

<div class="box hidden" id="restaurantBox">
  <button id="logoutBtn" style="background:#444;margin-bottom:20px">Выйти</button>
  <div id="restaurantContent"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://xljogkyropyocvuuodfl.supabase.co', 
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0bAe28v6MX-MyVs'
);

function showMsg(msg, type){
  const el = document.getElementById('msg');
  el.innerText = msg;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
function showStep(n){
  document.getElementById('step1').classList.toggle('hidden', n!==1);
  document.getElementById('step2').classList.toggle('hidden', n!==2);
  document.getElementById('stepSubtitle').innerText = n===1 ? 'Управление кухней' : 'Почти готово';
}

async function checkSession(){
  const { data: { session }} = await supabaseClient.auth.getSession();
  if(session) await redirectAfterLogin(); else showStep(1);
}

async function redirectAfterLogin(){
  const { data: { user }} = await supabaseClient.auth.getUser();
  if(!user) return;
  
  const { data: membership } = await supabaseClient
    .from('user_restaurants')
    .select('restaurant_id,restaurants(name)')
    .eq('user_id', user.id)
    .limit(1)
    .maybeSingle();
  
  if(membership?.restaurants){
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('restaurantBox').classList.remove('hidden');
    document.getElementById('restaurantContent').innerHTML = `
      <h3 style="color:#86efac;margin-bottom:12px">Готово! Система запущена</h3>
      <p style="color:#a1a1aa;margin-bottom:16px">Ресторан: <b>${membership.restaurants.name}</b></p>
      <button class="btn-primary" onclick="window.location.href='kitchen.html?id=${membership.restaurant_id}'">Открыть кабинет</button>
    `;
    return;
  }
  showStep(2);
}

async function createRestaurant(){
  const name = document.getElementById('restName').value.trim();
  if(!name){ showMsg('Введи название ресторана', 'error'); return; }
  
  const { data: { user }} = await supabaseClient.auth.getUser();
  if(!user){ showMsg('Сессия истекла', 'error'); return; }
  
  const { data: restaurant, error } = await supabaseClient.from('restaurants')
    .insert({ name, owner_id: user.id }).select('id').single();
  
  if(error){ showMsg('Ошибка: ' + error.message, 'error'); return; }
  
  const {error: err2} = await supabaseClient.from('user_restaurants').insert({
    user_id: user.id,
    restaurant_id: restaurant.id,
    role: 'owner'
  })
  if(err2){ showMsg('Ошибка связи: ' + err2.message, 'error'); return; }
  
  // КЛЮЧЕВОЙ ФИКС: передаем id в URL
  window.location.href = `kitchen.html?id=${restaurant.id}`;
}

async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ showMsg('Заполни email и пароль', 'error'); return; }
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ showMsg(error.message, 'error'); return; }
  await redirectAfterLogin();
}

async function signup(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ showMsg('Заполни email и пароль', 'error'); return; }
  if(password.length < 6){ showMsg('Пароль минимум 6 символов', 'error'); return; }
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if(error){ showMsg(error.message, 'error'); return; }
  showMsg('Аккаунт создан! Теперь назови ресторан', 'success');
  showStep(2);
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('signupBtn').onclick = signup;
document.getElementById('createRestBtn').onclick = createRestaurant;
document.getElementById('backBtn').onclick = () => showStep(1);
document.getElementById('logoutBtn').onclick = async () => { await supabaseClient.auth.signOut(); location.reload(); };
supabaseClient.auth.onAuthStateChange((e,s) => { if(e==='SIGNED_IN') redirectAfterLogin(); });
checkSession();
</script>
</body>
</html>
