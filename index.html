<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit</title>
<style>
  body{margin:0;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{background:#111;border-radius:24px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  h1{color:#ff6b00;text-align:center;margin:0 0 6px;font-size:32px;font-weight:800}
.sub{color:#888;text-align:center;font-size:14px;margin-bottom:28px}
  input{width:100%;padding:14px 16px;margin-bottom:12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:15px;box-sizing:border-box}
  input:focus{outline:none;border-color:#ff6b00}
  input::placeholder{color:#666}
  button{width:100%;padding:14px;border:none;border-radius:12px;background:#ff6b00;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px}
  button:disabled{opacity:.5;cursor:not-allowed}
.switch{color:#888;text-align:center;font-size:14px;margin-top:18px}
.switch a{color:#3b82f6;text-decoration:none;cursor:pointer}
  #msg{margin-top:12px;font-size:13px;white-space:pre-wrap;text-align:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>HotPit</h1>
  <div class="sub" id="subtitle">Управление кухней</div>

  <div id="regForm">
    <input id="full_name" placeholder="Ваше ФИО" required>
    <input id="rest_name" placeholder="Название ресторана/цеха" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Пароль 6+" minlength="6" required>
    <button id="btnReg">Начать</button>
    <div class="switch">Уже есть аккаунт? <a id="toLogin">Войти</a></div>
  </div>

  <div id="loginForm" class="hidden">
    <input id="emailLogin" type="email" placeholder="Email" required>
    <input id="passwordLogin" type="password" placeholder="Пароль" required>
    <button id="btnLogin">Войти</button>
    <div class="switch">Нет аккаунта? <a id="toReg">Регистрация</a></div>
  </div>

  <div id="msg"></div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const regForm = document.getElementById('regForm')
const loginForm = document.getElementById('loginForm')
const subtitle = document.getElementById('subtitle')
const msg = document.getElementById('msg')

document.getElementById('toLogin').onclick = ()=>{regForm.classList.add('hidden');loginForm.classList.remove('hidden');subtitle.textContent='Вход';msg.textContent=''}
document.getElementById('toReg').onclick = ()=>{loginForm.classList.add('hidden');regForm.classList.remove('hidden');subtitle.textContent='Управление кухней';msg.textContent=''}

// РЕГИСТРАЦИЯ С УМОМ
document.getElementById('btnReg').onclick = async ()=>{
  const btn = document.getElementById('btnReg')
  btn.disabled = true
  msg.style.color = '#a3a3a3'
  msg.textContent = 'Проверяю...'

  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const full_name = document.getElementById('full_name').value.trim()
  const rest_name = document.getElementById('rest_name').value.trim()

  try{
    let user;
    const {data, error} = await sb.auth.signUp({email, password})
    
    if(error && error.message.toLowerCase().includes('already registered')){
      msg.textContent = 'Такой email есть. Вхожу...'
      const {error:loginErr} = await sb.auth.signInWithPassword({email, password})
      if(loginErr) throw loginErr
      user = (await sb.auth.getUser()).data.user
    } else if(error) {
      throw error
    } else {
      user = data.user
      await sb.auth.signInWithPassword({email, password})
      user = (await sb.auth.getUser()).data.user
    }

    const {data:rest} = await sb.from('restaurants').select().eq('owner_id', user.id).maybeSingle()
    if(!rest){
      const {data:newRest} = await sb.from('restaurants').insert({owner_id:user.id, name:rest_name, subscription_type: 'chef'}).select().single()
      rest = newRest
    }

    const {error:profErr} = await sb.from('profiles').upsert({
      id:user.id, full_name:full_name, restaurant_id:rest.id, role:'owner', is_active:true
    }, {onConflict: 'id'})
    if(profErr) throw profErr;

    msg.style.color = '#22c55e'
    msg.textContent = 'Готово! Перехожу...'
    setTimeout(()=>location.href='/owner.html', 600)

  }catch(e){
    msg.style.color = '#f87171'
    msg.textContent = 'Ошибка: ' + e.message
    btn.disabled = false
  }
}

// ЛОГИН
document.getElementById('btnLogin').onclick = async ()=>{
  const btn = document.getElementById('btnLogin')
  btn.disabled = true
  msg.style.color = '#a3a3a3'
  msg.textContent = 'Входим...'
  try{
    const {error} = await sb.auth.signInWithPassword({email:document.getElementById('emailLogin').value.trim(), password:document.getElementById('passwordLogin').value})
    if(error) throw error
    msg.style.color = '#22c55e'
    msg.textContent = 'Вход успешен. Перехожу...'
    setTimeout(()=>location.href='/owner.html', 500)
  }catch(e){
    msg.style.color = '#f87171'
    msg.textContent = 'Ошибка: ' + e.message
    btn.disabled = false
  }
}
</script>
</body>
</html>
