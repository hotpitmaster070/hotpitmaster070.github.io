<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Создать ресторан</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p>Создайте ресторан и добавьте шефа по QR</p>
  <form id="reg">
    <input name="fullName" placeholder="Ваше ФИО" required>
    <input name="restName" placeholder="Название ресторана" required>
    <input name="email" type="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Пароль" required>
    <button type="submit">Начать</button>
  </form>
  <div id="err" style="color:#f87171;font-size:14px;margin-top:12px"></div>
</div>
<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
import {SUPABASE_URL, SUPABASE_ANON_KEY} from '/js/config.js'
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

reg.addEventListener('submit', async e=>{
  e.preventDefault(); err.textContent='Создаю...';
  const fd=new FormData(reg);
  const {data:auth,error:ae}=await supabase.auth.signUp({email:fd.get('email'),password:fd.get('password')});
  if(ae){err.textContent=ae.message;return}
  const {data:rest,error:re}=await supabase.from('restaurants').insert({name:fd.get('restName'),owner_id:auth.user.id}).select().single();
  if(re){err.textContent=re.message;return}
  await supabase.from('profiles').insert({id:auth.user.id,role:'owner',full_name:fd.get('fullName')});
  location.href='/owner.html'
})
</script></body></html>
