<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit - Создать ресторан</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head><body>
<div class="auth-wrap">
  <h1>HotPit</h1>
  <p>Создайте ресторан и добавьте шефа по QR</p>
  <form id="reg">
    <input id="full_name" placeholder="Ваше ФИО" required>
    <input id="rest_name" placeholder="Название ресторана" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Пароль 6+ символов" minlength="6" required>
    <button id="btn" type="submit">Начать</button>
  </form>
  <div id="msg" style="margin-top:12px;color:#f87171;white-space:pre-wrap"></div>
</div>

<script>
const SUPABASE_URL = 'https://твой-проект.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6...твой-anon-key'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) // <- не supabase, а sb

const form = document.getElementById('reg')
const msg = document.getElementById('msg')
const btn = document.getElementById('btn')

form.addEventListener('submit', async (e)=>{
  e.preventDefault()
  msg.textContent = 'Создаю...'
  btn.disabled = true

  const full_name = document.getElementById('full_name').value.trim()
  const rest_name = document.getElementById('rest_name').value.trim()
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value

  try{
    // 1. Регистрация
    const {data:authData, error:authErr} = await sb.auth.signUp({email, password})
    if(authErr) throw authErr
    const user = authData.user
    if(!user) throw new Error('Supabase не вернул user. Проверь "Enable email confirmations" в Auth->Settings')

    // 2. Создаём ресторан
    const {data:rest, error:restErr} = await sb.from('restaurants')
      .insert({owner_id:user.id, name:rest_name})
      .select().single()
    if(restErr) throw restErr

    // 3. Профиль owner
    const {error:profErr} = await sb.from('profiles').insert({
      id:user.id, full_name, restaurant_id:rest.id, role:'owner'
    })
    if(profErr) throw profErr

    msg.style.color = '#4ade80'
    msg.textContent = 'Готово! Перехожу в кабинет...'
    setTimeout(()=>location.href='/dashboard.html', 800)

  }catch(err){
    msg.style.color = '#f87171'
    msg.textContent = 'Ошибка: ' + (err.message || JSON.stringify(err))
    btn.disabled = false
  }
})
</script>
</body></html>
