<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Отметка - HotPit</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:system-ui;background:#0a0a0a;color:#fff;margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{color:#f97316;font-weight:800;font-size:28px;margin-bottom:8px}
#reader{width:100%;max-width:400px;border-radius:16px;overflow:hidden;border:2px solid #27272a}
.msg{padding:20px;border-radius:16px;margin-top:20px;font-size:18px;font-weight:600}
.ok{background:#10b981}.err{background:#ef4444}
.hidden{display:none}
</style>
</head>
<body>
<div class="logo">HotPit</div>
<h2>Отсканируй свой QR</h2>
<div id="reader"></div>
<div id="result" class="hidden"></div>

<script>
const supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');

const qr_uuid = new URLSearchParams(location.search).get('qr');

function showMsg(text,type){
  const r=document.getElementById('result');
  r.className='msg '+type;
  r.textContent=text;
  r.classList.remove('hidden');
  setTimeout(()=>r.classList.add('hidden'),4000);
}

async function logShift(qr){
  // 1. Находим повара по qr_uuid
  const {data:staff} = await supabase.from('staff').select('id,restaurant_id,name').eq('qr_uuid',qr).single();
  if(!staff){showMsg('QR не найден','err'); return;}

  const today = new Date().toISOString().split('T')[0];
  const now = new Date();

  // 2. Ищем смену на сегодня
  const {data:schedule} = await supabase.from('work_schedules')
   .select('id').eq('staff_id',staff.id).eq('date',today).eq('status','scheduled').single();
  if(!schedule){showMsg(staff.name+', у тебя нет смены сегодня','err'); return;}

  // 3. Ищем открытую смену
  const {data:shift} = await supabase.from('shifts')
   .select('id,check_in,check_out').eq('staff_id',staff.id).eq('date',today).single();

  if(!shift ||!shift.check_in){
    // Приход
    await supabase.from('shifts').insert({
      staff_id: staff.id,
      restaurant_id: staff.restaurant_id,
      date: today,
      check_in: now.toISOString(),
      source: 'qr',
      status: 'active'
    });
    showMsg(`Привет, ${staff.name}! Приход в ${now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`,'ok');
  } else if(!shift.check_out){
    // Уход
    await supabase.from('shifts').update({
      check_out: now.toISOString(),
      status: 'done'
    }).eq('id',shift.id);
    showMsg(`До встречи, ${staff.name}! Уход в ${now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`,'ok');
  } else {
    showMsg('Смена уже закрыта','err');
  }
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  {facingMode:"environment"},
  {fps:10, qrbox:250},
  (decodedText)=>{
    html5QrCode.stop();
    logShift(decodedText); // в QR будет лежать qr_uuid повара
  },
  ()=>{}
);
</script>
</body>
</html>
