<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HotPit - График</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body {
    background: radial-gradient(ellipse at top, #1a1a1f 0%, #09090b 100%);
    min-height: 100vh;
  }
.glass {
    backdrop-filter: blur(20px);
    background: rgba(24,24,27,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ВАУ ПОЛОСА */
.timeline {
    height: 100px;
    background: linear-gradient(180deg, rgba(39,39,42,0.4) 0%, rgba(24,24,27,0.8) 100%);
    border-radius: 20px;
    padding: 30px 20px 45px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
.timeline::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }
.timeline-bar {
    position: absolute;
    top: 20px;
    height: 60px;
    background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #10b981 100%);
    background-size: 200% 200%;
    animation: shimmer 3s ease infinite;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(16,185,129,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.4);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
.timeline-hour {
    font-size: 11px;
    color: #71717a;
    font-weight: 600;
    letter-spacing: 1px;
    position: absolute;
    bottom: 12px;
    transform: translateX(-50%);
  }

  /* ИТОГО ФОТ - БОМБА */
 #totalPay {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -3px;
    background: linear-gradient(135deg, #4ade80, #22c55e, #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 20px rgba(34,197,94,0.4));
  }
</style>
</head>
<body class="text-zinc-100 p-6">

<div class="max-w-4xl mx-auto">
  <h1 class="text-4xl font-bold mb-2">Управление кухней</h1>
  <p class="text-zinc-400 mb-8" id="dateTitle">Загрузка...</p>

  <div id="timelineContainer" class="space-y-10"></div>

  <div class="glass rounded-3xl p-8 mt-12">
    <div class="flex justify-between items-center">
      <span class="text-2xl text-zinc-400">ИТОГО ФОТ ЗА ДЕНЬ</span>
      <span id="totalPay">0₽</span>
    </div>
  </div>
</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');

const urlParams = new URLSearchParams(window.location.search);
const restaurantId = urlParams.get('rest');
const dateInput = new Date().toISOString().split('T')[0];

if (!restaurantId) {
  document.body.innerHTML = '<div class="text-center py-20 text-red-400 text-3xl">Ошибка: нет ресторана. Открой из onboarding.html</div>';
  throw new Error('No restaurant ID');
}

// Дата в шапке
function updateDate() {
  const date = new Date(dateInput);
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'];
  document.getElementById('dateTitle').innerText = `${date.getDate()} ${months[date.getMonth()]}, ${days[date.getDay()]}`;
}
updateDate();

// АНИМАЦИЯ СЧЁТЧИКА
function animateCounter(element, start, end, duration = 800) {
  let startTime = null;
  function update(currentTime) {
    if (!startTime) startTime = currentTime;
    const progress = Math.min((currentTime - startTime) / duration, 1);
    const value = Math.floor(progress * (end - start) + start);
    element.innerText = value.toLocaleString('ru-RU') + '₽';
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

let staffList = [];

async function loadStaff() {
  const { data } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);
  staffList = data || [];
  loadShifts();
}

async function loadShifts() {
  const { data: shifts } = await _supabase
   .from('work_schedules')
   .select('*, staff(id,name,pay_type,hourly_rate,daily_rate)')
   .eq('date', dateInput)
   .eq('restaurant_id', restaurantId);

  const container = document.getElementById('timelineContainer');
  let totalPay = 0;

  container.innerHTML = staffList.map(st => {
    const shift = shifts?.find(s => s.staff_id === st.id);
    let start = shift? parseInt(shift.start_time.split(':')[0]) : 9;
    let end = shift? parseInt(shift.end_time.split(':')[0]) : 18;
    let hours = end - start;

    let pay = 0;
    if(st.pay_type === 'hourly') {
      pay = hours * (st.hourly_rate || 300);
    } else {
      pay = st.daily_rate || 0;
      hours = 'фикс';
    }
    totalPay += pay;

    // Часы через 2 часа: 6 8 10 12 14 16 18 20 22
    const hoursHtml = Array.from({length: 9}, (_, i) => {
      const hour = 6 + i*2;
      const left = i * 12.5;
      return `<div class="timeline-hour" style="left: ${left}%">${hour}:00</div>`
    }).join('');

    const barLeft = (start - 6) * 5.55;
    const barWidth = hours!== 'фикс'? hours * 5.55 : 0;

    return `
      <div>
        <div class="flex justify-between mb-3">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full flex items-center justify-center font-bold text-black text-xl">${st.name[0]}</div>
            <div>
              <div class="font-bold text-2xl">${st.name}</div>
              <div class="text-sm text-zinc-500">${st.pay_type === 'hourly'? st.hourly_rate + '₽/час' : st.daily_rate + '₽/день'}</div>
            </div>
          </div>
          <div class="text-3xl font-bold text-green-400">+${pay.toLocaleString('ru-RU')}₽</div>
        </div>
        <div class="timeline" onclick="createShift(event, '${st.id}')">
          ${hoursHtml}
          ${shift? `<div class="timeline-bar" style="left: ${barLeft}%; width: ${barWidth}%"></div>` : ''}
        </div>
        <div class="text-zinc-500 text-sm mt-2">${shift? `${shift.start_time.slice(0,5)} - ${shift.end_time.slice(0,5)} = ${hours}ч` : 'Тапни по шкале → добавить смену 9:00-18:00'}</div>
      </div>
    `;
  }).join('');

  // Анимируем ИТОГО
  const payEl = document.getElementById('totalPay');
  const oldValue = parseInt(payEl.innerText.replace(/\D/g, '')) || 0;
  animateCounter(payEl, oldValue, totalPay);
}

async function createShift(e, staffId) {
  const timeline = e.currentTarget;
  const rect = timeline.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const hour = Math.round(6 + (x / rect.width) * 18);

  // Проверка нет ли уже смены
  const { data: existing } = await _supabase
   .from('work_schedules')
   .select('id')
   .eq('staff_id', staffId)
   .eq('date', dateInput);

  if(existing && existing.length > 0) {
    if(!confirm('Смена уже есть. Перезаписать?')) return;
    await _supabase.from('work_schedules').delete().eq('id', existing[0].id);
  }

  await _supabase.from('work_schedules').insert({
    restaurant_id: restaurantId,
    staff_id: staffId,
    date: dateInput,
    start_time: `${hour}:00`,
    end_time: `${hour+8}:00`,
    status: 'active'
  });
  loadShifts();
}

loadStaff();
</script>
</body>
  </html>
