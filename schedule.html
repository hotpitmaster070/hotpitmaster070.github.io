<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>График смен - HotPit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background: rgb(39 39 42); border: 1px solid rgb(63 63 70); padding: 16px; border-radius: 12px; }
    .btn-danger { background: rgb(127 29 29); color: white; padding: 8px; border-radius: 8px; }
    .staff-day-btn { padding: 8px 16px; border-radius: 8px; background: rgb(63 63 70); color: white; }
    .staff-day-btn.active { background: rgb(22 163 74); }
    .month-day-btn { padding: 8px; border-radius: 6px; background: rgb(63 63 70); color: white; font-size: 12px; }
    .month-day-btn.active { background: rgb(249 115 22); color: black; }
    .pay-toggle button.active { background: rgb(249 115 22); color: black; padding: 6px 12px; border-radius: 6px; }
    .pay-toggle button.inactive { background: rgb(63 63 70); color: white; padding: 6px 12px; border-radius: 6px; }
    .calendar-day { padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; }
    .calendar-day.today { background: rgb(63 63 70); }
    .calendar-day.selected { background: rgb(249 115 22); color: black; }
    .sidebar-item.active { background: rgb(249 115 22 / 0.2); color: rgb(251 146 60); }
    .hidden { display: none; }
    #addModal.show, #datePickerModal.show, #taskModal.show { display: flex; }
    #addModal, #datePickerModal, #taskModal { display: none; }
    .input-field { background: rgb(24 24 27); border: 1px solid rgb(63 63 70); color: white; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div id="sidebarContainer"></div>

  <div class="ml-0 md:ml-64 p-4">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">График смен</h1>
      <div class="flex gap-2">
        <button id="viewDay" onclick="setView('day')" class="active">День</button>
        <button id="viewMonth" onclick="setView('month')" class="inactive">Месяц</button>
      </div>
    </div>

    <div id="dayNav" class="flex items-center justify-between mb-4">
      <button onclick="changeDay(-1)" class="p-2 bg-zinc-800 rounded-lg"><i data-lucide="chevron-left"></i></button>
      <div class="text-center cursor-pointer" onclick="openDatePicker()">
        <div id="currentDayText" class="text-lg font-semibold"></div>
        <div id="currentDayWeek" class="text-sm text-zinc-400"></div>
        <div id="currentDateBadge" class="text-xs text-zinc-500"></div>
      </div>
      <button onclick="changeDay(1)" class="p-2 bg-zinc-800 rounded-lg"><i data-lucide="chevron-right"></i></button>
    </div>

    <div id="monthNav" class="hidden flex items-center justify-between mb-4">
      <button onclick="changeMonth(-1)" class="p-2 bg-zinc-800 rounded-lg"><i data-lucide="chevron-left"></i></button>
      <div id="currentMonthText" class="text-lg font-semibold"></div>
      <button onclick="changeMonth(1)" class="p-2 bg-zinc-800 rounded-lg"><i data-lucide="chevron-right"></i></button>
    </div>

    <button onclick="openAddModal()" class="w-full bg-orange-500 text-black font-semibold py-3 rounded-xl mb-4">
      + Добавить повара
    </button>

    <div id="scheduleContent">
      <div class="text-zinc-500 text-center py-8">Загрузка...</div>
    </div>
  </div>

  <!-- Модалка добавления повара -->
  <div id="addModal" class="fixed inset-0 bg-black/50 items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-2xl p-6 w-11/12 max-w-md border-zinc-800">
      <h3 class="text-xl font-bold mb-4">Новый повар</h3>
      <input id="newStaffName" placeholder="Имя" class="input-field w-full p-3 rounded-lg mb-3">
      <input id="newStaffRate" type="number" placeholder="Ставка" class="input-field w-full p-3 rounded-lg mb-3">
      <div class="pay-toggle flex gap-2 mb-4">
        <button id="payHourly" onclick="selectPayType('hourly')" class="active">Почасовой</button>
        <button id="payDaily" onclick="selectPayType('daily')" class="inactive">Фикс за день</button>
      </div>
      <div class="flex gap-2">
        <button onclick="closeAddModal()" class="flex-1 bg-zinc-700 py-2 rounded-lg">Отмена</button>
        <button onclick="addStaff()" class="flex-1 bg-orange-500 text-black font-semibold py-2 rounded-lg">Добавить</button>
      </div>
    </div>
  </div>

  <!-- Календарь -->
  <div id="datePickerModal" class="fixed inset-0 bg-black/50 items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-2xl p-6 w-11/12 max-w-sm border-zinc-800">
      <div class="flex justify-between items-center mb-4">
        <button onclick="changePickerMonth(-1)"><i data-lucide="chevron-left"></i></button>
        <div id="pickerMonthYear" class="font-semibold"></div>
        <button onclick="changePickerMonth(1)"><i data-lucide="chevron-right"></i></button>
      </div>
      <div class="grid grid-cols-7 gap-1 text-xs text-zinc-400 mb-2">
        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
      </div>
      <div id="calendarDays" class="grid grid-cols-7 gap-1"></div>
      <button onclick="selectToday()" class="w-full mt-4 bg-orange-500 text-black font-semibold py-2 rounded-lg">Сегодня</button>
    </div>
  </div>

  <!-- Блок ошибки если нет rest в URL -->
  <div id="errorBox" class="hidden fixed inset-0 bg-zinc-950 flex items-center justify-center">
    <div class="text-center">
      <div class="text-6xl mb-4">⚠️</div>
      <div class="text-xl font-bold mb-2">Нет ID ресторана</div>
      <div class="text-zinc-400">Открой страницу через ссылку с ?rest=ID</div>
    </div>
  </div>

  <!-- Контейнеры для вкладок -->
  <div id="tab-staff" class="hidden"></div>
  <div id="tab-prod" class="hidden"></div>
  <div id="tab-qr" class="hidden"></div>
  <div id="tab-reports" class="hidden"></div>

  <script src="script.js"></script>
  <script src="timecheck.js"></script>
  <script>lucide.createIcons();</script>
</body>
  </html>
