<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Управление - HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --accent: #f97316;
    --accent-dark: #ea580c;
  }
.btn-primary {
    background: var(--accent);
    color: white;
  }
.btn-primary:hover {
    background: var(--accent-dark);
  }
.btn-danger {
    background: #ef4444;
    color: white;
  }
.btn-danger:hover {
    background: #dc2626;
  }
.toggle-active {
    background: var(--accent);
  }
.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
  font-size:18px;
}
.logo-link{
  color:#f97316;
  font-weight:800;
  text-decoration:none;
  font-size:24px;
}
.logo-link:hover{opacity:0.8;}
.divider{color:#71717a;}
.nav-link{
  color:#d4d4d8;
  text-decoration:none;
  font-size:18px;
}
.nav-link:hover{color:#f97316;}
</style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 md:p-6">

<div class="max-w-5xl mx-auto space-y-6">

  <!-- Кликабельная шапка -->
  <header class="topbar">
    <a href="/" class="logo-link">HotPit</a>
    <span class="divider">|</span>
    <a href="#" onclick="window.scrollTo({top:0, behavior:'smooth'});return false;" class="nav-link">Управление</a>
  </header>

  <!-- Блок 1: Повара -->
  <div class="bg-zinc-900 rounded-xl p-6 border-zinc-800">
    <div class="flex items-center gap-2 mb-4">
      <i data-lucide="users" class="text-orange-500"></i>
      <h2 class="text-xl font-bold">Повара</h2>
    </div>

    <div class="flex gap-3 mb-4">
      <input id="newStaffName" placeholder="Имя повара"
        class="flex-1 bg-zinc-800 rounded-lg p-3 border-zinc-700 focus:border-orange-500 outline-none">
      <button onclick="addStaff()" class="btn-primary px-6 rounded-lg font-semibold">
        <i data-lucide="plus" class="inline w-4 h-4"></i> Добавить
      </button>
    </div>

    <div id="staffList" class="space-y-3"></div>
  </div>

  <!-- Блок 2: График -->
  <div class="bg-zinc-900 rounded-xl p-6 border-zinc-800">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <i data-lucide="calendar" class="text-orange-500"></i>
        <h2 class="text-xl font-bold" id="scheduleTitle">График</h2>
      </div>
      <div class="flex gap-2">
        <button onclick="setView('day')" id="btnDay" class="px-3 py-1 rounded-lg bg-orange-600 text-sm">День</button>
        <button onclick="setView('week')" id="btnWeek" class="px-3 py-1 rounded-lg bg-zinc-700 text-sm">Неделя</button>
        <button onclick="setView('month')" id="btnMonth" class="px-3 py-1 rounded-lg bg-zinc-700 text-sm">Месяц</button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
      <select id="staffSelect" class="bg-zinc-800 rounded-lg p-3 border-zinc-700 focus:border-orange-500 outline-none"></select>
      <input type="date" id="dateInput" class="bg-zinc-800 rounded-lg p-3 border-zinc-700 focus:border-orange-500 outline-none">
      <input type="time" id="timeIn" value="09:00" class="bg-zinc-800 rounded-lg p-3 border-zinc-700 focus:border-orange-500 outline-none">
      <input type="time" id="timeOut" value="18:00" class="bg-zinc-800 rounded-lg p-3 border-zinc-700 focus:border-orange-500 outline-none">
    </div>

    <button onclick="addShift()" class="w-full bg-green-600 hover:bg-green-700 rounded-lg p-3 font-semibold">
      <i data-lucide="calendar-plus" class="inline w-4 h-4"></i> Добавить в график
    </button>

    <button onclick="showTodayReport()" class="w-full mt-3 bg-orange-600 hover:bg-orange-700 rounded-lg p-3 font-semibold">
      <i data-lucide="clipboard-list" class="inline w-4 h-4"></i> Табель на сегодня
    </button>

    <div id="todayShifts" class="mt-6 space-y-2"></div>
  </div>

</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
const restaurantId = urlParams.get('rest');

let currentView = 'day';

if (!restaurantId) {
  document.body.innerHTML = '<div class="text-center py-20 text-red-400">Ошибка: не указан ресторан. Открой ссылку из onboarding.html</div>';
}

document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
document.getElementById('dateInput').addEventListener('change', loadShifts);

loadStaff();
loadShifts();

function setView(view) {
  currentView = view;
  document.getElementById('btnDay').className = view === 'day'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  document.getElementById('btnWeek').className = view === 'week'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  document.getElementById('btnMonth').className = view === 'month'? 'px-3 py-1 rounded-lg bg-orange-600 text-sm' : 'px-3 py-1 rounded-lg bg-zinc-700 text-sm';
  loadShifts();
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return;

  const { error } = await _supabase.from('staff').insert({
    restaurant_id: restaurantId,
    name: name,
    role: 'staff',
    pay_type: 'hourly',
    hourly_rate: 0,
    daily_rate: 0
  });

  if (error) {
    alert('Ошибка: ' + error.message);
    return;
  }

  document.getElementById('newStaffName').value = '';
  loadStaff();
}

async function deleteStaff(id) {
  if (!confirm('Удалить повара?')) return;
  await _supabase.from('staff').delete().eq('id', id);
  loadStaff();
}

async function updateStaff(id, field, value) {
  await _supabase.from('staff').update({ [field]: parseFloat(value) || value }).eq('id', id);
  loadStaff();
}

async function loadStaff() {
  const { data, error } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);

  if (error) {
    alert('Ошибка загрузки поваров: ' + error.message);
    return;
  }

  document.getElementById('staffList').innerHTML = data.map(s => `
    <div class="bg-zinc-800 rounded-lg p-4 border-zinc-700">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-2">
          <i data-lucide="user" class="w-4 h-4 text-zinc-400"></i>
          <span class="font-semibold">${s.name}</span>
          <span class="text-zinc-500 text-sm">${s.role === 'owner'? 'Шеф' : 'Повар'}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="showQR('${s.id}', '${s.name}')" class="text-purple-400 hover:text-purple-300">
            <i data-lucide="qr-code" class="w-4 h-4"></i>
          </button>
          ${s.role!== 'owner'? `<button onclick="deleteStaff('${s.id}')" class="text-red-400 hover:text-red-300">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>` : ''}
        </div>
      </div>

      ${s.role!== 'owner'? `
      <div class="flex gap-2 mb-3">
        <button onclick="updateStaff('${s.id}', 'pay_type', 'hourly')"
          class="flex-1 py-2 rounded-lg text-sm ${s.pay_type === 'hourly'? 'toggle-active' : 'bg-zinc-700'}">
          Почасовой
        </button>
        <button onclick="updateStaff('${s.id}', 'pay_type', 'daily')"
          class="flex-1 py-2 rounded-lg text-sm ${s.pay_type === 'daily'? 'toggle-active' : 'bg-zinc-700'}">
          Фикс за день
        </button>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div class="${s.pay_type === 'hourly'? '' : 'hidden'}">
          <label class="text-xs text-zinc-400">₽/час</label>
          <input type="number" value="${s.hourly_rate || 0}"
            onchange="updateStaff('${s.id}', 'hourly_rate', this.value)"
            class="w-full bg-zinc-700 rounded px-2 py-1 text-sm">
        </div>
        <div class="${s.pay_type === 'daily'? '' : 'hidden'}">
          <label class="text-xs text-zinc-400">₽/день</label>
          <input type="number" value="${s.daily_rate || 0}"
            onchange="updateStaff('${s.id}', 'daily_rate', this.value)"
            class="w-full bg-zinc-700 rounded px-2 py-1 text-sm">
        </div>
      </div>
      ` : ''}
    </div>
  `).join('') || '<p class="text-zinc-500 text-sm">Поваров пока нет</p>';

  document.getElementById('staffSelect').innerHTML = data
.filter(s => s.role!== 'owner')
.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

  lucide.createIcons();
}

function showQR(staffId, name) {
  const checkinURL = `${window.location.origin}/staff.html?staff=${staffId}&rest=${restaurantId}&type=checkin`;
  const checkoutURL = `${window.location.origin}/staff.html?staff=${staffId}&rest=${restaurantId}&type=checkout`;
  const html = `
  <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onclick="this.remove()">
    <div class="bg-zinc-900 rounded-xl p-6 max-w-sm w-full text-center" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-4">QR для ${name}</h3>
      <div class="space-y-4">
        <div><p class="text-sm text-zinc-400 mb-2">Приход</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkinURL)}" class="mx-auto rounded-lg">
        </div>
        <div><p class="text-sm text-zinc-400 mb-2">Уход</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkoutURL)}" class="mx-auto rounded-lg">
        </div>
        <button onclick="this.closest('.fixed').remove()" class="w-full mt-4 bg-zinc-700 hover:bg-zinc-600 rounded-lg p-2">Закрыть</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function addShift() {
  const staffId = document.getElementById('staffSelect').value;
  const date = document.getElementById('dateInput').value;
  const timeIn = document.getElementById('timeIn').value;
  const timeOut = document.getElementById('timeOut').value;

  if (!staffId) {
    alert('Выбери повара');
    return;
  }

  const { error } = await _supabase.from('work_schedules').insert({
    restaurant_id: restaurantId,
    staff_id: staffId,
    date: date,
    start_time: timeIn,
    end_time: timeOut,
    status: 'active'
  });

  if (error) {
    alert('Ошибка: ' + error.message);
    return;
  }

  loadShifts();
}

async function deleteShift(id) {
  if (!confirm('Удалить смену?')) return;
  await _supabase.from('work_schedules').delete().eq('id', id);
  loadShifts();
}

async function toggleShiftStatus(id, currentStatus) {
  const newStatus = currentStatus === 'active'? 'cancelled' : 'active';
  await _supabase.from('work_schedules').update({ status: newStatus }).eq('id', id);
  loadShifts();
}

function calcHours(start, end) {
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let hours = (eh + em/60) - (sh + sm/60);
  return hours > 0? hours : 0;
}

function calcPay(staff, hours) {
  if (staff.pay_type === 'daily') {
    return staff.daily_rate || 0;
  } else {
    return hours * (staff.hourly_rate || 0);
  }
}

async function loadShifts() {
  const selectedDate = document.getElementById('dateInput').value;

  let startDate, endDate, title;

  if (currentView === 'day') {
    startDate = selectedDate;
    endDate = selectedDate;
    title = `График на ${selectedDate.split('-').reverse().join('.')}`;
  } else if (currentView === 'week') {
    const date = new Date(selectedDate);
    const day = date.getDay();
    const diff = day === 0? 6 : day - 1;
    date.setDate(date.getDate() - diff);
    startDate = date.toISOString().split('T')[0];
    date.setDate(date.getDate() + 6);
    endDate = date.toISOString().split('T')[0];
    title = `Неделя ${startDate.split('-').reverse().join('.')} - ${endDate.split('-').reverse().join('.')}`;
  } else {
    startDate = selectedDate.slice(0,7) + '-01';
    const d = new Date(selectedDate.slice(0,7) + '-01');
    d.setMonth(d.getMonth() + 1);
    d.setDate(0);
    endDate = d.toISOString().split('T')[0];
    title = `Месяц ${startDate.slice(5,7)}.${startDate.slice(0,4)}`;
  }

  document.getElementById('scheduleTitle').innerText = title;

  const { data, error } = await _supabase
.from('work_schedules')
.select('*, staff(id, name, hourly_rate, daily_rate, pay_type)')
.gte('date', startDate)
.lte('date', endDate)
.eq('restaurant_id', restaurantId)
.order('date')
.order('start_time');

  if (error) {
    alert('Ошибка загрузки графика: ' + error.message);
    return;
  }

  const monthStart = selectedDate.slice(0,7) + '-01';
  const { data: monthData } = await _supabase
.from('work_schedules')
.select('staff_id, start_time, end_time')
.eq('restaurant_id', restaurantId)
.gte('date', monthStart)
.lte('date', selectedDate)
.eq('status', 'active');

  const monthPay = {};
  monthData?.forEach(s => {
    const hours = calcHours(s.start_time, s.end_time);
    const staff = data.find(d => d.staff_id === s.staff_id)?.staff;
    if (staff) {
      const pay = calcPay(staff, hours);
      monthPay[s.staff_id] = (monthPay[s.staff_id] || 0) + pay;
    }
  });

  document.getElementById('todayShifts').innerHTML = data.map(s => {
    const hours = calcHours(s.start_time, s.end_time);
    const pay = calcPay(s.staff, hours);
    const monthSalary = monthPay[s.staff_id] || 0;

    return `
    <div class="bg-zinc-800 rounded-lg p-3 border-zinc-700 ${s.status === 'cancelled'? 'opacity-50' : ''}">
      <div class="flex justify-between items-start">
        <div class="flex items-center gap-2">
          <button onclick="toggleShiftStatus('${s.id}', '${s.status}')"
            class="w-5 h-5 rounded-full ${s.status === 'active'? 'bg-green-500' : 'bg-zinc-600'}"
            title="${s.status === 'active'? 'Активна' : 'Отменена'}"></button>
          <div>
            <div class="font-semibold">${s.staff.name}</div>
            <div class="text-xs text-zinc-400">${s.date.split('-').reverse().join('.')} • ${s.start_time.slice(0,5)}-${s.end_time.slice(0,5)} • ${hours.toFixed(1)}ч</div>
            <div class="text-xs text-green-400">
              ${s.staff.pay_type === 'daily'? 'Фикс' : 'Почасово'}:
              За день ${pay.toFixed(0)}₽ • За месяц ${monthSalary.toFixed(0)}₽
            </div>
          </div>
        </div>
        <button onclick="deleteShift('${s.id}')" class="text-red-400 hover:text-red-300">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  `}).join('') || '<p class="text-zinc-500 text-sm text-center py-4">На этот период смен нет</p>';

  lucide.createIcons();
}

async function showTodayReport() {
  const today = new Date().toISOString().split('T')[0];
  const monthStart = today.slice(0,7) + '-01';

  const { data } = await _supabase
.from('work_schedules')
.select('*, staff(name, hourly_rate, daily_rate, pay_type)')
.eq('date', today)
.eq('restaurant_id', restaurantId)
.eq('status', 'active');

  let html = `<div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onclick="this.remove()">
    <div class="bg-zinc-900 rounded-xl p-6 max-w-md w-full" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-4">Табель на ${today.split('-').reverse().join('.')}</h3>
      <div class="space-y-2">`;

  if (!data || data.length === 0) {
    html += '<p class="text-zinc-500">Сегодня никто не работает</p>';
  } else {
    let totalPay = 0;
    html += data.map(s => {
      const hours = calcHours(s.start_time, s.end_time);
      const pay = calcPay(s.staff, hours);
      totalPay += pay;
      return `
      <div class="bg-zinc-800 rounded-lg p-3">
        <div class="font-semibold">${s.staff.name} <span class="text-xs text-zinc-400">
          ${s.staff.pay_type === 'daily'? 'Фикс' : 'Почасово'}
        </span></div>
        <div class="text-sm text-zinc-400">${s.start_time.slice(0,5)}-${s.end_time.slice(0,5)} • ${hours.toFixed(1)}ч</div>
        <div class="text-sm text-green-400">Заработал: ${pay.toFixed(0)}₽</div>
      </div>`;
    }).join('');
    html += `<div class="border-t border-zinc-700 pt-3 mt-3 text-lg font-bold">Итого: ${totalPay.toFixed(0)}₽</div>`;
  }

  html += `</div><button onclick="this.closest('.fixed').remove()"
    class="w-full mt-4 bg-zinc-700 hover:bg-zinc-600 rounded-lg p-2">Закрыть</button></div></div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}
</script>
</body>
  </html>
