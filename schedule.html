<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>График смен</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0a0a0a; color: white; font-family: Inter, sans-serif; }
    .card { background: #27272a; border: 1px solid #3f3f46; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    .staff-day-btn { padding: 8px 16px; border-radius: 8px; background: #3f3f46; }
    .staff-day-btn.active { background: #16a34a; }
    .month-day-btn { padding: 8px; border-radius: 6px; background: #3f3f46; font-size: 12px; }
    .month-day-btn.active { background: #f97316; color: black; }
    .pay-toggle button.active { background: #f97316; color: black; padding: 6px 12px; border-radius: 6px; }
    .pay-toggle button.inactive { background: #3f3f46; padding: 6px 12px; border-radius: 6px; }
    .calendar-day { padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; }
    .calendar-day.today { background: #3f3f46; }
    .calendar-day.selected { background: #f97316; color: black; }
    .hidden { display: none; }
    #addModal.show, #datePickerModal.show { display: flex; }
    #addModal, #datePickerModal { display: none; }
    .input-field { background: #18181b; border: 1px solid #3f3f46; color: white; }
  </style>
</head>
<body>

  <div id="sidebarContainer"></div>

  <!-- ВОТ ЭТА ОБЁРТКА. БЫЛА ПРОБЛЕМА -->
  <div id="mainContent" class="ml-0 md:ml-64 p-4">
    
    <div class="flex justify-between mb-6">
      <h1 class="text-2xl font-bold">График смен</h1>
      <div class="flex gap-2">
        <button id="viewDay" onclick="setView('day')" class="active">День</button>
        <button id="viewMonth" onclick="setView('month')" class="inactive">Месяц</button>
      </div>
    </div>

    <div id="dayNav" class="flex justify-between mb-4">
      <button onclick="changeDay(-1)">←</button>
      <div onclick="openDatePicker()">
        <div id="currentDayText"></div>
        <div id="currentDayWeek" class="text-sm text-zinc-400"></div>
        <div id="currentDateBadge" class="text-xs text-zinc-500"></div>
      </div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div id="monthNav" class="hidden justify-between mb-4">
      <button onclick="changeMonth(-1)">←</button>
      <div id="currentMonthText"></div>
      <button onclick="changeMonth(1)">→</button>
    </div>

    <button onclick="openAddModal()" class="w-full bg-orange-500 text-black font-semibold py-3 rounded-xl mb-4">
      + Добавить повара
    </button>

    <div id="scheduleContent">Загрузка...</div>
  </div>

  <!-- Модалка -->
  <div id="addModal" class="fixed inset-0 bg-black/50 items-center justify-center">
    <div class="bg-zinc-900 rounded-2xl p-6 w-11/12 max-w-md">
      <h3 class="text-xl font-bold mb-4">Новый повар</h3>
      <input id="newStaffName" placeholder="Имя" class="input-field w-full p-3 rounded-lg mb-3">
      <input id="newStaffRate" type="number" placeholder="Ставка" class="input-field w-full p-3 rounded-lg mb-3">
      <div class="pay-toggle flex gap-2 mb-4">
        <button id="payHourly" onclick="selectPayType('hourly')" class="active">Почасовой</button>
        <button id="payDaily" onclick="selectPayType('daily')" class="inactive">Фикс за день</button>
      </div>
      <div class="flex gap-2">
        <button onclick="closeAddModal()">Отмена</button>
        <button onclick="addStaff()">Добавить</button>
      </div>
    </div>
  </div>

  <!-- Календарь -->
  <div id="datePickerModal" class="fixed inset-0 bg-black/50 items-center justify-center">
    <div class="bg-zinc-900 rounded-2xl p-6 w-11/12 max-w-sm">
      <div class="flex justify-between mb-4">
        <button onclick="changePickerMonth(-1)">←</button>
        <div id="pickerMonthYear"></div>
        <button onclick="changePickerMonth(1)">→</button>
      </div>
      <div class="grid grid-cols-7 gap-1 text-xs text-zinc-400 mb-2">
        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
      </div>
      <div id="calendarDays" class="grid grid-cols-7 gap-1"></div>
      <button onclick="selectToday()" class="w-full mt-4 bg-orange-500 text-black py-2 rounded-lg">Сегодня</button>
    </div>
  </div>

  <div id="errorBox" class="hidden fixed inset-0 bg-zinc-950 flex items-center justify-center">
    <div class="text-center">
      <div class="text-xl font-bold">Нет ID ресторана</div>
      <div class="text-zinc-400">Открой через ?rest=ID</div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>lucide.createIcons();</script>
</body>
        </html>
