<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
body{background:#060606;color:#f4f4f5;font-family:'Inter',system-ui; -webkit-tap-highlight-color: transparent;}
.glass{background:rgba(20,20,20,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:24px}
.btn{font-weight:700;border-radius:16px;transition:all.2s}
.btn:active{transform:scale(0.96)}
.btn-primary{background:linear-gradient(135deg,#f97316 0%,#fb923c 100%);color:#000;box-shadow:0 8px 20px rgba(249,115,22,0.3)}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)}
.btn-danger{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3)}
.input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;color:#fff;width:100%;font-size:16px}
.input:focus{border-color:#f97316;outline:none}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000}
.day{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;transition:all.15s}
.day:active{transform:scale(0.9)}
.day.active{background:linear-gradient(135deg,#22c55e,#4ade80);color:#000;border-color:#22c55e;box-shadow:0 4px 12px rgba(34,197,94,0.4)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50}
.modal.show{display:flex}
h1{font-weight:900;letter-spacing:-0.02em}
</style>
</head>
<body class="p-4">
<div class="max-w-md mx-auto">

  <!-- Шапка -->
  <div class="mb-6">
    <h1 class="text-3xl">Кухня</h1>
    <p id="monthLabel" class="text-zinc-400 text-sm mt-1"></p>
  </div>

  <!-- Переключатель месяца -->
  <div class="flex gap-3 mb-5">
    <button class="btn btn-ghost w-14 h-14 text-xl" onclick="prevMonth()">‹</button>
    <button class="btn btn-ghost flex-1 text-base" onclick="nextMonth()">След. месяц ›</button>
  </div>

  <!-- Добавить -->
  <button class="btn btn-primary w-full h-14 mb-6 text-base" onclick="openAdd()">+ Добавить сотрудника</button>

  <!-- Список -->
  <div id="staffList" class="space-y-4"></div>
</div>

<!-- Модал добавления -->
<div id="addModal" class="modal">
  <div class="glass w-full max-w-sm p-6 m-4">
    <h3 class="font-bold text-xl mb-4">Новый сотрудник</h3>
    <input id="name" placeholder="Имя" class="input mb-3">
    <select id="role" class="input mb-3"><option value="cook">Повар</option><option value="dishwasher">Мойщик</option></select>
    <select id="pay" class="input mb-3" onchange="toggleRate()"><option value="hourly">По часам</option><option value="daily">За смену</option></select>
    <input id="rate" type="number" placeholder="Ставка ₽" class="input mb-4">
    <div id="qrBox" class="hidden text-center mb-4"><canvas id="qr" class="mx-auto"></canvas><p class="text-xs text-zinc-400 mt-2">QR для повара</p></div>
    <button id="saveBtn" class="btn btn-primary w-full h-14 mb-2" onclick="saveStaff()">Сохранить</button>
    <button class="btn btn-ghost w-full h-12" onclick="closeAdd()">Закрыть</button>
  </div>
</div>

<!-- Модал времени -->
<div id="timeModal" class="modal">
  <div class="glass w-full max-w-xs p-6 m-4">
    <h3 class="font-bold text-lg mb-4">Время смены</h3>
    <input id="startTime" type="time" value="08:00" class="input mb-3">
    <input id="endTime" type="time" value="16:00" class="input mb-4">
    <button class="btn btn-primary w-full h-12 mb-2" onclick="confirmTime()">Подтвердить</button>
    <button class="btn btn-ghost w-full h-12" onclick="closeTime()">Отмена</button>
  </div>
</div>

<script>
const db = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
const restId = new URLSearchParams(location.search).get('rest');
let currentDate = new Date();
let staffList = [];
let schedules = [];
let pendingToggle = null;
let saving = false;

function openAdd(){document.getElementById('addModal').classList.add('show')}
function closeAdd(){document.getElementById('addModal').classList.remove('show');document.getElementById('qrBox').classList.add('hidden')}
function closeTime(){document.getElementById('timeModal').classList.remove('show')}
function toggleRate(){document.getElementById('rate').placeholder = document.getElementById('pay').value=='hourly'?'Ставка ₽/час':'Ставка ₽/смена'}

async function saveStaff(){
  if(saving) return;
  const name = document.getElementById('name').value.trim();
  const role = document.getElementById('role').value;
  const pay = document.getElementById('pay').value;
  const rate = parseFloat(document.getElementById('rate').value);
  if(!name ||!rate){alert('Введи имя и ставку'); return;}
  saving = true;
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'Сохраняю...';
  const obj = {name, role, restaurant_id: restId, pay_type: pay};
  if(pay=='hourly') obj.hourly_rate = rate; else obj.daily_rate = rate;
  const {data, error} = await db.from('staff').insert(obj).select().single();
  if(error){alert('Ошибка: '+error.message); saving=false; document.getElementById('saveBtn').disabled=false; document.getElementById('saveBtn').textContent='Сохранить'; return;}
  QRCode.toCanvas(document.getElementById('qr'), data.qr_uuid, {width:200});
  document.getElementById('qrBox').classList.remove('hidden');
  setTimeout(()=>{closeAdd(); document.getElementById('name').value=''; document.getElementById('rate').value=''; saving=false; document.getElementById('saveBtn').disabled=false; document.getElementById('saveBtn').textContent='Сохранить'; loadStaff();}, 2500);
}

async function loadStaff(){
  const {data} = await db.from('staff').select('*').eq('restaurant_id', restId);
  staffList = data || [];
  const start = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).toISOString().split('T')[0];
  const end = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).toISOString().split('T')[0];
  const {data:s} = await db.from('work_schedules').select('id,staff_id,date').eq('restaurant_id',restId).gte('date',start).lte('date',end);
  schedules = s || [];
  renderStaff();
}

function renderStaff(){
  document.getElementById('monthLabel').textContent = currentDate.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  const container = document.getElementById('staffList');
  container.innerHTML = staffList.map(s => {
    const days = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
    let grid = '';
    for(let d=1;d<=days;d++){
      const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasShift = schedules.find(x => x.staff_id==s.id && x.date==dateStr);
      grid += `<div class="day ${hasShift?'active':''}" onclick="toggleShift('${s.id}','${dateStr}')">${d}</div>`;
    }
    const staffUrl = `https://hotpitmaster070.github.io/staff.html?staff=${s.id}`;
    return `
    <div class="glass p-5">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-4">
          <div class="avatar">${s.name[0].toUpperCase()}</div>
          <div>
            <div class="font-bold text-lg">${s.name}</div>
            <div class="text-sm text-zinc-400">${s.role=='cook'?'Повар':'Мойщик'} • ${s.pay_type=='hourly'?s.hourly_rate+'₽/ч':s.daily_rate+'₽/смена'}</div>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-danger px-4 h-10 text-sm" onclick="requestFire('${s.id}')">Уволить</button>
          <button class="btn btn-ghost w-10 h-10 text-lg" onclick="deleteStaff('${s.id}')">🗑</button>
        </div>
      </div>
      <div class="grid grid-cols-7 gap-2">${grid}</div>
      ${s.role=='cook'?`<a href="${staffUrl}" target="_blank" class="inline-block mt-4 text-sm font-semibold text-orange-400">Открыть кабинет повара →</a>`:''}
    </div>`;
  }).join('') || '<p class="text-zinc-500 text-center mt-10">Добавь первого сотрудника</p>';
}

function toggleShift(staff_id, date){
  const existing = schedules.find(x => x.staff_id==staff_id && x.date==date);
  if(existing){db.from('work_schedules').delete().eq('id',existing.id).then(()=>loadStaff());}
  else{pendingToggle = {staff_id, date}; document.getElementById('timeModal').classList.add('show');}
async function confirmTime(){
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;
  if(!pendingToggle) return;
  await db.from('work_schedules').insert({staff_id: pendingToggle.staff_id, restaurant_id: restId, date: pendingToggle.date, start_time: start, end_time: end});
  pendingToggle = null; closeTime(); loadStaff();
}
async function requestFire(staff_id){if(confirm('Отправить запрос на увольнение повару?')){await db.from('termination_requests').insert({staff_id, restaurant_id: restId, status:'pending'}); alert('Запрос отправлен');}}
async function deleteStaff(id){
  if(!confirm('Удалить сотрудника навсегда?')) return;
  await db.from('shifts').delete().eq('staff_id',id);
  await db.from('work_schedules').delete().eq('staff_id',id);
  await db.from('termination_requests').delete().eq('staff_id',id);
  await db.from('staff').delete().eq('id',id);
  loadStaff();
}
function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1); loadStaff();}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1); loadStaff();}
loadStaff();
</script>
</body>
</html>
