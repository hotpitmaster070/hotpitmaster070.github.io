<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Кухня - HotPit</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0a;color:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:20px;
}
.wrap{max-width:500px;margin:0 auto;}
.header{margin-bottom:20px;}
h1{font-size:28px;font-weight:800;margin-bottom:4px;}
.sub{color:#71717a;font-size:14px;}
.card{
  background:#171717;
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
.row{display:flex;gap:12px;margin-bottom:20px;}
.btn{
  height:56px;border-radius:10px;border:none;
  font-weight:600;font-size:16px;
  cursor:pointer;transition:0.2s;
}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#f97316;color:#fff;flex:1;}
.btn-primary:hover{background:#ea580c;}
.btn-ghost{background:#262626;color:#fff;width:56px;}
.btn-danger{background:#262626;color:#fca5a5;padding:0 16px;}
.btn-ghost:hover{background:#333;}
.btn-danger:hover{background:#7f1d1d;}
.input{
  width:100%;padding:14px;margin:8px 0;
  background:#262626;border:1px solid #333;
  border-radius:10px;color:#fff;font-size:15px;
  outline:none;
}
.input:focus{border-color:#f97316;}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;flex-shrink:0}
.staff-item{border-bottom:1px solid #262626;padding-bottom:16px;margin-bottom:16px;}
.staff-item:last-child{border-bottom:0;padding-bottom:0;margin-bottom:0;}
.calendar{
  display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;
}
.day{
  height:38px;border-radius:10px;border:1px solid #262626;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;background:#262626;cursor:pointer;
  transition:0.15s;
}
.day:active{transform:scale(0.9)}
.day.active{background:#10b981;color:#000;border-color:#10b981;} /* зелёный = смена есть */
.link{color:#f97316;font-size:14px;font-weight:600;text-decoration:none;display:inline-block;margin-top:12px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal.show{display:flex}
.modal-card{background:#171717;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,0.8);}
h3{font-size:20px;font-weight:700;margin-bottom:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Кухня</h1>
    <p id="monthLabel" class="sub"></p>
  </div>

  <div class="row">
    <button class="btn btn-ghost" onclick="prevMonth()">‹</button>
    <button class="btn btn-primary" onclick="nextMonth()">След. месяц ›</button>
  </div>

  <button class="btn btn-primary" style="width:100%;margin-bottom:20px;" onclick="openAdd()">+ Добавить сотрудника</button>

  <div id="staffList"></div>
</div>

<!-- Модалка добавления -->
<div id="addModal" class="modal">
  <div class="modal-card">
    <h3>Новый сотрудник</h3>
    <input id="name" placeholder="Имя" class="input">
    <select id="role" class="input"><option value="cook">Повар</option><option value="dishwasher">Мойщик</option></select>
    <select id="pay" class="input" onchange="toggleRate()"><option value="hourly">По часам</option><option value="daily">За смену</option></select>
    <input id="rate" type="number" placeholder="Ставка ₽/час" class="input">
    <div id="qrBox" style="display:none;text-align:center;margin:16px 0;"><canvas id="qr"></canvas><p style="font-size:12px;color:#71717a;margin-top:8px;">QR для повара</p></div>
    <button id="saveBtn" class="btn btn-primary" style="width:100%;margin-bottom:8px;" onclick="saveStaff()">Сохранить</button>
    <button class="btn btn-ghost" style="width:100%;" onclick="closeAdd()">Закрыть</button>
  </div>
</div>

<!-- Модалка времени -->
<div id="timeModal" class="modal">
  <div class="modal-card">
    <h3>Время смены</h3>
    <input id="startTime" type="time" value="08:00" class="input">
    <input id="endTime" type="time" value="16:00" class="input">
    <button class="btn btn-primary" style="width:100%;margin-bottom:8px;" onclick="confirmTime()">Подтвердить</button>
    <button class="btn btn-ghost" style="width:100%;" onclick="closeTime()">Отмена</button>
  </div>
</div>

<script>
const db = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
const restId = new URLSearchParams(location.search).get('rest');
let currentDate = new Date();
let staffList = [];
let schedules = [];
let pendingToggle = null;
let saving = false;

function openAdd(){document.getElementById('addModal').classList.add('show')}
function closeAdd(){document.getElementById('addModal').classList.remove('show');document.getElementById('qrBox').style.display='none'}
function closeTime(){document.getElementById('timeModal').classList.remove('show')}
function toggleRate(){document.getElementById('rate').placeholder = document.getElementById('pay').value=='hourly'?'Ставка ₽/час':'Ставка ₽/смена'}

async function saveStaff(){
  if(!restId){alert('Ошибка: нет ID ресторана в ссылке. Добавь?rest=ID'); return;}
  if(saving) return;
  const name = document.getElementById('name').value.trim();
  const role = document.getElementById('role').value;
  const pay = document.getElementById('pay').value;
  const rate = parseFloat(document.getElementById('rate').value);
  if(!name ||!rate){alert('Введи имя и ставку'); return;}
  saving = true;
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'Сохраняю...';
  const obj = {name, role, restaurant_id: restId, pay_type: pay};
  if(pay=='hourly') obj.hourly_rate = rate; else obj.daily_rate = rate;
  const {data, error} = await db.from('staff').insert(obj).select().single();
  if(error){alert('Ошибка: '+error.message); saving=false; document.getElementById('saveBtn').disabled=false; document.getElementById('saveBtn').textContent='Сохранить'; return;}
  QRCode.toCanvas(document.getElementById('qr'), data.qr_uuid, {width:200});
  document.getElementById('qrBox').style.display='block';
  setTimeout(()=>{closeAdd(); document.getElementById('name').value=''; document.getElementById('rate').value=''; saving=false; document.getElementById('saveBtn').disabled=false; document.getElementById('saveBtn').textContent='Сохранить'; loadStaff();}, 2500);
}

async function loadStaff(){
  if(!restId){document.getElementById('staffList').innerHTML='<p style="color:#ef4444;text-align:center;margin-top:40px;">Ошибка: открой по ссылке с?rest=ID</p>'; return;}
  const {data} = await db.from('staff').select('*').eq('restaurant_id', restId);
  staffList = data || [];
  const start = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).toISOString().split('T')[0];
  const end = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).toISOString().split('T')[0];
  const {data:s} = await db.from('work_schedules').select('id,staff_id,date').eq('restaurant_id',restId).gte('date',start).lte('date',end);
  schedules = s || [];
  renderStaff();
}

function renderStaff(){
  document.getElementById('monthLabel').textContent = currentDate.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  const container = document.getElementById('staffList');
  container.innerHTML = staffList.map(s => {
    const days = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
    let grid = '';
    for(let d=1;d<=days;d++){
      const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasShift = schedules.find(x => x.staff_id==s.id && x.date==dateStr);
      grid += `<div class="day ${hasShift?'active':''}" onclick="toggleShift('${s.id}','${dateStr}')">${d}</div>`;
    }
    const staffUrl = `${location.origin}/staff.html?staff=${s.id}`;
    return `
    <div class="card staff-item">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar">${s.name[0].toUpperCase()}</div>
          <div>
            <div style="font-weight:700;font-size:18px;">${s.name}</div>
            <div style="font-size:14px;color:#71717a;">${s.role=='cook'?'Повар':'Мойщик'} • ${s.pay_type=='hourly'?s.hourly_rate+'₽/ч':s.daily_rate+'₽/смена'}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-danger" onclick="requestFire('${s.id}')">Уволить</button>
          <button class="btn btn-ghost" style="width:44px;" onclick="deleteStaff('${s.id}')">🗑</button>
        </div>
      </div>
      <div class="calendar">${grid}</div>
      ${s.role=='cook'?`<a href="${staffUrl}" target="_blank" class="link">Открыть кабинет повара →</a>`:''}
    </div>`;
  }).join('') || '<div class="card" style="text-align:center;color:#71717a;">Добавь первого сотрудника</div>';
}

function toggleShift(staff_id, date){
  const existing = schedules.find(x => x.staff_id==staff_id && x.date==date);
  if(existing){db.from('work_schedules').delete().eq('id',existing.id).then(()=>loadStaff());}
  else{pendingToggle = {staff_id, date}; document.getElementById('timeModal').classList.add('show');}
}

async function confirmTime(){
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;
  if(!pendingToggle) return;
  await db.from('work_schedules').insert({staff_id: pendingToggle.staff_id, restaurant_id: restId, date: pendingToggle.date, start_time: start, end_time: end});
  pendingToggle = null; closeTime(); loadStaff();
}
async function requestFire(staff_id){if(confirm('Отправить запрос на увольнение повару?')){await db.from('termination_requests').insert({staff_id, restaurant_id: restId, status:'pending'}); alert('Запрос отправлен');}}
async function deleteStaff(id){
  if(!confirm('Удалить сотрудника навсегда?')) return;
  await db.from('shifts').delete().eq('staff_id',id);
  await db.from('work_schedules').delete().eq('staff_id',id);
  await db.from('termination_requests').delete().eq('staff_id',id);
  await db.from('staff').delete().eq('id',id);
  loadStaff();
}
function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1); loadStaff();}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1); loadStaff();}
loadStaff();
</script>
</body>
      </html>
