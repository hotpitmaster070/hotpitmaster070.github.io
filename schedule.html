<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Управление - HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --accent: #f97316;
    --accent-dark: #ea580c;
  }
  body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); }
 .glass { backdrop-filter: blur(16px); background: rgba(39, 39, 42, 0.5); border: 1px solid rgba(255,255,255,0.08); }
 .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(249,115,22,0.3);
  }
 .btn-primary:active { transform: scale(0.96); }
 .tab-active {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white;
    box-shadow: 0 4px 15px rgba(249,115,22,0.4);
    border-radius: 14px;
  }
 .tab-inactive {
    background: rgba(39, 39, 42, 0.5);
    color: #a1a1aa;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* ИСПРАВЛЕННЫЙ ТАЙМЛАЙН */
 .timeline {
    position: relative;
    height: 80px;
    background: rgba(63,63,70,0.25);
    border-radius: 18px;
    padding: 20px 16px 40px 16px; /* Отступ снизу 40px под цифры */
    border: 1px solid rgba(255,255,255,0.06);
  }
 .timeline-bar {
    position: absolute;
    top: 14px;
    height: 52px;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    border-radius: 14px;
    box-shadow: 0 6px 24px rgba(34,197,94,0.45);
    cursor: grab;
    border: 2px solid rgba(255,255,255,0.25);
    transition: all 0.2s;
  }
 .timeline-bar:active { transform: scale(0.98); }
 .timeline-hour {
    position: absolute;
    bottom: 10px;
    font-size: 10px;
    color: #a1a1aa;
    font-weight: 500;
    transform: translateX(-50%);
    letter-spacing: 0.5px;
  }

 .topbar{ display:flex; align-items:center; gap:12px; margin-bottom:24px; font-size:18px; }
 .logo-link{ color:#f97316; font-weight:800; text-decoration:none; font-size:24px; }
 .divider{color:#71717a;}
 .nav-link{ color:#d4d4d8; font-size:18px; }
</style>
</head>
<body class="text-zinc-100 p-4 md:p-6">

<div class="max-w-5xl mx-auto space-y-6">

  <!-- Кликабельная шапка -->
  <header class="topbar">
    <a href="/" class="logo-link">HotPit</a>
    <span class="divider">|</span>
    <span class="nav-link">Управление кухней</span>
  </header>

  <!-- ТАБЫ -->
  <div class="flex gap-2 mb-6 overflow-x-auto">
    <button id="tabBtnStaff" onclick="setTab('staff')" class="tab-active px-6 py-3 font-semibold">Повара</button>
    <button id="tabBtnProd" onclick="setTab('prod')" class="tab-inactive px-6 py-3 font-semibold">График</button>
    <button id="tabBtnStock" onclick="setTab('stock')" class="tab-inactive px-6 py-3 font-semibold">Склад</button>
    <button id="tabBtnReports" onclick="setTab('reports')" class="tab-inactive px-6 py-3 font-semibold">Отчёты</button>
  </div>

  <!-- ТАБ 1: ПОВАРА -->
  <div id="tab-staff" class="glass rounded-2xl p-6">
    <div class="flex items-center gap-2 mb-4">
      <i data-lucide="users" class="text-orange-500"></i>
      <h2 class="text-2xl font-bold">Повара</h2>
    </div>

    <div class="flex gap-3 mb-6">
      <input id="newStaffName" placeholder="Имя повара"
        class="flex-1 glass rounded-xl p-3 outline-none focus:border-orange-500">
      <button onclick="addStaff()" class="btn-primary px-8 rounded-xl font-bold">
        <i data-lucide="plus" class="inline w-4 h-4"></i> Добавить
      </button>
    </div>

    <div id="staffList" class="space-y-4"></div>
  </div>

  <!-- ТАБ 2: ГРАФИК КОСМОС -->
  <div id="tab-prod" class="hidden glass rounded-2xl p-6">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold" id="dateTitle">30 Мая, Пятница</h2>
      <input type="date" id="dateInput" class="glass rounded-xl px-4 py-2 outline-none focus:border-orange-500" onchange="loadShifts()">
    </div>

    <div id="timelineContainer" class="space-y-8">
      <!-- Сюда вставятся таймлайны поваров -->
    </div>

    <div class="glass rounded-2xl p-5 mt-8 border-green-500/20">
      <div class="flex justify-between items-center">
        <span class="text-zinc-400 text-lg">ИТОГО ФОТ ЗА ДЕНЬ:</span>
        <span id="totalPay" class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">0₽</span>
      </div>
    </div>
  </div>

  <!-- ТАБ 3: СКЛАД -->
  <div id="tab-stock" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Склад</h2>
    <div id="balanceList" class="space-y-2 text-zinc-400">В разработке</div>
  </div>

  <!-- ТАБ 4: ОТЧЁТЫ -->
  <div id="tab-reports" class="hidden glass rounded-2xl p-6">
    <h2 class="text-2xl font-bold mb-4">Отчёты</h2>
    <p class="text-zinc-500">В разработке</p>
  </div>

</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
const restaurantId = urlParams.get('rest');

if (!restaurantId) {
  document.body.innerHTML = '<div class="text-center py-20 text-red-400 text-2xl">Ошибка: не указан ресторан. Открой ссылку из onboarding.html</div>';
  throw new Error('No restaurant ID');
}

document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
updateDateTitle();

// Автооткрытие таба График если в ссылке #prod
if(window.location.hash === '#prod') {
  setTimeout(() => setTab('prod'), 100);
}

let currentTab = 'staff';
let staffList = [];

function setTab(tab) {
  currentTab = tab;
  ['staff','prod','stock','reports'].forEach(t => {
    document.getElementById('tab-'+t).classList.add('hidden');
    document.getElementById('tabBtn'+t.charAt(0).toUpperCase()+t.slice(1)).className = 'tab-inactive px-6 py-3 font-semibold';
  });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1)).className = 'tab-active px-6 py-3 font-semibold';
  if(tab === 'prod') loadShifts();
}

function updateDateTitle() {
  const date = new Date(document.getElementById('dateInput').value);
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'];
  document.getElementById('dateTitle').innerText = `${date.getDate()} ${months[date.getMonth()]}, ${days[date.getDay()]}`;
}

async function addStaff() {
  const name = document.getElementById('newStaffName').value.trim();
  if (!name) return;
  await _supabase.from('staff').insert({
    restaurant_id: restaurantId,
    name,
    role: 'staff',
    pay_type: 'hourly',
    hourly_rate: 300,
    daily_rate: 0
  });
  document.getElementById('newStaffName').value = '';
  loadStaff();
}

async function loadStaff() {
  const { data } = await _supabase.from('staff').select('*').eq('restaurant_id', restaurantId);
  staffList = data || [];
  document.getElementById('staffList').innerHTML = staffList.map(s => `
    <div class="glass rounded-2xl p-5">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-600 rounded-full flex items-center justify-center font-bold text-black text-xl">${s.name[0]}</div>
          <div class="font-bold text-xl">${s.name}</div>
        </div>
        <button onclick="deleteStaff('${s.id}')" class="text-zinc-500 hover:text-red-400 p-2">
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </button>
      </div>
      <div class="flex gap-2">
        <button onclick="setPayType('${s.id}', 'hourly')" class="${s.pay_type==='hourly'? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Почасовой</button>
        <button onclick="setPayType('${s.id}', 'daily')" class="${s.pay_type==='daily'? 'btn-primary' : 'bg-zinc-700'} flex-1 rounded-xl py-3 text-sm font-bold">Фикс</button>
      </div>
      <input type="number" value="${s.payType==='hourly'? s.hourly_rate : s.daily_rate}" onchange="saveRate('${s.id}', '${s.pay_type}', this.value)" class="w-full glass rounded-xl p-3 mt-3 outline-none text-lg font-semibold focus:border-orange-500">
    </div>
  `).join('');
  lucide.createIcons();
}

async function setPayType(id, type) {
  await _supabase.from('staff').update({ pay_type: type }).eq('id', id);
  loadStaff();
}

async function deleteStaff(id) {
  if(!confirm('Удалить?')) return;
  await _supabase.from('staff').delete().eq('id', id);
  loadStaff();
}

async function saveRate(id, type, val) {
  const field = type === 'hourly'? 'hourly_rate' : 'daily_rate';
  await _supabase.from('staff').update({ [field]: parseFloat(val) }).eq('id', id);
}

// ТАЙМЛАЙН КОСМОС v2
async function loadShifts() {
  updateDateTitle();
  const date = document.getElementById('dateInput').value;
  const { data: shifts } = await _supabase
 .from('work_schedules')
 .select('*, staff(id,name,pay_type,hourly_rate,daily_rate)')
 .eq('date', date);

  const container = document.getElementById('timelineContainer');
  let totalPay = 0;

  container.innerHTML = staffList.map(st => {
    const shift = shifts?.find(s => s.staff_id === st.id);
    let start = shift? parseInt(shift.start_time.split(':')[0]) : 9;
    let end = shift? parseInt(shift.end_time.split(':')[0]) : 18;
    let hours = end - start;

    let pay = 0;
    if(st.pay_type === 'hourly') {
      pay = hours * (st.hourly_rate || 0);
    } else {
      pay = st.daily_rate || 0;
      hours = 'фикс';
    }
    totalPay += pay;

    // ИСПРАВЛЕНИЕ: делаем только каждый 2й час чтобы не сливались
    const hoursHtml = Array.from({length: 9}, (_, i) => {
      const hour = 6 + i*2; // 6:00, 8:00, 10:00... 22:00
      const left = i * 12.5;
      return `<div class="timeline-hour" style="left: ${left}%">${hour}:00</div>`
    }).join('');

    const barLeft = (start - 6) * 5.55;
    const barWidth = hours * 5.55;

    return `
      <div>
        <div class="flex justify-between mb-3">
          <span class="font-bold text-xl">${st.name}</span>
          <span class="text-3xl font-bold text-green-400">+${pay}₽</span>
        </div>
        <div class="timeline" id="timeline-${st.id}" onclick="createShift(event, '${st.id}')">
          ${hoursHtml}
          ${shift? `<div class="timeline-bar" style="left: ${barLeft}%; width: ${barWidth}%"></div>` : ''}
        </div>
        <div class="text-zinc-500 text-sm mt-2">${shift? `${shift.start_time.slice(0,5)} - ${shift.end_time.slice(0,5)} = ${hours}ч` : 'Тапни по шкале чтобы добавить смену'}</div>
      </div>
    `;
  }).join('');

  document.getElementById('totalPay').innerText = totalPay.toLocaleString('ru-RU') + '₽';
}

async function createShift(e, staffId) {
  const timeline = e.currentTarget;
  const rect = timeline.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const hour = Math.round(6 + (x / rect.width) * 18);

  const date = document.getElementById('dateInput').value;
  await _supabase.from('work_schedules').insert({
    restaurant_id: restaurantId,
    staff_id: staffId,
    date: date,
    start_time: `${hour}:00`,
    end_time: `${hour+8}:00`,
    status: 'active'
  });
  loadShifts();
}

loadStaff();
</script>
</body>
  </html>
