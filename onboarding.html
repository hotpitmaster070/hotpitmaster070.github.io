<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создай ресторан</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; text-align: center; }
    input { width: 100%; max-width: 400px; padding: 15px; background: #2c2c2e; border: 1px solid #444; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; }
    button { width: 100%; max-width: 400px; padding: 18px; background: #ff3333; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Создай свой ресторан</h1>
  <input id="rest_name" type="text" placeholder="Название ресторана" />
  <button onclick="create()">СОЗДАТЬ</button>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function create() {
  const name = document.getElementById('rest_name').value.trim();
  if (!name) return alert('Введи название');

  const { data: { user }, error: userErr } = await db.auth.getUser();
  if (userErr || !user) return alert('Сессия умерла. Зайди заново');

  // 1. Создаём ресторан
  const { data: rest, error: restErr } = await db.from('restaurants')
    .insert({ name: name, owner_user_id: user.id })
    .select()
    .single();
  
  if (restErr) return alert('Ошибка создания ресторана: ' + restErr.message);

  // 2. Обновляем профиль
  const { error: profileErr } = await db.from('profiles')
    .update({ 
      restaurant_id: rest.id, 
      role: 'owner' 
    })
    .eq('id', user.id);

  if (profileErr) return alert('Ошибка обновления профиля: ' + profileErr.message);

  // 3. Сохраняем и идём в админку
  localStorage.setItem('active_restaurant_id', rest.id);
  localStorage.setItem('active_role', 'owner');

  alert('Готово! Ресторан создан');
  window.location.href = '/owner.html';
}

// Проверка сессии при загрузке
db.auth.getSession().then(({ data: { session } }) => {
  if (!session) window.location.href = '/index.html';
});
</script>
</body>
</html>
