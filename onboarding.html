<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройка</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; text-align: center; }
    .box { max-width: 400px; margin: 0 auto; }
    input { width: 100%; padding: 15px; margin: 15px 0; font-size: 16px; border-radius: 8px; border: 1px solid #48484a; background: #2c2c2e; color: #fff; box-sizing: border-box; }
    .btn { background: #ff3b30; color: #fff; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
  </style>
</head>
<body>
<div class="box">
  <h1>Создай свой ресторан</h1>
  <input id="rest_name" type="text" placeholder="Название ресторана" />
  <button class="btn" onclick="create()">СОЗДАТЬ</button>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function create() {
  const name = document.getElementById('rest_name').value;
  if (!name) return alert('Введи название');

  const { data: { user } = await db.auth.getUser();
  if (!user) return window.location.href = '/index.html';

  const { data: rest, error } = await db.from('restaurants').insert({ name }).select().single();
  if (error) return alert(error.message);

  await db.from('memberships').insert({ user_id: user.id, restaurant_id: rest.id, role: 'owner' });

  window.location.href = '/chef.html';
}

db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return window.location.href = '/index.html';
  
  const { data } = await db.from('memberships').select('restaurant_id').eq('user_id', session.user.id).limit(1);
  if (data && data.length > 0) window.location.href = '/chef.html';
});
</script>
</body>
</html>
