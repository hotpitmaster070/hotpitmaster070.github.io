<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создание ресторана</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
   .box { width: 100%; max-width: 400px; }
   .btn { background: #ff3b30; color: #fff; border: none; padding: 18px; margin: 8px 0; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
    input { width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; border-radius: 8px; border: 1px solid #48484a; background: #2c2c2e; color: #fff; box-sizing: border-box; }
    h1 { text-align: center; margin-bottom: 10px; }
    p { text-align: center; color: #aaa; margin-bottom: 30px; }
  </style>
</head>
<body>
<div class="box">
  <h1>Создай свой ресторан 🍖</h1>
  <p>Это займёт 10 секунд</p>
  <input id="restaurant_name" type="text" placeholder="Название ресторана" />
  <button class="btn" onclick="createRestaurant()">СОЗДАТЬ</button>
</div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function createRestaurant() {
  const name = document.getElementById('restaurant_name').value.trim();
  if (!name) return alert('Введи название');

  const { data: { user } = await db.auth.getUser();
  if (!user) return window.location.href = '/index.html';

  // 1. Создаём ресторан
  const { data: restaurant, error: rErr } = await db
    .from('restaurants')
    .insert({ name: name })
    .select()
    .single();

  if (rErr) return alert('Ошибка: ' + rErr.message);

  // 2. Обновляем профиль
  const { error: pErr } = await db
    .from('profiles')
    .update({ 
      restaurant_id: restaurant.id, 
      role: 'owner' 
    })
    .eq('id', user.id);

  if (pErr) return alert('Ошибка: ' + pErr.message);

  localStorage.setItem('active_restaurant_id', restaurant.id);
  localStorage.setItem('active_role', 'owner');
  
  alert('Готово! Ресторан создан.');
  window.location.href = '/owner.html';
}
</script>
</body>
</html>
