<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HotPit - Запуск кухни</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root { --accent: #f97316; --accent-dark: #ea580c; }
body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); }
.glass { backdrop-filter: blur(12px); background: rgba(39, 39, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; transition: all 0.2s; }
.btn-primary:active { transform: scale(0.95); }
.logo { color:#f97316; font-weight:800; font-size:32px; text-align:center; margin-bottom:24px; }
</style>
</head>
<body class="text-zinc-100 min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full">

  <!-- ШАГ 1: РЕГИСТРАЦИЯ -->
  <div id="step1" class="glass rounded-2xl p-8">
    <h1 class="logo">HotPit</h1>
    <h2 class="text-2xl font-bold text-center mb-6">Запусти кухню за 2 минуты</h2>
    <p class="text-zinc-400 text-center mb-6">Каждая подписка = 1 обед ребёнку-сироте 💛</p>
    
    <input id="email" type="email" placeholder="Email шефа" class="w-full glass rounded-xl p-4 mb-3 outline-none">
    <input id="password" type="password" placeholder="Пароль" class="w-full glass rounded-xl p-4 mb-3 outline-none">
    <input id="restName" placeholder="Название ресторана" class="w-full glass rounded-xl p-4 mb-6 outline-none">
    
    <button onclick="createAccount()" class="btn-primary w-full rounded-xl py-4 font-bold text-lg">Создать аккаунт</button>
  </div>

  <!-- ШАГ 2: ГОТОВО + ССЫЛКА -->
  <div id="step2" class="hidden glass rounded-2xl p-8 text-center">
    <div class="text-6xl mb-4">🎉</div>
    <h2 class="text-3xl font-bold text-green-400 mb-4">Готово! Система запущена</h2>
    <p class="text-zinc-400 mb-4">Сохрани эту ссылку - это твой кабинет шефа:</p>
    
    <div id="chefLink" class="glass rounded-xl p-4 text-orange-400 break-all text-sm mb-4 font-mono"></div>
    
    <button onclick="copyLink()" class="w-full bg-zinc-700 hover:bg-zinc-600 rounded-xl py-3 mb-3">Копировать ссылку</button>
    <button id="btnDone" class="btn-primary w-full rounded-xl py-4 font-bold text-lg">Открыть кабинет</button>
    
    <p class="text-zinc-500 text-xs mt-4">Дальше: добавь поваров и распечатай им QR</p>
  </div>

</div>

<script>
const _supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');

let restaurantId = null;
let chefLink = '';

async function createAccount() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const restName = document.getElementById('restName').value.trim();
  
  if(!email || !password || !restName) {
    alert('Заполни все поля');
    return;
  }

  // 1. Создаём пользователя
  const { data: authData, error: authError } = await _supabase.auth.signUp({ email, password });
  if(authError) {
    alert('Ошибка: ' + authError.message);
    return;
  }

  // 2. Создаём ресторан с UUID
  const { data: restData, error: restError } = await _supabase
    .from('restaurants')
    .insert({ 
      id: crypto.randomUUID(), // ГЕНЕРИРУЕМ UUID
      name: restName,
      owner_id: authData.user.id 
    })
    .select()
    .single();
    
  if(restError) {
    alert('Ошибка создания ресторана: ' + restError.message);
    return;
  }

  restaurantId = restData.id;

  // 3. ГЕНЕРАЦИЯ ССЫЛКИ ДЛЯ ШЕФА - ВОТ ЭТА СТРОКА!
  chefLink = `https://hotpitmaster070.github.io/schedule.html?rest=${restaurantId}`;

  // 4. Показываем ссылку на экране
  document.getElementById('chefLink').innerText = chefLink;
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');

  // 5. Кнопка "Открыть кабинет" ведёт по ссылке
  document.getElementById('btnDone').onclick = () => {
    window.location.href = chefLink;
  }
}

function copyLink() {
  navigator.clipboard.writeText(chefLink);
  alert('Ссылка скопирована!');
}
</script>
</body>
</html>
