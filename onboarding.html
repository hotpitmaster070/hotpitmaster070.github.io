<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать ресторан</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: system-ui, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
input, button { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; box-sizing: border-box; }
button { background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.error { color: red; margin-top: 10px; }
.success { color: green; margin-top: 10px; }
</style>
</head>
<body>
<h2>Создать ресторан</h2>
<p>После создания вы станете Owner и сможете приглашать сотрудников.</p>

<input type="text" id="restaurantName" placeholder="Название ресторана" required>
<button id="createBtn" onclick="createRestaurant()">СОЗДАТЬ</button>

<div id="msg"></div>

<script>
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function createRestaurant() {
  const btn = document.getElementById('createBtn');
  const msg = document.getElementById('msg');
  const name = document.getElementById('restaurantName').value.trim();
  
  msg.innerHTML = '';
  if (!name) {
    msg.innerHTML = '<div class="error">Введите название</div>';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Создаём...';
  
  try {
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    if (userError || !user) throw new Error('Сначала залогиньтесь на главной странице');
    
    const { data: restaurant, error: restaurantError } = await supabase
      .from('restaurants')
      .insert({ name: name, owner_user_id: user.id })
      .select()
      .single();
    
    if (restaurantError) throw restaurantError;
    
    const { error: profileError } = await supabase
      .from('profiles')
      .update({ restaurant_id: restaurant.id, role: 'owner' })
      .eq('id', user.id);
    
    if (profileError) throw profileError;
    
    msg.innerHTML = '<div class="success">Готово! Ресторан создан. Переходим в админку...</div>';
    
    setTimeout(() => {
      window.location.href = '/owner.html';
    }, 1500);
    
  } catch (error) {
    msg.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
    console.error(error);
  } finally {
    btn.disabled = false;
    btn.textContent = 'СОЗДАТЬ';
  }
}
</script>
</body>
</html>
