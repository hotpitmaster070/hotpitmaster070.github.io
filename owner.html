<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель Владельца</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 20px; text-align: center; }
    .card { background: #2c2c2e; padding: 20px; border-radius: 12px; margin: 15px auto; max-width: 400px; }
    .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
    .btn-red { background: #ff3333; }
    .btn-green { background: #2ecc71; }
    .btn-gray { background: #555; }
    select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; color: white; margin-bottom: 10px; }
    .code-box { background: #1a1a1a; padding: 20px; border-radius: 8px; text-align: center; font-size: 32px; letter-spacing: 6px; font-weight: bold; margin: 15px 0; }
  </style>
</head>
<body>
  <h1 id="rest_name">Панель Владельца 🧱</h1>

  <div class="card">
    <h3>Пригласить сотрудника</h3>
    <select id="role_select">
      <option value="chef">Шеф</option>
      <option value="staff">Сотрудник</option>
    </select>
    <button class="btn btn-green" onclick="createInvite()">СОЗДАТЬ КОД</button>
    <div id="code_result" style="display:none;">
      <p>Код для передачи:</p>
      <div class="code-box" id="invite_code"></div>
      <small>Действует 7 дней. Отправь его в WhatsApp.</small>
    </div>
  </div>

  <button class="btn btn-gray" onclick="logout()">ВЫЙТИ</button>

  <script>
    const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let restaurantId;

    async function init() {
      alert('1. Запуск init');
      
      const { data: { session }, error } = await db.auth.getSession();
      if (error || !session) {
        alert('2. Ошибка сессии: ' + JSON.stringify(error));
        window.location.href = '/index.html';
        return;
      }
      alert('3. Сессия есть: ' + session.user.email);

      restaurantId = localStorage.getItem('active_restaurant_id');
      const role = localStorage.getItem('active_role');
      
      alert('4. restaurantId: ' + restaurantId + ' role: ' + role);

      if (!restaurantId) {
        alert('5. Ресторан не выбран');
        window.location.href = '/select-restaurant.html';
        return;
      }

      if (role !== 'owner') {
        alert('6. Роль не owner, роль: ' + role);
        window.location.href = '/chef.html';
        return;
      }

      const { data: rest, error: restErr } = await db.from('restaurants').select('name').eq('id', restaurantId).single();
      if (restErr) {
        alert('7. Ошибка ресторана: ' + restErr.message);
        return;
      }
      
      document.getElementById('rest_name').innerText = rest.name + ' 🧱';
      alert('8. Всё ок, страница загружена');
    }

    async function createInvite() {
      alert('9. Нажата кнопка СОЗДАТЬ КОД');
      
      const role = document.getElementById('role_select').value;
      const code = Math.floor(100000 + Math.random() * 900000).toString();

      alert('10. Генерируем код: ' + code + ' для роли: ' + role);

      const { error } = await db.from('invites').insert({
        restaurant_id: restaurantId,
        code: code,
        role: role
      });

      if (error) {
        alert('11. ОШИБКА Supabase: ' + error.message);
        return;
      }

      document.getElementById('invite_code').innerText = code;
      document.getElementById('code_result').style.display = 'block';
      alert('12. Код создан успешно!');
    }

    async function logout() {
      await db.auth.signOut();
      localStorage.clear();
      window.location.href = '/index.html';
    }

    init();
  </script>
</body>
</html>
