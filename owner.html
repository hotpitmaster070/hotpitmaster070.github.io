<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хозяин | HotPit</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="app">
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div>
        <h2>HotPit</h2>
        <div class="sub" id="restName">Загрузка...</div>
      </div>
      <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu">
      <button class="active" onclick="showTab('cooks',this)">Повара</button>
      <button onclick="showTab('shift',this)">Смены</button>
      <button class="logout" onclick="logout()">Выйти</button>
    </div>
  </div>
  
  <div class="content">
    <div class="topbar">
      <button class="burger" onclick="toggleMenu()">☰</button>
      <h1 id="title">Повара & QR</h1>
    </div>
    
    <div id="cooksTab">
      <div class="auth-wrap" style="margin:0;max-width:100%">
        <input id="cookName" placeholder="Имя повара">
        <button class="btn-primary" onclick="addCook()">+ Создать QR</button>
        <div id="qrList" style="margin-top:20px"></div>
      </div>
    </div>
    
    <div id="shiftTab" style="display:none">
      <div id="onShift">Загрузка...</div>
      <button class="btn-primary" onclick="refreshShifts()">Обновить</button>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './js/api.js'
let restaurantId = null

const {data:{session}} = await supabase.auth.getSession()
if(!session){ location.href = '/index.html' }

async function init(){
  const {data:profile} = await supabase.from('profiles').select('restaurant_id,restaurants(name)').eq('id',session.user.id).single()
  restaurantId = profile.restaurant_id
  restName.textContent = profile.restaurants?.name || 'Ресторан'
  refreshShifts()
}
init()

window.toggleMenu = function(){
  document.getElementById('sidebar').classList.toggle('open')
  document.getElementById('overlay').classList.toggle('show')
}

window.showTab = (t,el)=>{
  cooksTab.style.display=t=='cooks'?'block':'none'
  shiftTab.style.display=t=='shift'?'block':'none'
  title.textContent=t=='cooks'?'Повара & QR':'Кто на смене'
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  toggleMenu()
}

window.addCook = async ()=>{
  if(!cookName.value)return
  const {data:cook} = await supabase.from('cooks').insert({full_name:cookName.value,restaurant_id:restaurantId}).select().single()
  const link = `https://hotpitmaster070.github.io/cook.html?qr=${cook.qr_token}`
  qrList.innerHTML += `<div class="card"><b>${cookName.value}</b><br><img id="qrCanvas" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}"><small style="word-break:break-all">${link}</small></div>`
  cookName.value=''
}

window.refreshShifts = async ()=>{
  const {data} = await supabase.from('shifts').select('clock_in,cooks(full_name)').eq('restaurant_id',restaurantId).is('clock_out',null).order('clock_in',{ascending:false})
  onShift.innerHTML = data.length ? data.map(s=>`<div class="card">${s.cooks.full_name} с ${new Date(s.clock_in).toLocaleTimeString()}</div>`).join('') : 'Никого нет'
}

window.logout = async function(){
  await supabase.auth.signOut()
  location.href='/index.html'
}
</script>
</body></html>
