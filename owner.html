<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель владельца</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;padding:20px;max-width:800px;margin:0 auto}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px}
button{padding:10px 20px;border-radius:8px;border:none;background:#2563eb;color:white;cursor:pointer}
input{padding:10px;border-radius:8px;border:1px solid #ddd;margin-right:10px}
</style>
</head>
<body>
<h1>Панель ресторана</h1>
<div class="card">
<h3>Пригласить сотрудника</h3>
<select id="role"><option value="chef">Шеф</option><option value="staff">Сотрудник</option></select>
<button onclick="createInvite()">Создать код</button>
<p id="code"></p>
</div>
<div class="card">
<h3>Склад</h3>
<div id="inventory">Загрузка...</div>
</div>
<script>
const supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'ТВОЙ_SUPABASE_ANON_KEY');

async function load(){
  const {data:{user}} = await supabase.auth.getUser();
  if(!user) return window.location.href='/index.html';
  
  const {data:profile} = await supabase.from('profiles').select('restaurant_id').eq('id',user.id).single();
  
  const {data:inv} = await supabase.from('inventory').select('*').eq('restaurant_id',profile.restaurant_id);
  inventory.innerHTML = inv.map(i=>`<p>${i.name} - ${i.quantity} ${i.unit}</p>`).join('') || 'Пусто';
}

async function createInvite(){
  const {data:{user}} = await supabase.auth.getUser();
  const {data:profile} = await supabase.from('profiles').select('restaurant_id').eq('id',user.id).single();
  const code = Math.floor(100000+Math.random()*900000).toString();
  
  await supabase.from('invites').insert({
    restaurant_id:profile.restaurant_id,
    code:code,
    role:role.value
  });
  code.innerText = 'Код: '+code;
}

load();
</script>
</body>
</html>
