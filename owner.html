<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Контроль смены - HotPit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-6">

<div class="max-w-4xl mx-auto">
  <h1 class="text-2xl font-bold mb-2">Контроль смены</h1>
  <p class="text-zinc-400 mb-6" id="dateNow"></p>

  <div id="shiftsList" class="space-y-3">
    <p class="text-zinc-400">Загрузка...</p>
  </div>
</div>

<script>
const supabase = supabase.createClient('ТВОЙ_URL', 'ТВОЙ_KEY');
const restaurantId = new URLSearchParams(window.location.search).get('rest');
const today = new Date().toISOString().split('T')[0];

document.getElementById('dateNow').textContent = new Date().toLocaleDateString('ru-RU', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

async function loadShifts() {
  const { data } = await supabase
.from('work_schedules')
.select(`
  *,
  staff(name),
  shifts(check_in, check_out)
`)
.eq('work_date', today)
.eq('restaurant_id', restaurantId)
.order('shift_start');

  const html = data.map(s => {
    const shift = s.shifts[0];
    let status, color, time;

    if (!shift ||!shift.check_in) {
      status = 'Не пришел';
      color = 'bg-zinc-800 text-zinc-400';
    } else if (shift.check_in &&!shift.check_out) {
      status = 'На смене';
      color = 'bg-green-900/40 text-green-400';
      time = `Пришел в ${new Date(shift.check_in).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})}`;
    } else {
      status = 'Смена закрыта';
      color = 'bg-zinc-800 text-zinc-400';
      time = `Пришел ${new Date(shift.check_in).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})} • Ушел ${new Date(shift.check_out).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})}`;
    }

    return `
      <div class="bg-zinc-900 rounded-lg p-4 border-zinc-800">
        <div class="flex justify-between items-start mb-2">
          <div>
            <p class="font-semibold">${s.staff.name}</p>
            <p class="text-sm text-zinc-400">
              Смена: ${s.shift_start.split('T')[1].slice(0,5)} - ${s.shift_end.split('T')[1].slice(0,5)}
            </p>
          </div>
          <span class="px-3 py-1 rounded-full text-sm ${color}">${status}</span>
        </div>
        ${time? `<p class="text-sm text-zinc-300">${time}</p>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('shiftsList').innerHTML = html || '<p class="text-zinc-400">На сегодня смен нет</p>';
}

loadShifts();
setInterval(loadShifts, 30000); // Автообновление каждые 30 сек
</script>
</body>
</html>
