<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit Owner</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div><h2>HotPit</h2><div class="sub" id="restName">Загрузка...</div></div>
      <button class="close-btn" onclick="sidebar.classList.remove('open');overlay.classList.remove('show')">×</button>
    </div>
    <nav class="menu">
      <button class="active">Дашборд</button>
      <button onclick="showInvite()">+ Добавить шефа</button>
      <button onclick="logout()">Выйти</button>
    </nav>
  </aside>
  <div class="overlay" id="overlay" onclick="sidebar.classList.remove('open');overlay.classList.remove('show')"></div>
  
  <main class="content">
    <div class="topbar">
      <button class="burger" onclick="sidebar.classList.add('open');overlay.classList.add('show')">☰</button>
      <h1>Дашборд</h1>
      <button class="logout" onclick="logout()">Выход</button>
    </div>
    
    <div class="row">
      <div class="modal" style="flex:1;max-width:none">Поваров: <b id="chefs">0</b></div>
      <div class="modal" style="flex:1;max-width:none">Персонала: <b id="staff">0</b></div>
    </div>
    
    <div class="modal" style="max-width:100%;margin-top:24px">
      <h3>Остатки склада</h3>
      <div id="stockList">Загрузка...</div>
    </div>
  </main>
</div>

<!-- Модалка инвайта -->
<div class="modal-overlay" id="inviteModal">
  <div class="modal">
    <h3>Пригласить шефа</h3>
    <p style="color:var(--muted);font-size:14px">Покажи QR шефу или скопируй ссылку</p>
    <canvas id="qrCanvas"></canvas>
    <input id="link" readonly>
    <div class="row">
      <button onclick="navigator.clipboard.writeText(link.value)">Копировать</button>
      <button onclick="inviteModal.style.display='none'">Закрыть</button>
    </div>
  </div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const supabase=createClient('ТВОЙ_URL','ТВОЙ_ANON_KEY');
const {data:{user}}=await supabase.auth.getUser(); if(!user) location.href='/index.html';
const {data:rest}=await supabase.from('restaurants').select('id,name').eq('owner_id',user.id).single();
restName.textContent=rest.name;
const {count:chefs}=await supabase.from('profiles').select('*',{count:'exact',head:true}).eq('restaurant_id',rest.id).eq('role','chef');
const {count:staff}=await supabase.from('profiles').select('*',{count:'exact',head:true}).eq('restaurant_id',rest.id);
chefs.textContent=chefs; staff.textContent=staff;

window.showInvite=async()=>{
  const {data:inv}=await supabase.from('invites').insert({restaurant_id:rest.id,created_by:user.id}).select('token').single();
  const url=location.origin+'/join.html?token='+inv.token;
  link.value=url; QRCode.toCanvas(qrCanvas,url);
  inviteModal.style.display='flex';
}
window.logout=()=>supabase.auth.signOut().then(()=>location.href='/index.html');
</script></body></html>
