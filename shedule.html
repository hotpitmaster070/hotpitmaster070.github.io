<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>HotPit - Управление кухней</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="text-zinc-100">
<div class="flex min-h-screen" id="app">

  <div id="errorBox" class="hidden w-full text-center mt-40">
    <div class="text-xl font-bold mb-2">Ошибка</div>
    <div class="text-sm text-zinc-300">Открой через дашборд. Нужен параметр ?rest=UUID</div>
  </div>

  <div id="mainContent" class="flex w-full">
    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>

    <div id="sidebarContainer"></div>

    <div class="flex-1 p-4">
      <button class="md:hidden mb-4" onclick="toggleSidebar()">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>

      <div class="mb-6">
        <h1 class="text-2xl font-bold">Управление кухней</h1>
        <p class="text-sm text-zinc-500" id="dateTitle"></p>
      </div>

      <div id="tab-staff" class="card">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <i data-lucide="users" class="w-5 h-5 text-orange-500"></i>
            <h2 class="font-semibold">Повара</h2>
          </div>
          <button onclick="openAddModal()" class="btn-primary text-sm">
            <i data-lucide="user-plus" class="w-4 h-4 inline mr-1"></i> Добавить
          </button>
        </div>
        <div id="staffList" class="space-y-3"></div>
      </div>

      <div id="tab-prod" class="hidden card">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-4">
          <h2 class="font-semibold">График смен</h2>
          <div class="flex gap-2 view-toggle">
            <button id="viewDay" onclick="setView('day')" class="active">День</button>
            <button id="viewMonth" onclick="setView('month')" class="inactive">Месяц</button>
          </div>
        </div>

        <div id="dayNav" class="day-nav">
          <button onclick="changeDay(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="text-center">
            <div class="flex items-center justify-center gap-2">
              <span class="font-semibold text-lg" id="currentDayText">1 июн</span>
              <span class="date-badge" id="currentDateBadge" onclick="openDatePicker()">2026-06-01</span>
            </div>
            <div class="text-xs text-zinc-500" id="currentDayWeek">Пн</div>
          </div>
          <button onclick="changeDay(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>

        <div id="monthNav" class="day-nav hidden">
          <button onclick="changeMonth(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="text-center">
            <span class="font-semibold text-lg" id="currentMonthText">Июнь 2026</span>
          </div>
          <button onclick="changeMonth(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>

        <div id="scheduleContent" class="space-y-3"></div>
      </div>

      <div id="tab-qr" class="hidden card">
        <h2 class="font-semibold mb-4">QR Сканер - Приход/Уход</h2>
        <div id="qr-reader" class="w-full rounded-xl overflow-hidden"></div>
        <div id="qr-result" class="mt-4 text-sm text-zinc-400"></div>
      </div>

      <div id="tab-reports" class="hidden card">
        <h2 class="font-semibold mb-4">Отчёты</h2>
        <p class="text-zinc-500 text-sm">ФОТ считаем в базе. Поварам не показываем.</p>
      </div>
    </div>
  </div>
</div>

<div id="addModal" class="modal" onclick="if(event.target.id==='addModal') closeAddModal()">
  <div class="card w-full max-w-md mx-4" onclick="event.stopPropagation()">
    <h3 class="text-lg font-bold mb-4">Добавить повара</h3>
    <div class="space-y-4">
      <input id="newStaffName" placeholder="Имя повара" class="w-full bg-zinc-800 rounded-lg px-4 py-3 text-sm outline-none">
      <input id="newStaffRate" type="number" placeholder="Ставка 300" class="w-full bg-zinc-800 rounded-lg px-4 py-3 text-sm outline-none">
      <div>
        <p class="text-sm text-zinc-400 mb-2">Тип оплаты:</p>
        <div class="pay-toggle flex gap-2">
          <button id="payHourly" onclick="selectPayType('hourly')" class="active">Почасовой</button>
          <button id="payDaily" onclick="selectPayType('daily')" class="inactive">Фикс за день</button>
        </div>
      </div>
      <div class="flex gap-2 pt-2">
        <button onclick="closeAddModal()" class="flex-1 bg-zinc-800 py-3 rounded-lg">Отмена</button>
        <button onclick="addStaff()" class="btn-primary flex-1">Добавить</button>
      </div>
    </div>
  </div>
</div>

<div id="datePickerModal" class="modal" onclick="if(event.target.id==='datePickerModal') closeDatePicker()">
  <div class="card w-full max-w-sm mx-4" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <button onclick="changePickerMonth(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
      <span class="font-semibold" id="pickerMonthYear">Июнь 2026</span>
      <button onclick="changePickerMonth(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
    </div>
    <div class="calendar-grid mb-2">
      <div class="calendar-header">Пн</div>
      <div class="calendar-header">Вт</div>
      <div class="calendar-header">Ср</div>
      <div class="calendar-header">Чт</div>
      <div class="calendar-header">Пт</div>
      <div class="calendar-header">Сб</div>
      <div class="calendar-header">Вс</div>
    </div>
    <div id="calendarDays" class="calendar-grid"></div>
    <div class="flex gap-2 mt-4">
      <button onclick="closeDatePicker()" class="flex-1 bg-zinc-800 py-3 rounded-lg">Отмена</button>
      <button onclick="selectToday()" class="btn-primary flex-1">Сегодня</button>
    </div>
  </div>
</div>

<div id="kitchenPanel"></div>
<div id="kitchenOverlay" onclick="closeKitchenPanel()" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); display:none; z-index:9998; backdrop-filter:blur(4px)"></div>

<script src="script.js"></script>
</body>
</html>
