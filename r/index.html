<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Цех</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="auth-wrap" style="margin-top:30vh;text-align:center">
  <h1 id="name">Загрузка...</h1>
  <p class="sub">Отметь готовность смены</p>
</div>
<script type="module">
import { supabase } from '../js/supabase.js'
const token = location.pathname.split('/').pop()
const {data:cook} = await supabase.from('cooks').select('full_name').eq('cook_token',token).single()
document.getElementById('name').textContent = cook ? `Цех: ${cook.full_name}` : 'Повар не найден'
</script></body></html>
