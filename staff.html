<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Моя смена - HotPit</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:system-ui;background:#0a0a0a;color:#fff;margin:0;padding:20px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:24px;margin-bottom:16px}
.logo{color:#f97316;font-weight:800;font-size:24px}
h2{margin:8px 0}
.btn{width:100%;padding:18px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer}
.btn-in{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.btn-out{background:#ef4444;color:#fff}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
.day{aspect-ratio:1;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px}
.day.work{background:#22c55e;color:#000;font-weight:700}
.banner{background:#ef444420;border:1px solid #ef4444;border-radius:12px;padding:16px;margin-bottom:16px}
.banner button{background:#ef4444;color:#fff;border:none;padding:10px 16px;border-radius:8px;margin-top:8px;font-weight:600}
.hidden{display:none}
</style>
</head>
<body>
<div id="termBanner" class="banner hidden">
  <b>Запрос на увольнение</b><br>
  Шеф хочет уволить вас. Подтвердить?
  <button onclick="approveTermination()">Да, претензий нет</button>
</div>

<div class="card">
  <div class="logo">HotPit</div>
  <h2 id="name">Загрузка...</h2>
  <p id="role" style="color:#a1a1aa"></p>
  <button id="btn" class="btn hidden">Загрузка...</button>
</div>

<div class="card">
  <h3>Календарь смен</h3>
  <div id="calendar" class="calendar"></div>
  <p style="margin-top:12px;color:#a1a1aa" id="earnings">Заработано за месяц:...</p>
</div>

<script>
const supabase = supabase.createClient('https://xljogkyropyocvuuodfl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs');

const staffId = new URLSearchParams(location.search).get('staff');
let staffData, shiftId, termId;

async function init(){
  // 1. Данные повара
  const {data:s} = await supabase.from('staff').select('*').eq('id',staffId).single();
  staffData = s;
  document.getElementById('name').textContent = s.name;
  document.getElementById('role').textContent = s.role;

  // 2. Проверка запроса на увольнение
  const {data:term} = await supabase.from('termination_requests').select('*').eq('staff_id',staffId).eq('status','pending').single();
  if(term){
    termId = term.id;
    document.getElementById('termBanner').classList.remove('hidden');
  }

  // 3. Статус смены сегодня
  const today = new Date().toISOString().split('T')[0];
  const {data:shift} = await supabase.from('shifts').select('*').eq('staff_id',staffId).eq('date',today).single();
  shiftId = shift?.id;

  const btn = document.getElementById('btn');
  btn.classList.remove('hidden');
  if(!shift ||!shift.check_in){
    btn.textContent = 'Пришёл на работу';
    btn.className = 'btn btn-in';
    btn.onclick = checkIn;
  } else if(!shift.check_out){
    btn.textContent = 'Закончить смену';
    btn.className = 'btn btn-out';
    btn.onclick = checkOut;
  } else {
    btn.textContent = 'Смена закрыта';
    btn.disabled = true;
  }

  // 4. Календарь + деньги
  renderCalendar();
  calcEarnings();
}

async function checkIn(){
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  const {data} = await supabase.from('shifts').insert({
    staff_id: staffId,
    restaurant_id: staffData.restaurant_id,
    date: today,
    check_in: now.toISOString(),
    source: 'manual',
    status: 'active'
  }).select().single();
  shiftId = data.id;
  init();
}

async function checkOut(){
  await supabase.from('shifts').update({check_out:new Date().toISOString(),status:'done'}).eq('id',shiftId);
  init();
}

async function renderCalendar(){
  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();
  const start = new Date(year,month,1).toISOString().split('T')[0];
  const end = new Date(year,month+1,0).toISOString().split('T')[0];

  const {data} = await supabase.from('work_schedules').select('date').eq('staff_id',staffId).gte('date',start).lte('date',end);
  const workDays = new Set(data.map(d=>d.date));

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const daysInMonth = new Date(year,month+1,0).getDate();
  for(let i=1;i<=daysInMonth;i++){
    const d = new Date(year,month,i).toISOString().split('T')[0];
    const div = document.createElement('div');
    div.className = 'day' + (workDays.has(d)?' work':'');
    div.textContent = i;
    cal.appendChild(div);
  }
}

async function calcEarnings(){
  const {data:shifts} = await supabase.from('shifts').select('check_in,check_out').eq('staff_id',staffId).not('check_out','is',null);
  let total = 0;
  if(staffData.pay_type=='hourly'){
    const hours = shifts.reduce((s,sh)=>(new Date(sh.check_out)-new Date(sh.check_in))/3600000,0);
    total = hours * staffData.hourly_rate;
  } else {
    total = shifts.length * staffData.daily_rate;
  }
  document.getElementById('earnings').textContent = `Заработано за месяц: ${total.toFixed(0)}₽`;
}

async function approveTermination(){
  await supabase.from('termination_requests').update({status:'approved',approved_at:new Date()}).eq('id',termId);
  alert('Увольнение подтверждено. Шеф теперь может удалить вас из системы.');
  document.getElementById('termBanner').classList.add('hidden');
}

init();
</script>
</body>
</html>
