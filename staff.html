<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Повар</title>
<link rel="stylesheet" href="css/style.css">
<script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"}}</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import {api,supabase} from './js/api.js'

const app = document.getElementById('app')
const urlParams = new URLSearchParams(location.search)
const invite = urlParams.get('invite')
let staffId = localStorage.getItem('staffId')

async function init(){
  if(invite &&!staffId){
    app.innerHTML = `<div class="worker-box"><h2>Добро пожаловать!</h2><input id="name" placeholder="Ваше имя"><button id="join" class="big-btn">Войти</button></div>`
    document.getElementById('join').onclick = async ()=>{
      const name = document.getElementById('name').value.trim()
      if(!name) return alert('Введите имя')
      try{
        const staff = await api.redeemInvite(invite, name)
        localStorage.setItem('staffId', staff.id)
        staffId = staff.id
        renderWorker()
      }catch(e){alert(e.message)}
    }
    return
  }
  if(!staffId) return app.innerHTML = '<div class="empty">Отсканируйте QR от шефа</div>'
  renderWorker()
}

async function renderWorker(){
  const staff = await api.getStaffById(staffId)
  const {data: openShift} = await supabase.from('shifts')
  .select('id').eq('staff_id',staffId).is('check_out',null).single()

  app.innerHTML = `
    <div class="worker-box">
      <h2>${staff.name}</h2>
      <p>${staff.role}</p>
      <button id="clockBtn" class="big-btn ${openShift?'out':'in'}">
        ${openShift? 'Завершить смену' : 'Начать смену'}
      </button>
    </div>
  `
  document.getElementById('clockBtn').onclick = async ()=>{
    await api.clockInOut(staffId, openShift? 'out' : 'in')
    renderWorker()
  }
}
init()
</script>
</body>
</html>
