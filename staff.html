<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HotPit Kitchen</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
<div class="max-w-6xl mx-auto p-6">

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold">HotPit</h1>
    <p class="text-zinc-400">Добро пожаловать, <span id="userName">Шеф</span></p>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-zinc-900 rounded-xl p-5 border-zinc-800">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-zinc-400 text-sm">На складе</p>
          <p class="text-2xl font-bold">12</p>
          <p class="text-red-400 text-sm">3 на исходе</p>
        </div>
        <i data-lucide="package" class="w-8 h-8 text-zinc-600"></i>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-xl p-5 border-zinc-800">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-zinc-400 text-sm">Задачи</p>
          <p class="text-2xl font-bold">5</p>
          <p class="text-yellow-400 text-sm">2 в работе</p>
        </div>
        <i data-lucide="clipboard-list" class="w-8 h-8 text-zinc-600"></i>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-xl p-5 border-zinc-800">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-zinc-400 text-sm">На смене</p>
          <p class="text-2xl font-bold">3</p>
          <p class="text-green-400 text-sm">Все вовремя</p>
        </div>
        <i data-lucide="users" class="w-8 h-8 text-zinc-600"></i>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-xl p-5 border-zinc-800">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-zinc-400 text-sm">Сегодня</p>
          <p class="text-2xl font-bold">47</p>
          <p class="text-zinc-400 text-sm">порций выдано</p>
        </div>
        <i data-lucide="trending-up" class="w-8 h-8 text-zinc-600"></i>
      </div>
    </div>
  </div>

  <!-- Main Actions -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <a href="/inventory.html" class="bg-zinc-900 hover:bg-zinc-800 rounded-xl p-6 border-zinc-800 transition">
      <i data-lucide="warehouse" class="w-10 h-10 mb-3 text-blue-400"></i>
      <h3 class="font-semibold mb-1">Склад</h3>
      <p class="text-zinc-400 text-sm">Приход, списание, остатки</p>
    </a>

    <a href="/tasks.html" class="bg-zinc-900 hover:bg-zinc-800 rounded-xl p-6 border-zinc-800 transition">
      <i data-lucide="check-square" class="w-10 h-10 mb-3 text-green-400"></i>
      <h3 class="font-semibold mb-1">Задачи</h3>
      <p class="text-zinc-400 text-sm">Назначить и отследить</p>
    </a>

    <a href="/checkin.html" class="bg-zinc-900 hover:bg-zinc-800 rounded-xl p-6 border-zinc-800 transition">
      <i data-lucide="qr-code" class="w-10 h-10 mb-3 text-purple-400"></i>
      <h3 class="font-semibold mb-1">Отметка смены</h3>
      <p class="text-zinc-400 text-sm">Сканируй QR</p>
    </a>

    <a href="/reports.html" class="bg-zinc-900 hover:bg-zinc-800 rounded-xl p-6 border-zinc-800 transition">
      <i data-lucide="bar-chart-3" class="w-10 h-10 mb-3 text-orange-400"></i>
      <h3 class="font-semibold mb-1">Отчеты</h3>
      <p class="text-zinc-400 text-sm">Аналитика и экспорт</p>
    </a>
  </div>

  <!-- Recent Activity -->
  <div class="mt-8 bg-zinc-900 rounded-xl p-6 border-zinc-800">
    <h3 class="font-semibold mb-4">Последние действия</h3>
    <div id="activity" class="space-y-3 text-sm">
      <div class="text-zinc-400">Загрузка...</div>
    </div>
  </div>

</div>
