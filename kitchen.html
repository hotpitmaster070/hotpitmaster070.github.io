<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кухня</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .tab-content{display:none} .tab-content.active{display:block}
  .menu button.active{background:var(--card-2)}
  .cook-card{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #262626}
  .btn-danger{background:#ef4444;color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card);padding:24px;border-radius:16px;width:100%;max-width:420px;border:1px solid #262626}
  .modal textarea{width:100%;min-height:80px;padding:12px;margin:12px 0;background:var(--card-2);border:1px solid #333;border-radius:8px;color:var(--text)}
  .row{display:flex;gap:8px;margin-top:12px}
  .row button{flex:1}
</style>
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head"><h2>Кухня</h2><button class="close-btn" onclick="sidebar.classList.remove('open');overlay.classList.remove('show')">×</button></div>
    <div class="sub" id="restName">Загрузка...</div>
    <nav class="menu">
      <button class="tab-btn active" data-tab="feed">📦 Склад</button>
      <button class="tab-btn" data-tab="personal">👥 Персонал</button>
      <button onclick="logout()">Выйти</button>
    </nav>
  </aside>
  <div class="overlay" id="overlay" onclick="sidebar.classList.remove('open');overlay.classList.remove('show')"></div>
  
  <main class="content">
    <div class="topbar">
      <button class="burger" onclick="sidebar.classList.add('open');overlay.classList.add('show')">☰</button>
      <h1 id="pageTitle">Движения склада</h1>
    </div>
    
    <div class="tab-content active" data-tab-content="feed">
      <div class="row">
        <button onclick="addMove('in')">+ Приход</button>
        <button onclick="addMove('out')">- Расход</button>
        <button onclick="addMove('inventory')">Инвентаризация</button>
      </div>
      <div class="modal" style="max-width:100%;margin-top:24px"><div id="feed">Загрузка...</div></div>
    </div>

    <div class="tab-content" data-tab-content="personal">
      <div class="modal" style="max-width:100%">
        <h3>Команда</h3>
        <div id="cookList">Загрузка...</div>
      </div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="dismissModal">
  <div class="modal">
    <h3>Уволить повара: <span id="dismissName"></span></h3>
    <textarea id="dismissReason" placeholder="Причина: Брак, прогулы, конфликт..."></textarea>
    <label style="font-size:14px;color:var(--muted)"><input type="checkbox" id="hasDebt"> У повара есть задолженность по зарплате</label>
    <div class="row">
      <button onclick="sendDismiss()" id="sendBtn">Отправить Овнеру</button>
      <button onclick="closeDismiss()" style="background:var(--card-2);color:var(--text)">Отмена</button>
    </div>
    <div id="dismissErr" style="color:#f87171;margin-top:8px"></div>
  </div>
</div>

<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
import {SUPABASE_URL, SUPABASE_ANON_KEY} from '/js/config.js'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const feed=document.getElementById('feed');
const dismissModal=document.getElementById('dismissModal');

let myRestaurantId = null;
let myUserId = null;
let selectedCookId = null;

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab=btn.dataset.tab;
    document.getElementById('pageTitle').textContent=tab==='feed'?'Движения склада':'Персонал';
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.dataset.tabContent===tab));
    if(tab==='personal') loadCooks();
    sidebar.classList.remove('open'); overlay.classList.remove('show');
  }
});

async function loadFeed(){
  const {data}=await supabase.from('stock_moves').select('*,items(name,unit)').eq('restaurant_id',myRestaurantId).order('created_at',{ascending:false}).limit(50);
  feed.innerHTML=data.map(m=>`<div style="padding:12px;border-bottom:1px solid #262626">${m.items.name} ${m.qty}${m.items.unit} • ${m.type} ${m.note||''}</div>`).join('')||'Пусто';
}

async function loadCooks(){
  const {data:cooks}=await supabase.from('profiles').select('id,full_name,role,salary').eq('restaurant_id',myRestaurantId).eq('is_active',true).neq('id',myUserId);
  document.getElementById('cookList').innerHTML=cooks.map(c=>`
    <div class="cook-card">
      <div><b>${c.full_name}</b><br><span style="color:var(--muted);font-size:14px">${c.role} • ${c.salary||0}р/мес</span></div>
      <button class="btn-danger" onclick="openDismiss('${c.id}','${c.full_name}')">Уволить</button>
    </div>`).join('')||'Нет поваров';
}

window.openDismiss=(id,name)=>{
  selectedCookId=id;
  document.getElementById('dismissName').textContent=name;
  document.getElementById('dismissReason').value='';
  document.getElementById('hasDebt').checked=false;
  document.getElementById('dismissErr').textContent='';
  dismissModal.classList.add('show');
}
window.closeDismiss=()=>dismissModal.classList.remove('show');

window.sendDismiss=async()=>{
  const reason=document.getElementById('dismissReason').value.trim();
  const hasDebt=document.getElementById('hasDebt').checked;
  if(!reason) return document.getElementById('dismissErr').textContent='Напиши причину';
  
  document.getElementById('sendBtn').disabled=true;
  const {error}=await supabase.from('dismiss_requests').insert({
    restaurant_id:myRestaurantId,
    user_id:selectedCookId,
    requested_by:myUserId,
    reason,
    has_debt:hasDebt,
    status:'chef_requested'
  });
  document.getElementById('sendBtn').disabled=false;
  if(error){document.getElementById('dismissErr').textContent=error.message; return;}
  
  alert('Запрос отправлен Овнеру');
  closeDismiss();
}

window.addMove=async(type)=>{
  const name=prompt('Товар:'); if(!name)return;
  const qty=prompt('Кол-во:'); if(!qty)return;
  const unit=prompt('Ед.изм: кг/шт/л')||'шт';
  let {data:item}=await supabase.from('items').select('id').eq('name',name).eq('restaurant_id',myRestaurantId).single();
  if(!item){const {data:newItem}=await supabase.from('items').insert({name,unit,restaurant_id:myRestaurantId}).select().single(); item=newItem;}
  await supabase.from('stock_moves').insert({restaurant_id:myRestaurantId,item_id:item.id,type,qty,created_by:myUserId});
  loadFeed();
}
window.logout=()=>supabase.auth.signOut().then(()=>location.href='/index.html');

const init=async()=>{
  const {data:{user}}=await supabase.auth.getUser(); if(!user) return location.href='/index.html';
  myUserId=user.id;
  const {data:prof}=await supabase.from('profiles').select('restaurant_id,restaurants(name)').eq('id',user.id).single();
  myRestaurantId=prof.restaurant_id;
  document.getElementById('restName').textContent=prof.restaurants.name;
  loadFeed();
}
init();
</script></body></html>
