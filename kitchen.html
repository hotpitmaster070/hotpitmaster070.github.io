<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HotPit - Кухня</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root { --accent: #f97316; } /* дефолт, потом переопределим из БД */

.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-logo { height:36px; width:36px; border-radius:8px; object-fit:cover; display:none; border:1px solid rgba(255,255,255,0.1); }
.topbar h1 { font-size:20px; font-weight:700; }

/* Кнопки/акценты через brand_color */
.btn-primary, .menu-item.active, .primary {
  background: var(--accent);
  color: #000;
}
#pageTitle { color: var(--accent); }

/* Модалка инвайта */
.modal-overlay.show { display:flex !important; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1000; }
.modal { background:#171717; padding:24px; border-radius:16px; width:100%; max-width:420px; border:1px solid #262626; }
</style>
</head>
<body>
<div class="app">
  <!-- ТУТ ТОЛЬКО ПУСТОЙ КОНТЕЙНЕР. app.js сам вставит меню -->
  <aside class="sidebar" id="sidebar"></aside>
  
  <main class="content">
    <header class="topbar">
      <button class="burger" id="openSidebar">☰</button>
      
      <!-- БРЕНД РЕСТОРАНА -->
      <div class="topbar-brand">
        <img id="restLogo" class="topbar-logo" alt="logo">
        <h1 id="pageTitle"><span id="restName">Ресторан</span> / <span id="pageSection">Загрузка</span></h1>
      </div>
      
      <button id="logoutBtn" class="logout">Выйти</button>
    </header>
    <div id="app"></div>
  </main>
</div>
<div class="overlay" id="overlay"></div>

<!-- Модалка для инвайта шефа/складчика -->
<div id="inviteModal" class="modal-overlay">
  <div class="modal">
    <h3 style="color:var(--accent);margin-bottom:12px">QR для сотрудника</h3>
    <p style="color:#a1a1aa;font-size:14px;margin-bottom:12px">Отправь ссылку шефу</p>
    <input id="inviteLink" readonly style="width:100%;padding:12px;margin:12px 0;background:#262626;border:1px solid #333;border-radius:8px;color:#fff">
    <canvas id="qrCanvas" style="margin:0 auto;display:block"></canvas>
    <div class="row" style="display:flex;gap:8px;margin-top:16px">
      <button id="copyLink" style="flex:1;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600">Копировать</button>
      <button id="closeModal" style="padding:12px;background:#3f3f46;border:1px solid #52525b;border-radius:8px;color:#fff">Готово</button>
    </div>
  </div>
</div>

<script type="module">
import {supabase} from './js/api.js'

// Глобально храним название ресторана для app.js
window.restName = 'Ресторан';

// Подтягиваем бренд ресторана ДО загрузки app.js
async function loadBrand() {
  const { data: { user }, error: authError } = await supabase.auth.getUser();
  if (authError || !user) return window.location.href = '/index.html';
  
  // главный источник правды = user_restaurants
  const { data: membership } = await supabase
    .from('user_restaurants')
    .select('restaurant_id,restaurants(name,logo_url,brand_color)')
    .eq('user_id', user.id)
    .limit(1)
    .single();
  
  if (!membership?.restaurants) return window.location.href = '/index.html';
  
  const r = membership.restaurants;
  
  // 1. Красим акценты через CSS переменную
  if (r.brand_color) {
    document.documentElement.style.setProperty('--accent', r.brand_color);
  }
  // 2. Вставляем логотип
  const logo = document.getElementById('restLogo');
  if (logo && r.logo_url) {
    logo.src = r.logo_url;
    logo.style.display = 'block';
  }
  // 3. Ставим название ресторана
  window.restName = r.name;
  document.getElementById('restName').innerText = r.name;
}

// Выход
document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = '/index.html';
};

// Грузим бренд, потом app.js который отрисует сайдбар + контент
await loadBrand();
import('./js/app.js');
</script>
</body>
</html>
