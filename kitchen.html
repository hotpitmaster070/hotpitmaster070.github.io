<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Экран Шефа - HotPit</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div>
          <h2>HotPit</h2>
          <p>Экран Шефа</p>
          <span class="sub">Панель управления</span>
        </div>
        <button class="close-btn" id="closeSidebar">×</button>
      </div>
      <nav class="menu">
        <button class="menu-item active" data-view="staff">👥 Повара</button>
        <button class="menu-item" data-view="schedule">📅 График</button>
        <button class="menu-item" data-view="qr">🔲 QR Сканер</button>
        <button class="menu-item" data-view="reports">📊 Отчёты</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="burger" id="openSidebar">☰</button>
        <h1 id="pageTitle">Повара</h1>
      </header>
      <div id="app"></div>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
