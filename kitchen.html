<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HotPit - Кухня</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div>
        <h2>HotPit</h2>
        <p id="restName">Загрузка...</p>
        <span class="sub" id="userRole">роль...</span>
      </div>
      <button class="close-btn" id="closeSidebar">×</button>
    </div>
    <nav class="menu" id="menu"></nav>
  </aside>
  
  <main class="content">
    <header class="topbar">
      <button class="burger" id="openSidebar">☰</button>
      <div class="topbar-brand">
        <img id="restLogo" class="topbar-logo" alt="logo">
        <h1 id="pageTitle">Загрузка</h1>
      </div>
      <button id="logoutBtn" class="logout">Выйти</button>
    </header>
    <div id="app"></div>
  </main>
</div>
<div class="overlay" id="overlay"></div>

<div id="inviteModal" class="modal-overlay">
  <div class="modal">
    <h3 style="color:var(--accent);margin-bottom:12px">QR для сотрудника</h3>
    <input id="inviteLink" readonly>
    <canvas id="qrCanvas"></canvas>
    <div class="row">
      <button id="copyLink" class="primary">Копировать</button>
      <button id="closeModal">Готово</button>
    </div>
  </div>
</div>

<script type="module">
const SUPABASE_URL = 'https://xljogkyropyocvuuodfl.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0bAe28v6MX-MyVs'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const sidebar = document.getElementById('sidebar')
const overlay = document.getElementById('overlay')
const app = document.getElementById('app')
const restNameEl = document.getElementById('restName')
const pageTitle = document.getElementById('pageTitle')
const userRoleEl = document.getElementById('userRole')
const restLogo = document.getElementById('restLogo')

const params = new URLSearchParams(location.search)
const restaurantId = params.get('id')

if(!restaurantId) {
  pageTitle.textContent = 'Ошибка'
  app.innerHTML = '<p style="padding:40px">Нет ID ресторана. Вернись и создай ресторан заново.</p>'
  throw new Error('No restaurant id')
}

document.getElementById('openSidebar').onclick = ()=>{sidebar.classList.add('open');overlay.classList.add('show')}
document.getElementById('closeSidebar').onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show')}
overlay.onclick = ()=>{sidebar.classList.remove('open');overlay.classList.remove('show')}
document.getElementById('logoutBtn').onclick = async ()=>{await supabase.auth.signOut();location.href='index.html'}

async function init(){
  const {data:{user}} = await supabase.auth.getUser()
  if(!user) return location.href='index.html'
  
  const {data:membership, error} = await supabase
    .from('user_restaurants')
    .select('role,restaurants(name,logo_url,brand_color)')
    .eq('user_id', user.id)
    .eq('restaurant_id', restaurantId)
    .single()
  
  if(error || !membership){
    pageTitle.textContent = 'Нет доступа'
    app.innerHTML = '<p style="padding:40px">Ты не состоишь в этом ресторане</p>'
    return
  }
  
  const r = membership.restaurants
  const role = membership.role
  restNameEl.textContent = r.name
  userRoleEl.textContent = role==='owner' ? 'Владелец' : 'Сотрудник'
  pageTitle.textContent = r.name
  
  if(r.brand_color) document.documentElement.style.setProperty('--accent', r.brand_color)
  if(r.logo_url){ restLogo.src = r.logo_url; restLogo.style.display='block' }
  
  const menuItems = role==='owner'
    ? [['Сотрудники','staff'],['Инвайт шефа','invite'],['Склад','warehouse'],['Настройки','settings']]
    : [['Паспорт','passport']]
  
  document.getElementById('menu').innerHTML = menuItems
    .map(([label,view])=>`<button class="menu-item" data-view="${view}">${label}</button>`)
    .join('')
  
  document.querySelectorAll('.menu-item').forEach(btn=>{
    btn.onclick = ()=>{ 
      document.querySelectorAll('.menu-item').forEach(b=>b.classList.remove('active'))
      btn.classList.add('active')
      renderView(btn.dataset.view, role, restaurantId)
      if(window.innerWidth<900) {sidebar.classList.remove('open');overlay.classList.remove('show')}
    }
  })
  
  renderView(role==='owner'?'staff':'passport', role, restaurantId)
  document.querySelector('.menu-item').classList.add('active')
}

function renderView(view, role, restaurantId){
  if(view==='staff'){
    app.innerHTML = `<button class="add-btn" id="addStaffBtn">+ Добавить сотрудника</button><div id="staffList">Загрузка...</div>`
    document.getElementById('addStaffBtn').onclick = async ()=>{
      const {data:inv} = await supabase.from('invitations').insert({restaurant_id:restaurantId, role:'stocker'}).select().single()
      const link = `${location.origin}/join.html?t=${inv.token}`
      document.getElementById('inviteLink').value = link
      QRCode.toCanvas(document.getElementById('qrCanvas'), link, {width:220})
      document.getElementById('inviteModal').classList.add('show')
    }
  } else if(view==='passport'){
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#71717a">Паспорт ресторана</div>`
  } else if(view==='invite'){
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#71717a">Инвайт шефа</div>`
  } else {
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#71717a">${view} - в разработке</div>`
  }
}

document.getElementById('closeModal').onclick = ()=>document.getElementById('inviteModal').classList.remove('show')
document.getElementById('copyLink').onclick = ()=>navigator.clipboard.writeText(document.getElementById('inviteLink').value)

init()
</script>
</body>
</html>
