<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit Кухня</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div>
        <h2>HotPit</h2>
        <p id="restName">Загрузка...</p>
        <span class="sub" id="userRole">Кухня</span>
      </div>
      <button class="close-btn" id="closeBtn">×</button>
    </div>
    <nav class="menu" id="menu">
      <button class="active" data-view="orders">Заказы</button>
      <button data-view="menu">Меню</button>
      <button data-view="qr">QR</button>
    </nav>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="content">
    <header class="topbar">
      <button class="burger" id="burger">☰</button>
      <h1 id="title">Загрузка</h1>
      <button id="logoutBtn" class="logout">Выйти</button>
    </header>
    <div id="content">Загрузка...</div>
  </main>
</div>

<div id="inviteModal" class="modal-overlay">
  <div class="modal">
    <h3>QR код ресторана</h3>
    <p id="inviteRole" style="color:#a1a1aa;margin-bottom:8px"></p>
    <input id="inviteLink" readonly>
    <canvas id="qrCanvas"></canvas>
    <div class="row">
      <button id="copyLink" class="primary">Копировать</button>
      <button id="closeModal">Закрыть</button>
    </div>
  </div>
</div>

<script type="module" src="/js/kitchen.js"></script>
</body>
</html>
