<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HotPit - Экран Шефа</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-logo { height:36px; width:36px; border-radius:8px; object-fit:cover; display:none; }
.topbar h1 { font-size:20px; font-weight:700; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div><h2>HotPit</h2><p>Экран Шефа</p><span class="sub">Панель управления</span></div>
      <button class="close-btn" id="closeSidebar">×</button>
    </div>
    <nav class="menu">
      <button class="menu-item active" data-view="staff">👥 Повара</button>
      <button class="menu-item" data-view="schedule">📅 График</button>
      <button class="menu-item" data-view="qr">🔲 QR Сканер</button>
      <button class="menu-item" data-view="reports">📊 Отчёты</button>
      <hr class="menu-sep">
      <button class="menu-item disabled">📦 Приход товара</button>
      <button class="menu-item disabled">🏪 Склад</button>
    </nav>
  </aside>
  <main class="content">
    <header class="topbar">
      <button class="burger" id="openSidebar">☰</button>
      
      <!-- ВОТ ТУТ БРЕНД РЕСТОРАНА -->
      <div class="topbar-brand">
        <img id="restLogo" class="topbar-logo" alt="logo">
        <h1 id="pageTitle">Повара</h1>
      </div>
      
      <button id="logoutBtn" class="logout">Выйти</button>
    </header>
    <div id="app"></div>
  </main>
</div>
<div class="overlay" id="overlay"></div>

<div id="inviteModal" class="modal"><div class="modal-box">
  <h3>QR для повара</h3>
  <input id="inviteLink" readonly>
  <canvas id="qrCanvas"></canvas>
  <div class="row"><button id="copyLink">Копировать</button><button id="closeModal" class="primary">Готово</button></div>
</div></div>

<div id="manualModal" class="modal"><div class="modal-box">
  <h3>Ручная смена</h3>
  <input id="manualDate" type="date">
  <input id="manualIn" type="datetime-local">
  <input id="manualOut" type="datetime-local">
  <div class="row"><button id="closeManual">Отмена</button><button id="saveManual" class="primary">Сохранить</button></div>
</div></div>

<script>
// 1. Подключаем Supabase
const supabase = supabase.createClient(
  'https://xljogkyropyocvuuodfl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsam9na3lyb3B5b2N2dXVvZGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODA5MjgsImV4cCI6MjA5Mzg1NjkyOH0.e7m1owNpYoqTpnGRKeEiMlTAIp0T0bAe28v6MX-MyVs'
);

// 2. Подтягиваем бренд ресторана
async function loadBrand() {
  const { data: { user } = await supabase.auth.getUser();
  if (!user) return window.location.href = '/';
  
  const restaurantId = user.user_metadata?.restaurant_id;
  if (!restaurantId) return;
  
  const { data: r } = await supabase.from('restaurants')
    .select('name, logo_url, brand_color').eq('id', restaurantId).single();
  
  if (r) {
    // Красим шапку
    if (r.brand_color) {
      document.querySelector('.topbar').style.background = r.brand_color;
    }
    // Вставляем логотип
    const logo = document.getElementById('restLogo');
    if (logo && r.logo_url) {
      logo.src = r.logo_url;
      logo.style.display = 'block';
    }
    // Меняем название в шапке
    const title = document.getElementById('pageTitle');
    if (title && r.name) {
      title.textContent = r.name + ' / Повара';
    }
  }
}

// 3. Выход
document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = '/';
};

loadBrand();
</script>

<script type="module" src="js/app.js"></script>
</body>
</html>
