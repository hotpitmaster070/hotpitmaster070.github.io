<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotPit | Шеф</title><link rel="stylesheet" href="css/style.css"></head><body>

<div id="loginWrap" class="auth-wrap">
  <h1>HotPit</h1><p>Кабинет шефа</p>
  <input id="email" type="email" placeholder="Email от хозяина" autocomplete="email">
  <input id="pass" type="password" placeholder="Пароль" autocomplete="current-password">
  <button class="btn-primary" onclick="onLogin()">Войти</button>
  <p id="err" class="error"></p>
</div>

<div id="app" class="app" style="display:none">
  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <div>
        <h2>HotPit</h2>
        <div class="sub" id="restName">Кухня</div>
      </div>
      <button class="close-btn" onclick="closeSidebar()">×</button>
    </div>
    <nav class="menu">
      <button class="active" onclick="showTab('shift',this)">Смены</button>
      <button onclick="showTab('cooks',this)">Повара</button>
      <button class="logout" onclick="onLogout()">Выйти</button>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <button class="burger" onclick="openSidebar()">☰</button>
      <h1 id="title">Кто на смене</h1>
    </div>
    
    <div id="shiftTab">
      <div id="onShift">Загрузка...</div>
      <button class="btn-primary" onclick="refreshShifts()">Обновить</button>
    </div>
    
    <div id="cooksTab" style="display:none">
      <div class="card">
        <input id="cookName" placeholder="Имя нового повара">
        <button class="btn-primary" onclick="onAddCook()">+ Создать QR</button>
        <p style="font-size:12px;color:var(--muted);margin-top:8px">QR распечатай и выдай повару. Он сканирует и заходит без пароля.</p>
      </div>
      <div id="qrList" style="margin-top:20px"></div>
    </div>
  </main>
</div>

<script type="module">
import { supabase } from './js/api.js'
let restaurantId = null

window.openSidebar=()=>{sidebar.classList.add('open');overlay.classList.add('show')}
window.closeSidebar=()=>{sidebar.classList.remove('open');overlay.classList.remove('show')}
window.showTab=(t,el)=>{
  shiftTab.style.display=t=='shift'?'block':'none'
  cooksTab.style.display=t=='cooks'?'block':'none'
  title.textContent=t=='shift'?'Кто на смене':'Повара & QR'
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  closeSidebar()
}

window.onLogin=async()=>{
  err.textContent='Вход...'
  const {data,error}=await supabase.auth.signInWithPassword({email:email.value,password:pass.value})
  if(error){err.textContent=error.message;return}
  
  const {data:profile,error:pErr}=await supabase.from('profiles')
    .select('id,role,restaurant_id,restaurants(name)')
    .eq('id',data.user.id).single()
  
  if(pErr||!profile){err.textContent='Профиль не найден';await supabase.auth.signOut();return}
  if(profile.role!=='chef'){err.textContent='Это не аккаунт шефа';await supabase.auth.signOut();return}
  
  restaurantId=profile.restaurant_id
  restName.textContent=profile.restaurants?.name||'Кухня'
  loginWrap.style.display='none';app.style.display='flex'
  refreshShifts()
}

window.refreshShifts=async()=>{
  if(!restaurantId)return
  const {data}=await supabase.from('shifts')
    .select('clock_in,cooks(full_name)')
    .eq('restaurant_id',restaurantId)
    .is('clock_out',null)
    .order('clock_in',{ascending:false})
  onShift.innerHTML=data.length
    ?data.map(s=>`<div class="card"><b>${s.cooks.full_name}</b><br>с ${new Date(s.clock_in).toLocaleTimeString()}</div>`).join('')
    :'Никого нет'
}

window.onAddCook=async()=>{
  if(!cookName.value.trim())return
  const {data:cook,error}=await supabase.from('cooks')
    .insert({full_name:cookName.value.trim(),restaurant_id:restaurantId})
    .select().single()
  if(error){alert('Ошибка: '+error.message);return}
  const link=`https://hotpitmaster070.github.io/cook.html?qr=${cook.qr_token}`
  qrList.innerHTML+=`<div class="card"><b>${cookName.value}</b><br><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}"><small style="word-break:break-all">${link}</small></div>`
  cookName.value=''
}

window.onLogout=async()=>{await supabase.auth.signOut();location.reload()}

// автологин если сессия есть
supabase.auth.getSession().then(({data:{session}})=>{if(session)onLogin()})
</script></body></html>
