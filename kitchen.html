<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кухня</title>
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head"><h2>Кухня</h2></div>
    <nav class="menu">
      <button class="active">Лента</button>
      <button onclick="logout()">Выйти</button>
    </nav>
  </aside>
  <div class="overlay" id="overlay" onclick="sidebar.classList.remove('open');overlay.classList.remove('show')"></div>
  
  <main class="content">
    <div class="topbar">
      <button class="burger" onclick="sidebar.classList.add('open');overlay.classList.add('show')">☰</button>
      <h1>Движения склада</h1>
    </div>
    
    <div class="row">
      <button onclick="addMove('in')">+ Приход</button>
      <button onclick="addMove('out')">- Расход</button>
      <button onclick="addMove('inventory')">Инвентаризация</button>
    </div>
    
    <div class="modal" style="max-width:100%;margin-top:24px">
      <div id="feed">Загрузка...</div>
    </div>
  </main>
</div>
<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
import {SUPABASE_URL, SUPABASE_ANON_KEY} from '/js/config.js'
const supabase=createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const {data:{user}}=await supabase.auth.getUser();
const {data:prof}=await supabase.from('profiles').select('restaurant_id').eq('id',user.id).single();

async function loadFeed(){
  const {data}=await supabase.from('stock_moves').select('*,items(name,unit)').eq('restaurant_id',prof.restaurant_id).order('created_at',{ascending:false}).limit(50);
  feed.innerHTML=data.map(m=>`<div style="padding:12px;border-bottom:1px solid #262626">${m.items.name} ${m.qty}${m.items.unit} • ${m.type} ${m.note||''}</div>`).join('');
}
loadFeed();

window.addMove=async(type)=>{
  const name=prompt('Товар:'); if(!name)return;
  const qty=prompt('Кол-во:'); if(!qty)return;
  const unit=prompt('Ед.изм: кг/шт/л')||'шт';
  let {data:item}=await supabase.from('items').select('id').eq('name',name).eq('restaurant_id',prof.restaurant_id).single();
  if(!item){const {data:newItem}=await supabase.from('items').insert({name,unit,restaurant_id:prof.restaurant_id}).select().single(); item=newItem;}
  await supabase.from('stock_moves').insert({restaurant_id:prof.restaurant_id,item_id:item.id,type,qty,created_by:user.id});
  loadFeed();
}
window.logout=()=>supabase.auth.signOut().then(()=>location.href='/index.html');
</script></body></html>
